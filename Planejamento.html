<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGQ - Planejamento de Treinamentos (ISO 9001)</title>
    
    <!-- Tailwind CSS para Estilização -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons para Ícones -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- SweetAlert2 para Modais e Mensagens -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- FullCalendar (Biblioteca de Calendário) -->
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>
    <!-- Idioma PT-BR para o Calendário -->
    <script src='https://cdn.jsdelivr.net/npm/@fullcalendar/core@6.1.11/locales/pt-br.global.min.js'></script>

    <!-- FIREBASE V8 -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .custom-scrollbar::-webkit-scrollbar { height: 8px; width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .modal-open { overflow: hidden; }
        
        /* Ajustes FullCalendar x Tailwind */
        .fc-theme-standard td, .fc-theme-standard th { border-color: #e2e8f0; }
        .fc .fc-toolbar-title { font-size: 1.25rem; font-weight: 700; color: #1e293b; text-transform: capitalize; }
        .fc .fc-button-primary { background-color: #2563eb !important; border-color: #2563eb !important; }
        .fc .fc-button-primary:hover { background-color: #1d4ed8 !important; border-color: #1e40af !important; }
        .fc-event { cursor: pointer; border-radius: 4px; padding: 2px 4px; font-size: 0.75rem; border: none; }
        .fc-daygrid-event { background-color: #dbeafe; color: #1e40af; font-weight: 600; border-left: 4px solid #2563eb; }
        
        /* Estilos de Impressão Integrados */
        @media print {
            @page { margin: 1cm; }
            body { -webkit-print-color-adjust: exact; print-color-adjust: exact; background: white; }
            .no-print { display: none !important; }
            .page-break { page-break-after: always; }
        }
    </style>
</head>
<body class="flex flex-col h-screen text-gray-800 bg-gray-50">

    <!-- Header / Navbar Superior -->
    <header class="bg-white shadow-sm z-20 no-print">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex">
                    <div class="flex-shrink-0 flex items-center">
                        <div class="p-2 bg-indigo-100 rounded-lg mr-3">
                            <i data-lucide="calendar-days" class="w-6 h-6 text-indigo-700"></i>
                        </div>
                        <h1 class="text-xl font-bold text-gray-800">SGQ <span class="text-indigo-600">Planejamento</span></h1>
                    </div>
                </div>
                <div class="flex items-center space-x-3">
                    <a href="index.html" class="hidden md:inline-flex items-center px-4 py-2 border border-transparent text-sm font-bold rounded-md shadow-sm text-white bg-slate-800 hover:bg-slate-700 focus:outline-none transition-colors">
                        <i data-lucide="arrow-left" class="w-4 h-4 mr-2"></i> PORTAL
                    </a>
                    <a href="Cadastro.html" class="hidden md:inline-flex items-center px-3 py-2 border border-gray-300 text-sm font-medium rounded-md shadow-sm text-gray-700 bg-white hover:bg-gray-50 focus:outline-none transition-colors">
                        <i data-lucide="users" class="w-4 h-4 mr-2"></i> Cadastros
                    </a>
                    <a href="dashboard.html" class="hidden md:inline-flex items-center px-3 py-2 border border-transparent text-sm font-medium rounded-md shadow-sm text-amber-700 bg-amber-100 hover:bg-amber-200 focus:outline-none transition-colors">
                        <i data-lucide="bar-chart-2" class="w-4 h-4 mr-2"></i> Operação
                    </a>
                    
                    <div class="h-8 w-8 rounded-full bg-indigo-600 flex items-center justify-center text-white font-bold text-sm ml-2" id="user-avatar" title="Usuário logado">--</div>
                    <!-- Mobile menu button -->
                    <div class="flex items-center md:hidden ml-2">
                        <button type="button" onclick="document.getElementById('mobile-menu').classList.toggle('hidden')" class="p-2 rounded-md text-gray-400 hover:bg-gray-100">
                            <i data-lucide="menu" class="w-6 h-6"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Mobile Menu -->
        <div class="hidden md:hidden absolute w-full bg-white z-50 border-t shadow-lg" id="mobile-menu">
            <div class="pt-2 pb-3 space-y-1">
                <a href="index.html" class="block pl-4 py-3 text-white bg-slate-800 hover:bg-slate-700 font-bold border-b border-gray-200"><i data-lucide="arrow-left" class="w-5 h-5 inline mr-2"></i> PORTAL</a>
                <a href="Cadastro.html" class="block pl-4 py-3 text-gray-700 bg-gray-50 hover:bg-gray-100 font-medium border-b border-gray-200"><i data-lucide="users" class="w-5 h-5 inline mr-2"></i> Módulo Cadastros</a>
                <a href="dashboard.html" class="block pl-4 py-3 text-amber-700 bg-amber-50 hover:bg-amber-100 font-medium"><i data-lucide="bar-chart-2" class="w-5 h-5 inline mr-2"></i> Módulo Operação</a>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 overflow-auto bg-gray-50 p-4 md:p-6 no-print" id="main-container">
        <div class="max-w-[1400px] mx-auto mb-4 flex justify-between items-center">
             <h2 class="text-2xl font-semibold text-gray-800" id="page-title">Calendário Anual de Treinamentos</h2>
        </div>
        
        <div class="max-w-[1400px] mx-auto" id="app-content">
            <div class="flex h-64 w-full items-center justify-center">
                <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-indigo-600"></div>
                <span class="ml-3 text-gray-500 font-medium">Sincronizando Planejamento...</span>
            </div>
        </div>
    </main>

    <!-- Generic Modal Container -->
    <div id="modal-container" class="fixed inset-0 z-50 flex items-center justify-center hidden bg-black bg-opacity-50 backdrop-blur-sm transition-opacity p-4 no-print">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-[650px] max-h-[95vh] flex flex-col transform transition-all scale-95" id="modal-content-wrapper">
            <div class="px-5 py-3 border-b border-gray-200 flex justify-between items-center bg-white rounded-t-xl flex-shrink-0">
                <h3 class="text-lg font-bold text-[#1e293b]" id="modal-title">Título do Modal</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 transition-colors"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div class="p-5 overflow-y-auto overflow-x-hidden custom-scrollbar flex-1 min-h-0" id="modal-body"></div>
            <div class="px-5 py-3 border-t border-gray-100 bg-white rounded-b-xl flex justify-end items-center gap-3 flex-shrink-0" id="modal-footer"></div>
        </div>
    </div>

    <!-- Script Global -->
    <script>
        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyBqV0KOQMAYR4z6P_RKnrQPDfkAR2CsXBI",
            authDomain: "gestao-de-pessoas-49200.firebaseapp.com",
            projectId: "gestao-de-pessoas-49200",
            storageBucket: "gestao-de-pessoas-49200.firebasestorage.app",
            messagingSenderId: "615097388185",
            appId: "1:615097388185:web:ef87969b64f4a886f23c08"
        };
        
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        
        const auth = firebase.auth();
        const db = firebase.firestore();
        db.settings({ experimentalForceLongPolling: true });

        const appId = 'gestao-de-pessoas-49200';
        let currentUser = null;
        let calendarInstance = null; // Instância do FullCalendar

        // --- 1. STATE MANAGEMENT ---
        const defaultData = {
            roles: [], employees: [], trainings: [], attendanceLists: [], plannedTrainings: [] // Nova coleção para agendamentos
        };
        
        let state = JSON.parse(JSON.stringify(defaultData));

        function loadDataFromFirestore() {
            if (!currentUser) return;

            // Carrega apenas o necessário para planejar (não precisamos de eficácia e desempenho aqui)
            const collections = ['roles', 'employees', 'trainings', 'attendanceLists', 'plannedTrainings'];
            let loadedCount = 0;

            collections.forEach(col => {
                db.collection(`artifacts/${appId}/public/data/${col}`).onSnapshot((snapshot) => {
                    state[col] = snapshot.docs.map(doc => doc.data());
                    
                    loadedCount++;
                    if(loadedCount >= collections.length) {
                        renderPlanningPage();
                    } else if (loadedCount > collections.length && calendarInstance) {
                        // Se for uma atualização em tempo real posterior, apenas atualiza a tela
                        renderPlanningPage();
                    }
                }, (error) => { console.error(`Erro ao ler coleção ${col}:`, error); });
            });
        }

        async function dbSave(collection, docId, data) {
            try { await db.collection(`artifacts/${appId}/public/data/${collection}`).doc(docId.toString()).set(data); } 
            catch(e) { console.error(e); }
        }

        async function dbDelete(collection, docId) {
            try { await db.collection(`artifacts/${appId}/public/data/${collection}`).doc(docId.toString()).delete(); } 
            catch(e) { console.error(e); }
        }

        const generateId = (array) => array.length > 0 ? Math.max(...array.map(i => i.id)) + 1 : 1;
        const formatDate = (dateStr) => { if(!dateStr) return '-'; const [y, m, d] = dateStr.split('-'); return `${d}/${m}/${y}`; };

        function openModal(title, bodyHtml, footerHtml) {
            document.getElementById('modal-title').innerText = title; 
            document.getElementById('modal-body').innerHTML = bodyHtml; 
            document.getElementById('modal-footer').innerHTML = footerHtml;
            const modal = document.getElementById('modal-container'); const wrapper = document.getElementById('modal-content-wrapper');
            modal.classList.remove('hidden'); setTimeout(() => { wrapper.classList.remove('scale-95'); wrapper.classList.add('scale-100'); }, 10);
            document.body.classList.add('modal-open'); if(window.lucide) window.lucide.createIcons();
        }

        function closeModal() {
            const modal = document.getElementById('modal-container'); const wrapper = document.getElementById('modal-content-wrapper');
            wrapper.classList.remove('scale-100'); wrapper.classList.add('scale-95');
            setTimeout(() => { modal.classList.add('hidden'); document.body.classList.remove('modal-open'); }, 200);
        }

        // ================= CONSTRUÇÃO DA TELA DE PLANEJAMENTO =================
        function renderPlanningPage() {
            const container = document.getElementById('app-content');
            
            // 1. Lógica para agrupar as Pendências de Treinamento
            let pendingMap = {}; // Group by Training ID

            state.employees.filter(e => e.status === 'Ativo').forEach(emp => {
                const role = state.roles.find(r => r.name === emp.role);
                if(role && role.trainingIds && role.trainingIds.length > 0) {
                    role.trainingIds.forEach(tId => {
                        const tr = state.trainings.find(t => t.id === tId);
                        if(!tr) return;

                        // Verifica se JÁ ESTÁ AGENDADO no calendário futuro
                        const isAlreadyPlanned = state.plannedTrainings && state.plannedTrainings.some(pt => pt.trainingId === tId && pt.attendees.includes(emp.id));
                        if (isAlreadyPlanned) return; // Se já está agendado, não é mais uma "pendência urgente de planejamento"

                        // Verifica presenças passadas
                        const participacoes = state.attendanceLists
                            .filter(list => list.trainingId === tId && list.attendees.includes(emp.id))
                            .sort((a, b) => new Date(b.date) - new Date(a.date));

                        let isPendente = false;
                        if(participacoes.length === 0) isPendente = true; // Nunca fez
                        else if(tr.periodicityMonths > 0) {
                            const [y, m, d] = participacoes[0].date.split('-');
                            const val = new Date(y, m - 1, d); val.setMonth(val.getMonth() + tr.periodicityMonths);
                            if(new Date() > val) isPendente = true; // Vencido
                        }

                        if(isPendente) {
                            if(!pendingMap[tId]) pendingMap[tId] = { training: tr, employees: [] };
                            pendingMap[tId].employees.push(emp);
                        }
                    });
                }
            });

            const pendingTrainings = Object.values(pendingMap);

            container.innerHTML = `
                <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
                    <!-- Coluna da Esquerda: Pendências -->
                    <div class="lg:col-span-1 bg-white rounded-xl shadow-sm border border-gray-100 flex flex-col h-[75vh]">
                        <div class="p-4 border-b border-gray-100 bg-gray-50 rounded-t-xl flex justify-between items-center">
                            <h3 class="font-bold text-gray-800 text-sm"><i data-lucide="alert-circle" class="w-4 h-4 inline mr-1 text-red-500"></i> Necessitam Agendamento</h3>
                            <span class="bg-red-100 text-red-800 text-xs font-bold px-2 py-0.5 rounded-full">${pendingTrainings.length} Turmas</span>
                        </div>
                        <div class="p-4 overflow-y-auto flex-1 custom-scrollbar space-y-4">
                            ${pendingTrainings.length > 0 ? pendingTrainings.map(item => `
                                <div class="border border-gray-200 rounded-lg p-3 bg-white shadow-sm hover:shadow transition-shadow">
                                    <h4 class="font-bold text-sm text-gray-800 mb-1 leading-tight">${item.training.title}</h4>
                                    <p class="text-[10px] text-gray-500 mb-3">${item.employees.length} colaborador(es) aguardam convocação.</p>
                                    
                                    <div class="max-h-24 overflow-y-auto custom-scrollbar bg-gray-50 border border-gray-100 rounded p-2 mb-3 space-y-1">
                                        ${item.employees.map(e => `<div class="text-xs text-gray-700 truncate">&bull; ${e.name}</div>`).join('')}
                                    </div>
                                    
                                    <button onclick="openScheduleModal(${item.training.id})" class="w-full bg-indigo-50 hover:bg-indigo-100 text-indigo-700 border border-indigo-200 py-1.5 rounded text-xs font-bold transition flex justify-center items-center">
                                        <i data-lucide="calendar-plus" class="w-3 h-3 mr-1"></i> Agendar Turma
                                    </button>
                                </div>
                            `).join('') : `
                                <div class="text-center py-10 flex flex-col items-center">
                                    <div class="w-12 h-12 bg-green-50 rounded-full flex items-center justify-center mb-3"><i data-lucide="check" class="w-6 h-6 text-green-500"></i></div>
                                    <p class="text-sm font-semibold text-gray-700">Tudo Planejado!</p>
                                    <p class="text-xs text-gray-500 mt-1 text-center">Nenhuma matriz pendente<br>de agendamento no momento.</p>
                                </div>
                            `}
                        </div>
                    </div>

                    <!-- Coluna da Direita: Calendário -->
                    <div class="lg:col-span-3 bg-white rounded-xl shadow-sm border border-gray-100 p-4 h-[75vh] flex flex-col">
                        <div class="flex justify-between items-center mb-4 border-b pb-2">
                            <h3 class="font-bold text-gray-800 text-lg flex items-center"><i data-lucide="calendar" class="w-5 h-5 mr-2 text-indigo-600"></i> Quadro de Planejamento</h3>
                            <button onclick="openScheduleModal(null)" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-sm hover:bg-indigo-700 transition flex items-center">
                                <i data-lucide="plus" class="w-4 h-4 mr-1"></i> Agendamento Avulso
                            </button>
                        </div>
                        <div id="calendar" class="flex-1 w-full relative"></div>
                    </div>
                </div>
            `;
            if(window.lucide) window.lucide.createIcons();

            // Inicializa o Calendário logo após o HTML ser injetado
            setTimeout(initCalendar, 50);
        }

        function initCalendar() {
            const calendarEl = document.getElementById('calendar');
            if (!calendarEl) return;

            // Formata os eventos salvos na coleção 'plannedTrainings' para o formato do FullCalendar
            const calendarEvents = (state.plannedTrainings || []).map(pt => {
                const tr = state.trainings.find(t => t.id === pt.trainingId);
                return {
                    id: pt.id,
                    title: tr ? tr.title : 'Treinamento',
                    start: pt.date, // Formato YYYY-MM-DD
                    allDay: true,
                    extendedProps: { ...pt, trainingName: tr ? tr.title : 'Desconhecido' }
                };
            });

            calendarInstance = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'pt-br',
                height: '100%',
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'dayGridMonth,listMonth'
                },
                buttonText: {
                    today: 'Hoje',
                    month: 'Mês',
                    list: 'Lista'
                },
                events: calendarEvents,
                eventClick: function(info) {
                    openEventDetailsModal(info.event.extendedProps);
                }
            });
            
            calendarInstance.render();
        }

        // ================= AGENDAR NOVO TREINAMENTO =================
        let currentScheduleEmps = [];

        function openScheduleModal(preSelectedTrId = null) {
            let trSelectHtml = `<select id="schTrId" class="w-full border p-2 rounded text-sm focus:ring-2 focus:ring-indigo-500 outline-none" onchange="updateScheduleEmpList()"><option value="">-- Selecione o Treinamento --</option>`;
            state.trainings.forEach(t => {
                trSelectHtml += `<option value="${t.id}" ${preSelectedTrId === t.id ? 'selected' : ''}>${t.title}</option>`;
            });
            trSelectHtml += `</select>`;

            openModal('Agendar Treinamento', `
                <div class="space-y-4 text-left">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Treinamento *</label>
                        ${trSelectHtml}
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="block text-sm font-bold text-gray-700 mb-1">Data Planejada *</label><input type="date" id="schDate" class="w-full border p-2 rounded text-sm focus:ring-2 focus:ring-indigo-500 outline-none"></div>
                        <div><label class="block text-sm font-bold text-gray-700 mb-1">Carga Horária Prevista</label><input type="text" id="schWorkload" placeholder="Ex: 4h" class="w-full border p-2 rounded text-sm focus:ring-2 focus:ring-indigo-500 outline-none"></div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="block text-sm font-bold text-gray-700 mb-1">Instrutor Previsto</label><input type="text" id="schInstructor" placeholder="Nome do Instrutor" class="w-full border p-2 rounded text-sm focus:ring-2 focus:ring-indigo-500 outline-none"></div>
                        <div><label class="block text-sm font-bold text-gray-700 mb-1">Local</label><input type="text" id="schLocal" placeholder="Sala, Setor..." class="w-full border p-2 rounded text-sm focus:ring-2 focus:ring-indigo-500 outline-none"></div>
                    </div>
                    <div class="border-t border-gray-200 pt-4 mt-2">
                        <div class="flex justify-between items-center mb-2">
                            <label class="block text-sm font-bold text-gray-700">Equipe Convocada</label>
                            <div class="flex gap-2 w-1/2">
                                <select id="schExtraEmp" class="flex-1 border p-1 rounded text-xs"><option value="">Adicionar extra...</option></select>
                                <button type="button" onclick="addExtraScheduleEmp()" class="bg-indigo-50 text-indigo-700 px-2 py-1 rounded text-xs font-bold">Incluir</button>
                            </div>
                        </div>
                        <div id="schEmpContainer" class="border border-gray-200 rounded bg-gray-50 p-2 max-h-40 overflow-y-auto custom-scrollbar space-y-1">
                            <p class="text-xs text-gray-500 text-center py-4">Selecione o treinamento para carregar os pendentes.</p>
                        </div>
                    </div>
                </div>
            `, `<button onclick="closeModal()" class="px-4 py-2 text-gray-600 font-medium">Cancelar</button><button onclick="saveSchedule()" class="bg-indigo-600 text-white px-5 py-2 rounded-lg font-bold shadow hover:bg-indigo-700">Salvar Agendamento</button>`);

            if(preSelectedTrId) setTimeout(() => updateScheduleEmpList(), 50);
        }

        function updateScheduleEmpList() {
            const tId = parseInt(document.getElementById('schTrId').value);
            if(!tId) { document.getElementById('schEmpContainer').innerHTML='<p class="text-xs text-center py-4">Selecione o treinamento.</p>'; return; }
            
            // Busca quem deve fazer (Matriz) e quem está pendente (não fez ou venceu)
            const reqRoles = state.roles.filter(r=>r.trainingIds&&r.trainingIds.includes(tId)).map(r=>r.name);
            const tr = state.trainings.find(t=>t.id===tId);
            
            currentScheduleEmps = state.employees.filter(e => {
                if(e.status !== 'Ativo') return false;
                if(!reqRoles.includes(e.role)) return false;
                
                // Evita colocar quem já está agendado em outro dia no calendário
                if(state.plannedTrainings && state.plannedTrainings.some(pt => pt.trainingId === tId && pt.attendees.includes(e.id))) return false;

                const parts = state.attendanceLists.filter(l=>l.trainingId===tId&&l.attendees.includes(e.id)).sort((a,b)=>new Date(b.date)-new Date(a.date));
                if(parts.length === 0) return true; // Pendente

                if(tr.periodicityMonths > 0) {
                    const valDate = new Date(parts[0].date); valDate.setMonth(valDate.getMonth() + tr.periodicityMonths);
                    if(new Date() > valDate) return true; // Vencido
                }
                return false;
            });

            renderScheduleEmpList();
        }

        function renderScheduleEmpList(uncheckedIds = []) {
            document.getElementById('schEmpContainer').innerHTML = currentScheduleEmps.map(e => {
                const isChecked = !uncheckedIds.includes(e.id);
                return `<label class="flex items-center text-sm p-1.5 hover:bg-white rounded cursor-pointer border border-transparent hover:border-gray-200 transition"><input type="checkbox" name="schEmp" value="${e.id}" class="mr-3 w-4 h-4 text-indigo-600 rounded" ${isChecked?'checked':''}> <span class="font-medium text-gray-800">${e.name}</span> <span class="text-[10px] text-gray-500 ml-2">(${e.role})</span></label>`;
            }).join('') || '<p class="text-xs text-center text-gray-500 py-4">Nenhum funcionário pendente encontrado na matriz.</p>';
            
            const extraSelect = document.getElementById('schExtraEmp');
            const avail = state.employees.filter(e => e.status === 'Ativo' && !currentScheduleEmps.find(ce => ce.id === e.id));
            extraSelect.innerHTML = `<option value="">Adicionar outro colaborador...</option>` + avail.map(e => `<option value="${e.id}">${e.name} (${e.role})</option>`).join('');
        }

        function addExtraScheduleEmp() {
            const sel = document.getElementById('schExtraEmp'); const empId = parseInt(sel.value); if(!empId) return;
            const unchecked = Array.from(document.querySelectorAll('input[name="schEmp"]:not(:checked)')).map(cb=>parseInt(cb.value));
            const emp = state.employees.find(e=>e.id===empId);
            if(emp && !currentScheduleEmps.find(e=>e.id===emp.id)) { currentScheduleEmps.unshift(emp); renderScheduleEmpList(unchecked); }
        }

        function saveSchedule() {
            const tId = parseInt(document.getElementById('schTrId').value);
            const date = document.getElementById('schDate').value;
            const attendees = Array.from(document.querySelectorAll('input[name="schEmp"]:checked')).map(c => parseInt(c.value));

            if(!tId || !date || attendees.length === 0) {
                return Swal.fire('Atenção', 'Selecione o treinamento, a data e pelo menos um convocado.', 'warning');
            }

            const ptObj = {
                id: generateId(state.plannedTrainings || []),
                trainingId: tId,
                date: date,
                workload: document.getElementById('schWorkload').value,
                instructor: document.getElementById('schInstructor').value,
                local: document.getElementById('schLocal').value,
                attendees: attendees,
                status: 'Agendado'
            };

            dbSave('plannedTrainings', ptObj.id, ptObj);
            closeModal();
            Swal.fire({title: 'Agendado!', text: 'O treinamento foi inserido no calendário.', icon: 'success', timer: 2000, showConfirmButton: false});
        }

        // ================= VISUALIZAR E IMPRIMIR AGENDAMENTO =================
        function openEventDetailsModal(pt) {
            const emps = pt.attendees.map(id => state.employees.find(e => e.id === id)).filter(e => e);
            
            const bodyHtml = `
                <div class="text-left">
                    <div class="bg-indigo-50 p-4 rounded-xl border border-indigo-100 mb-4">
                        <h4 class="text-lg font-bold text-indigo-900">${pt.trainingName}</h4>
                        <div class="grid grid-cols-2 gap-2 mt-3 text-sm text-indigo-800">
                            <p><i data-lucide="calendar" class="w-4 h-4 inline mr-1"></i> Data: <strong>${formatDate(pt.date)}</strong></p>
                            <p><i data-lucide="clock" class="w-4 h-4 inline mr-1"></i> C.H.: <strong>${pt.workload || '-'}</strong></p>
                            <p><i data-lucide="user" class="w-4 h-4 inline mr-1"></i> Instrutor: <strong>${pt.instructor || '-'}</strong></p>
                            <p><i data-lucide="map-pin" class="w-4 h-4 inline mr-1"></i> Local: <strong>${pt.local || '-'}</strong></p>
                        </div>
                    </div>
                    
                    <h5 class="font-bold text-sm text-gray-700 border-b pb-1 mb-2">Convocados (${emps.length})</h5>
                    <ul class="max-h-40 overflow-y-auto custom-scrollbar space-y-1 mb-4 border p-2 rounded bg-gray-50">
                        ${emps.map(e => `<li class="text-xs text-gray-800">&bull; ${e.name} <span class="text-gray-400">(${e.role})</span></li>`).join('')}
                    </ul>

                    <div class="bg-amber-50 border border-amber-200 p-3 rounded-lg flex items-start text-xs text-amber-800">
                        <i data-lucide="info" class="w-5 h-5 mr-2 flex-shrink-0"></i>
                        <p><strong>Como concluir?</strong> Imprima a lista, aplique o treino e depois vá ao módulo de <strong>Operação > Listas de Presença</strong> para inserir o PDF assinado. O sistema entenderá que foi concluído.</p>
                    </div>
                </div>
            `;

            const footerHtml = `
                <button onclick="deleteSchedule(${pt.id})" class="text-red-500 hover:text-red-700 font-bold text-sm mr-auto transition">Excluir Agendamento</button>
                <button onclick="closeModal()" class="px-4 py-2 text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-lg font-medium transition">Fechar</button>
                <button onclick="printPlannedAttendance(${pt.id})" class="bg-indigo-600 text-white px-4 py-2 rounded-lg font-bold hover:bg-indigo-700 shadow flex items-center transition">
                    <i data-lucide="printer" class="w-4 h-4 mr-2"></i> Imprimir Lista
                </button>
            `;

            openModal('Detalhes do Agendamento', bodyHtml, footerHtml);
        }

        function deleteSchedule(id) {
            Swal.fire({
                title: 'Excluir Agendamento?', text: 'Esta ação não apaga registros de treinamentos já realizados, apenas remove do calendário.', icon: 'warning', showCancelButton: true, confirmButtonText: 'Sim, excluir', confirmButtonColor: '#d33'
            }).then(r => {
                if(r.isConfirmed) {
                    dbDelete('plannedTrainings', id);
                    closeModal();
                    Swal.fire({title: 'Excluído', icon: 'success', timer: 1500, showConfirmButton: false});
                }
            });
        }

        // ================= IMPRESSÃO DA LISTA AGENDADA =================
        const getPrintStyles = () => `
            <style>
                @media print { @page { margin: 1cm; } body { -webkit-print-color-adjust: exact; print-color-adjust: exact; } .page-break { page-break-after: always; } }
                body { font-family: 'Arial', sans-serif; color: #000; margin: 0; padding: 20px; font-size: 12px; }
                .doc-header { display: flex; border: 2px solid #000; margin-bottom: 15px; }
                .doc-header .logo { width: 160px; border-right: 2px solid #000; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 16px; background: #f0f0f0; }
                .doc-header .title-box { flex: 1; text-align: center; display: flex; flex-direction: column; justify-content: center; border-right: 2px solid #000; }
                .doc-header .title-box h1 { margin: 0; font-size: 16px; text-transform: uppercase; font-weight: bold; }
                .doc-header .info-box { width: 130px; display: flex; flex-direction: column; justify-content: center; font-size: 10px; }
                .doc-header .info-box div { border-bottom: 1px solid #000; padding: 4px 5px; font-weight: bold; }
                .doc-header .info-box div:last-child { border-bottom: none; }
                .info-table { width: 100%; border-collapse: collapse; margin-bottom: 15px; border: 2px solid #000; }
                .info-table th, .info-table td { border: 1px solid #000; padding: 6px; text-align: left; }
                .info-table th { background-color: #f0f0f0; width: 110px; font-size: 11px; text-transform: uppercase; }
                .info-table td { font-size: 12px; font-weight: bold; color: #333; }
                .part-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; border: 2px solid #000; }
                .part-table th, .part-table td { border: 1px solid #000; padding: 6px 8px; text-align: left; vertical-align: middle; }
                .part-table th { background-color: #f0f0f0; font-size: 11px; text-transform: uppercase; text-align: center; }
                .part-table td.signature { width: 220px; height: 30px; }
                .footer-signatures { display: flex; justify-content: space-between; margin-top: 50px; text-align: center; padding: 0 40px; }
                .footer-signatures .sign-box { width: 40%; }
                .footer-signatures .sign-line { border-top: 1px solid #000; padding-top: 5px; font-weight: bold; text-transform: uppercase; font-size: 10px; }
            </style>
        `;

        function printPlannedAttendance(ptId) {
            const pt = state.plannedTrainings.find(x => x.id === ptId);
            const tr = state.trainings.find(x => x.id === pt.trainingId);
            if(!pt || !tr) return;
            
            const emps = pt.attendees.map(id => state.employees.find(e => e.id === id)).filter(e => e);

            let w = window.open('','_blank');
            if(!w) { Swal.fire('Aviso','Bloqueador de pop-ups ativo. Permita para imprimir.','warning'); return; }

            let h = `<html><head><title>Lista de Presença Agendada</title>${getPrintStyles()}</head><body>
            <div class="doc-header">
                <div class="logo">LOGOTIPO</div><div class="title-box"><h1>Lista de Presença / Reg. Treinamento</h1></div>
                <div class="info-box"><div>DOC: SGQ-FOR-001</div><div>DATA: ${formatDate(pt.date)}</div></div>
            </div>
            <table class="info-table">
                <tr><th>Treinamento:</th><td colspan="3">${tr.title}</td></tr>
                <tr><th>Instrutor(a):</th><td>${pt.instructor || '___________________'}</td><th>Data Prevista:</th><td>${formatDate(pt.date)}</td></tr>
                <tr><th>Carga Horária:</th><td>${pt.workload || '___________________'}</td><th>Local:</th><td>${pt.local || '___________________'}</td></tr>
            </table>
            <table class="part-table">
                <thead><tr><th style="width: 5%;">Nº</th><th>Colaborador(a)</th><th>Cargo</th><th>Assinatura</th></tr></thead>
                <tbody>`;
            
            emps.forEach((e, idx) => { h += `<tr><td style="text-align: center;">${idx + 1}</td><td>${e.name}</td><td>${e.role}</td><td class="signature"></td></tr>`; });
            for(let j=0; j<4; j++) h += `<tr><td></td><td></td><td></td><td class="signature"></td></tr>`;
            
            h += `</tbody></table>
            <div class="footer-signatures"><div class="sign-box"><div class="sign-line">Instrutor Responsável</div></div><div class="sign-box"><div class="sign-line">Aprovação (Liderança/RH)</div></div></div>
            <script>setTimeout(()=>window.print(),500);<\/script></body></html>`;
            
            w.document.write(h); w.document.close();
        }

        // INICIALIZAÇÃO
        auth.onAuthStateChanged((user) => { 
            if(user) { 
                currentUser = user; 
                document.getElementById('user-avatar').innerText = user.email ? user.email.charAt(0).toUpperCase() : 'U'; 
                loadDataFromFirestore(); 
            } else {
                auth.signInAnonymously(); 
            }
        });
    </script>
</body>
</html>
