<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório de Ocorrência e RNC - REVIMAQ</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            text-transform: uppercase; 
            background: #f1f5f9; 
            margin: 0;
            padding: 0;
        }

        /* Estilos específicos para Impressão */
        @media print { 
            body { background: white !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .no-print { display: none !important; }
            .print-area { display: block !important; width: 100% !important; max-width: 100% !important; margin: 0 !important; padding: 0 !important; box-shadow: none !important; }
            @page { margin: 1cm; size: A4 portrait; }
        }
    </style>
</head>
<body class="p-4 sm:p-8">

    <!-- Barra de Ações (Não sai na impressão) -->
    <div class="no-print max-w-4xl mx-auto mb-6 flex justify-between items-center bg-white p-4 rounded-xl shadow-sm border border-slate-200">
        <button onclick="history.back()" class="bg-slate-100 hover:bg-slate-200 text-slate-700 px-6 py-2.5 rounded-lg font-bold transition flex items-center">
            <i class="ph ph-arrow-left mr-2 text-lg"></i> VOLTAR
        </button>
        <button onclick="window.print()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-2.5 rounded-lg font-black shadow-lg transition flex items-center">
            <i class="ph ph-printer mr-2 text-xl"></i> IMPRIMIR RELATÓRIO
        </button>
    </div>

    <!-- Área do Relatório -->
    <div class="print-area max-w-4xl mx-auto bg-white shadow-2xl print:shadow-none text-slate-900 text-xs pb-4">
        
        <div id="report-container">
            <!-- Loading State -->
            <div class="flex flex-col items-center justify-center py-20">
                <i class="ph ph-spinner animate-spin text-4xl text-indigo-600 mb-4"></i>
                <p class="font-bold text-slate-500 tracking-widest">A GERAR RELATÓRIO...</p>
            </div>
        </div>

    </div>

    <!-- FIREBASE V8 -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyBqV0KOQMAYR4z6P_RKnrQPDfkAR2CsXBI", 
            authDomain: "gestao-de-pessoas-49200.firebaseapp.com", 
            projectId: "gestao-de-pessoas-49200", 
            storageBucket: "gestao-de-pessoas-49200.firebasestorage.app", 
            messagingSenderId: "615097388185", 
            appId: "1:615097388185:web:ef87969b64f4a886f23c08" 
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Autenticação anônima rápida e leitura do documento
        firebase.auth().signInAnonymously().then(() => {
            const urlParams = new URLSearchParams(window.location.search);
            const idDb = urlParams.get('id');

            if(idDb) {
                db.collection("ocorrencias").doc(idDb).get().then(doc => {
                    if (doc.exists) {
                        renderReport(doc.data());
                    } else {
                        document.getElementById('report-container').innerHTML = `<div class="p-10 text-center text-red-600 font-black text-xl">OCORRÊNCIA NÃO ENCONTRADA.</div>`;
                    }
                }).catch(err => {
                    console.error("Erro:", err);
                    document.getElementById('report-container').innerHTML = `<div class="p-10 text-center text-red-600 font-black text-xl">ERRO AO CARREGAR DADOS.</div>`;
                });
            } else {
                document.getElementById('report-container').innerHTML = `<div class="p-10 text-center text-slate-500 font-black text-xl">ID DA OCORRÊNCIA NÃO FORNECIDO.</div>`;
            }
        });

        // Função para formatar datas
        function formatDate(dateStr) {
            if (!dateStr || dateStr === '') return '-';
            if (dateStr.includes('T')) dateStr = dateStr.split('T')[0];
            if (dateStr.includes('-')) return dateStr.split('-').reverse().join('/');
            return dateStr;
        }

        // Constrói o HTML do Relatório
        function renderReport(data) {
            const isRNC = (data.necessitaRNC || '').toUpperCase() === 'SIM';
            const dataOcorrencia = formatDate(data.dataOcorrencia);

            let rncHtml = '';
            if (isRNC) {
                rncHtml = `
                <div class="border-b-2 border-slate-900 bg-red-50/20">
                    <h3 class="bg-red-600 text-white p-1.5 px-4 font-black text-[10px] tracking-widest border-b border-slate-900 flex items-center shadow-sm">
                        <i class="ph-bold ph-folder-warning mr-2 text-sm"></i>
                        5. TRATAMENTO DE NÃO CONFORMIDADE E AÇÃO CORRETIVA (ITEM 10.2)
                    </h3>
                    
                    <div class="grid grid-cols-3 divide-x divide-slate-900 border-b border-slate-900 bg-red-50/40">
                        <div class="p-2"><span class="font-black text-[8px] text-red-600 block mb-0.5">RISCO POTENCIAL?</span> <span class="font-black text-xs">${data.rncRiscoPotencial || '-'}</span></div>
                        <div class="p-2"><span class="font-black text-[8px] text-red-600 block mb-0.5">ATUALIZOU RISCOS?</span> <span class="font-black text-xs">${data.rncAtualizarRiscos || '-'}</span></div>
                        <div class="p-2"><span class="font-black text-[8px] text-red-600 block mb-0.5">DATA DA ANÁLISE 10.2:</span> <span class="font-bold text-xs">${formatDate(data.rncDataRiscos)}</span></div>
                    </div>
                    
                    <!-- ISHIKAWA -->
                    <div class="p-4 bg-white border-b border-slate-900">
                        <span class="font-black text-[9px] text-red-700 block mb-3 tracking-widest">ANÁLISE DE CAUSA RAIZ (ISHIKAWA - 6M):</span>
                        <div class="grid grid-cols-2 gap-y-3 gap-x-8">
                            <div class="border-l-[3px] border-red-200 pl-2"><span class="font-black text-[7px] text-slate-400 block mb-0.5">01. MÉTODO:</span><p class="text-[10px] font-medium leading-tight">${data.rncMetodo || '-'}</p></div>
                            <div class="border-l-[3px] border-red-200 pl-2"><span class="font-black text-[7px] text-slate-400 block mb-0.5">04. MEIO AMBIENTE:</span><p class="text-[10px] font-medium leading-tight">${data.rncMeioAmbiente || '-'}</p></div>
                            <div class="border-l-[3px] border-red-200 pl-2"><span class="font-black text-[7px] text-slate-400 block mb-0.5">02. MÁQUINA:</span><p class="text-[10px] font-medium leading-tight">${data.rncMaquina || '-'}</p></div>
                            <div class="border-l-[3px] border-red-200 pl-2"><span class="font-black text-[7px] text-slate-400 block mb-0.5">05. MÃO DE OBRA:</span><p class="text-[10px] font-medium leading-tight">${data.rncMaoDeObra || '-'}</p></div>
                            <div class="border-l-[3px] border-red-200 pl-2"><span class="font-black text-[7px] text-slate-400 block mb-0.5">03. MEDIDA:</span><p class="text-[10px] font-medium leading-tight">${data.rncMedida || '-'}</p></div>
                            <div class="border-l-[3px] border-red-200 pl-2"><span class="font-black text-[7px] text-slate-400 block mb-0.5">06. MATERIAL:</span><p class="text-[10px] font-medium leading-tight">${data.rncMaterial || '-'}</p></div>
                        </div>
                    </div>
                    
                    <!-- CAUSA RAIZ -->
                    <div class="p-4 bg-red-50/50 border-b border-slate-900 border-l-[8px] border-l-red-500">
                        <span class="font-black text-[9px] text-red-700 block mb-1.5 tracking-widest">CONCLUSÃO - CAUSA RAIZ IDENTIFICADA:</span>
                        <p class="text-sm font-black text-slate-800">${data.rncCausaRaiz || 'NÃO DEFINIDA.'}</p>
                    </div>

                    <!-- PLANO DE AÇÃO -->
                    <div class="p-4 bg-white min-h-[100px]">
                        <span class="font-black text-[9px] text-red-700 block mb-1.5 tracking-widest flex items-center"><i class="ph-bold ph-list-checks mr-1.5"></i> PLANO DE AÇÃO CORRETIVA:</span>
                        <p class="text-sm font-medium whitespace-pre-wrap text-slate-700 bg-slate-50 p-3 rounded border border-slate-100">${data.rncAcaoCorretiva || 'PENDENTE DE AÇÃO.'}</p>
                        
                        <div class="grid grid-cols-4 mt-4 bg-slate-50 border border-slate-200 rounded divide-x divide-slate-200">
                            <div class="p-2"><span class="font-black text-[7px] text-slate-400 block mb-0.5">RESPONSÁVEL PELA AÇÃO:</span><p class="text-[10px] font-bold">${data.rncResponsavelAcao || '-'}</p></div>
                            <div class="p-2"><span class="font-black text-[7px] text-slate-400 block mb-0.5">PREVISÃO:</span><p class="text-[10px] font-bold">${formatDate(data.rncPrevisao)}</p></div>
                            <div class="p-2"><span class="font-black text-[7px] text-slate-400 block mb-0.5">REALIZADO:</span><p class="text-[10px] font-bold">${formatDate(data.rncRealizado)}</p></div>
                            <div class="p-2"><span class="font-black text-[7px] text-slate-400 block mb-0.5">STATUS DA AÇÃO:</span><p class="text-[10px] font-black text-indigo-700">${data.rncStatusAcao || '-'}</p></div>
                        </div>
                    </div>
                </div>
                `;
            }

            let html = `
            <div class="border-[3px] border-slate-900 bg-white">
                <!-- HEADER -->
                <div class="flex justify-between items-center border-b-[3px] border-slate-900 p-5 bg-slate-50">
                    <div class="space-y-1">
                        <h1 class="text-2xl font-black uppercase tracking-tighter leading-none">${isRNC ? 'RELATÓRIO DE NÃO CONFORMIDADE (RNC)' : 'RELATÓRIO DE OCORRÊNCIA (RO)'}</h1>
                        <h2 class="text-sm font-bold text-slate-500 flex items-center tracking-widest"><i class="ph-fill ph-shield-check mr-1.5 text-indigo-600 text-lg"></i> ISO 9001:2015 - REVIMAQ</h2>
                    </div>
                    <div class="text-right flex flex-col items-end">
                        <div class="text-2xl font-black text-red-600 border-[3px] border-red-600 px-4 py-1 inline-block leading-none bg-white">${isRNC ? (data.rncId || 'S/C') : (data.id || 'S/C')}</div>
                        ${isRNC ? `<p class="text-[9px] font-black text-slate-500 mt-1.5 bg-slate-200 px-2 py-0.5 rounded">VÍNCULO RO: ${data.id || 'N/A'}</p>` : ''}
                        <p class="text-[9px] font-black mt-2 text-slate-400 tracking-widest">DATA EMISSÃO: ${dataOcorrencia}</p>
                    </div>
                </div>

                <!-- 1. IDENTIFICAÇÃO E RASTREABILIDADE -->
                <div class="border-b-2 border-slate-900">
                    <h3 class="bg-slate-900 text-white p-1.5 px-4 font-black text-[10px] tracking-widest">1. IDENTIFICAÇÃO E RASTREABILIDADE</h3>
                    <div class="grid grid-cols-4 border-t border-slate-900 bg-white">
                        <div class="p-2 border-r border-b border-slate-900 col-span-2"><span class="font-black text-[8px] text-slate-400 block mb-0.5">EMITENTE / AVALIADOR:</span> <span class="font-bold text-sm text-slate-800">${data.emitidoPor || '-'}</span></div>
                        <div class="p-2 border-r border-b border-slate-900"><span class="font-black text-[8px] text-slate-400 block mb-0.5">ORIGEM DA OCORRÊNCIA:</span> <span class="font-bold text-slate-800">${data.origem || '-'}</span></div>
                        <div class="p-2 border-b border-slate-900"><span class="font-black text-[8px] text-slate-400 block mb-0.5">PROCEDENTE?:</span> <span class="font-black text-indigo-700">${data.procedente || '-'}</span></div>
                        
                        <div class="p-2 border-r border-b border-slate-900 col-span-2"><span class="font-black text-[8px] text-slate-400 block mb-0.5">ÁREA / SETOR AFETADO:</span> <span class="font-bold text-sm text-slate-800">${data.area || '-'}</span></div>
                        <div class="p-2 border-b border-slate-900 col-span-2"><span class="font-black text-[8px] text-slate-400 block mb-0.5">PROCESSO:</span> <span class="font-bold text-slate-800">${data.processo || '-'}</span></div>

                        <div class="p-2 border-r border-slate-900 col-span-2 bg-slate-50"><span class="font-black text-[8px] text-slate-400 block mb-0.5">PRODUTO / ITEM:</span> <span class="font-bold text-slate-800">${data.produto || '-'}</span></div>
                        <div class="p-2 col-span-2 bg-slate-50"><span class="font-black text-[8px] text-slate-400 block mb-0.5">CLIENTE E REFERÊNCIA:</span> <span class="font-bold text-slate-800">${data.cliente || '-'} ${data.referencia ? `(REF: ${data.referencia})` : ''}</span></div>
                    </div>
                </div>

                <!-- 2. DESCRIÇÃO DA NÃO CONFORMIDADE -->
                <div class="border-b-2 border-slate-900">
                    <h3 class="bg-slate-200 p-1.5 px-4 font-black text-[10px] tracking-widest border-b border-slate-900 text-slate-800">2. DESCRIÇÃO DA NÃO CONFORMIDADE</h3>
                    <div class="p-4 space-y-4 bg-white">
                        <div><span class="font-black text-[8px] text-slate-400 block mb-0.5">TÍTULO / DESVIO:</span><p class="font-black text-lg tracking-tight text-slate-900">${data.titulo || '-'}</p></div>
                        <div><span class="font-black text-[8px] text-slate-400 block mb-1">DESCRIÇÃO DETALHADA DO PROBLEMA:</span><p class="text-[13px] whitespace-pre-wrap leading-relaxed font-medium text-slate-700 bg-slate-50 p-3 rounded border border-slate-100">${data.descricao || '-'}</p></div>
                        ${data.efeito ? `<div><span class="font-black text-[8px] text-slate-400 block mb-0.5">EFEITO / CONSEQUÊNCIA:</span><p class="text-xs italic text-slate-600">${data.efeito}</p></div>` : ''}
                    </div>
                </div>

                <!-- 3. DISPOSIÇÃO E AÇÃO IMEDIATA (CONTROLE 8.7) -->
                <div class="border-b-2 border-slate-900">
                    <h3 class="bg-yellow-100 p-1.5 px-4 font-black text-[10px] tracking-widest border-b border-slate-900 text-yellow-900">3. DISPOSIÇÃO E AÇÃO IMEDIATA (CONTROLE 8.7)</h3>
                    <div class="p-4 border-b border-slate-900 bg-yellow-50/30">
                        <span class="font-black text-[9px] text-yellow-700 block mb-1 flex items-center"><i class="ph-bold ph-lightning mr-1.5 text-yellow-600"></i> AÇÃO DE CONTENÇÃO / IMEDIATA:</span>
                        <p class="text-sm font-bold text-slate-800">${data.acaoImediata || '-'}</p>
                    </div>
                    <div class="grid grid-cols-4 bg-white divide-x divide-slate-900">
                        <div class="p-2"><span class="font-black text-[8px] text-slate-400 block mb-0.5">TIPO DE DISPOSIÇÃO:</span> <span class="font-black text-xs text-slate-800">${data.disposicao || '-'}</span></div>
                        <div class="p-2"><span class="font-black text-[8px] text-slate-400 block mb-0.5">RESPONSÁVEL PELA AÇÃO:</span> <span class="font-bold text-slate-800">${data.respDisposicao || '-'}</span></div>
                        <div class="p-2"><span class="font-black text-[8px] text-slate-400 block mb-0.5">PRAZO:</span> <span class="font-bold text-slate-800">${formatDate(data.prazo)}</span></div>
                        <div class="p-2"><span class="font-black text-[8px] text-slate-400 block mb-0.5">CUSTO ESTIMADO:</span> <span class="font-black text-red-600">R$ ${data.custo || '0,00'}</span></div>
                    </div>
                </div>

                <!-- 4. ANÁLISE DE DADOS E ENCERRAMENTO -->
                <div class="border-b-2 border-slate-900">
                    <h3 class="bg-slate-200 p-1.5 px-4 font-black text-[10px] tracking-widest border-b border-slate-900 text-slate-800">4. AVALIAÇÃO DE NECESSIDADE E STATUS (RO)</h3>
                    <div class="grid grid-cols-3 divide-x divide-slate-900 border-b border-slate-900">
                        <div class="p-2 ${isRNC ? 'bg-red-50' : 'bg-slate-50'} flex flex-col justify-center">
                            <span class="font-black text-[8px] ${isRNC ? 'text-red-500' : 'text-slate-400'} block mb-0.5">NECESSITA ABERTURA DE RNC?</span> 
                            <span class="font-black text-sm ${isRNC ? 'text-red-700' : 'text-slate-700'}">${data.necessitaRNC || 'NÃO AVALIADO'}</span>
                        </div>
                        <div class="p-2 bg-white flex flex-col justify-center">
                            <span class="font-black text-[8px] text-slate-400 block mb-0.5">STATUS GERAL (RO):</span> 
                            <span class="font-black text-sm text-indigo-700">${data.status || 'ABERTO'}</span>
                        </div>
                        <div class="p-2 bg-white flex flex-col justify-center">
                            <span class="font-black text-[8px] text-slate-400 block mb-0.5">DATA ENCERRAMENTO:</span> 
                            <span class="font-bold text-slate-800">${formatDate(data.dataEncerramento)}</span>
                        </div>
                    </div>
                    <div class="p-4 bg-white">
                        <span class="font-black text-[8px] text-slate-400 block mb-1">JUSTIFICATIVAS / ANÁLISE DE EFICÁCIA FINAL:</span>
                        <p class="text-xs text-slate-700 italic">${data.analiseSaida || 'Nenhuma justificativa registada.'}</p>
                    </div>
                </div>

                <!-- INJEÇÃO DA SESSÃO 5 SE HOUVER RNC -->
                ${rncHtml}

                <!-- ASSINATURAS -->
                <div class="grid grid-cols-2 h-32 divide-x divide-slate-900 bg-white">
                    <div class="flex flex-col justify-end items-center p-4">
                        <div class="w-64 border-t-[3px] border-slate-900 pt-2 text-center text-[10px] font-black uppercase text-slate-600 tracking-widest">RESPONSÁVEL PELA EMISSÃO</div>
                    </div>
                    <div class="flex flex-col justify-end items-center p-4 bg-slate-50">
                        <div class="w-64 border-t-[3px] border-slate-900 pt-2 text-center text-[10px] font-black uppercase text-slate-600 tracking-widest">GESTÃO DA QUALIDADE / SGQ</div>
                    </div>
                </div>
            </div>
            
            <!-- RODAPÉ -->
            <div class="mt-4 flex justify-between items-center text-[9px] font-black text-slate-400 px-4 border-t border-slate-300 pt-3 uppercase tracking-widest">
                <span>SISTEMA SGQ - REVIMAQ</span>
                <span>DOCUMENTO GERADO ELETRONICAMENTE</span>
                <span>PÁGINA 01 / 01</span>
            </div>
            `;

            document.getElementById('report-container').innerHTML = html;
        }
    </script>
</body>
</html>
