        <div class="max-w-4xl mx-auto bg-white rounded-lg shadow-md p-6 uppercase">
            <div class="flex justify-between items-center border-b pb-4 mb-6">

            </div>

            <div id="loading-state" class="flex h-32 w-full items-center justify-center">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-amber-600"></div>

            </div>
            
            <form id="instrumentForm" class="space-y-4 hidden">

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1 uppercase">TAG / Nº Patrimônio *</label>

                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1 uppercase">Descrição do Equipamento *</label>
                        <input type="text" id="descricao" required class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-isoBlue/20 uppercase" placeholder="Ex: Paquímetro Digital 150mm">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1 uppercase">Fabricante</label>
                        <input type="text" id="fabricante" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-isoBlue/20 uppercase">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1 uppercase">Nº Série</label>
                        <input type="text" id="serie" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-isoBlue/20 uppercase">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1 uppercase">Resolução</label>
                        <input type="text" id="resolucao" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-isoBlue/20 uppercase" placeholder="Ex: 0,01 mm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1 uppercase">Tolerância do Processo</label>
                        <input type="text" id="tolerancia" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-isoBlue/20 uppercase" placeholder="Ex: ± 0,05 mm">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1 uppercase">Localização / Setor</label>
                    <select id="setor" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-isoBlue/20 bg-white uppercase">

                        <option value="Produção">Produção</option>
                        <option value="Manutenção">Manutenção</option>
                        <option value="Laboratório">Laboratório</option>
                        <option value="Almoxarifado">Almoxarifado</option>

                <!-- SESSÃO DE ANEXOS DO EQUIPAMENTO -->

                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1 uppercase text-blue-800" title="Para avaliar em porcentagem, adicione o sinal %. Ex: 3%">Critério Aceitação (EMA)</label>

        &copy; 2026 REVIMAQ - Controle de Monitoramento e Medição (ISO 9001:2015)
    </footer>

    <!-- Scripts de Lógica -->
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBqV0KOQMAYR4z6P_RKnrQPDfkAR2CsXBI",
            authDomain: "gestao-de-pessoas-49200.firebaseapp.com",
            projectId: "gestao-de-pessoas-49200",
            storageBucket: "gestao-de-pessoas-49200.firebasestorage.app",
            messagingSenderId: "615097388185",
            appId: "1:615097388185:web:efe0ff09ca41de81f23c08"
        };

        let ativos = [], logs = [], db, userId = null, currentUser = null, appId = 'gestao-de-pessoas-49200';
        let anexosPendentes = [];

        // Módulos do Storage Global
        let firebaseStorage = null;
        let storageRefModule = null;
        let uploadBytesModule = null;
        let getDownloadURLModule = null;

        // Permissões
        let state = { roles: [], employees: [] };
        let userPermissions = {};

        async function init() {
            try {
                const { initializeApp } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js");
                const { getAuth, signInAnonymously, onAuthStateChanged } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js");
                const { getFirestore, doc, collection, onSnapshot, setDoc } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");
                
                // Importar o Firebase Storage para uploads
                const { getStorage, ref, uploadBytes, getDownloadURL } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-storage.js");
                storageRefModule = ref;
                uploadBytesModule = uploadBytes;
                getDownloadURLModule = getDownloadURL;

                const app = initializeApp(firebaseConfig);
                const auth = getAuth(app);
                db = getFirestore(app);
                firebaseStorage = getStorage(app);

                const setupListeners = (userObj) => {
                    let dataLoaded = { roles: false, emp: false, cal: false };
                    
                    const tryRender = () => {
                        if (dataLoaded.roles && dataLoaded.emp && dataLoaded.cal) {
                            updatePermissions(userObj);
                            document.getElementById('loading-state').classList.add('hidden');
                            
                            const isEdit = new URLSearchParams(window.location.search).get('edit');
                            
                            // Bloqueio ultra-rigoroso:
                            // Se for para editar e não tem permissão de edição, BLOQUEIA.
                            // Se for para criar (não tem id de edição) e não tem permissão de criar, BLOQUEIA.
                            if (isEdit && !checkPerm('calibracao', 'edit')) {
                                showAccessDenied();
                            } else if (!isEdit && !checkPerm('calibracao', 'create')) {
                                showAccessDenied();
                            } else {
                                // PERMISSÃO CONCEDIDA!
                                document.getElementById('instrumentForm').classList.remove('hidden');
                                checkEditMode(); // Apenas preenche os dados, não faz nova verificação
                                if(window.lucide) window.lucide.createIcons();
                            }
                        }
                    };

                    const rolesRef = collection(db, 'artifacts', appId, 'public', 'data', 'roles');
                    onSnapshot(rolesRef, snap => { state.roles = snap.docs.map(d => d.data()); dataLoaded.roles = true; tryRender(); });

                    const empRef = collection(db, 'artifacts', appId, 'public', 'data', 'employees');
                    onSnapshot(empRef, snap => { state.employees = snap.docs.map(d => d.data()); dataLoaded.emp = true; tryRender(); });

                    const globalDocRef = doc(db, 'calibracao', 'inventario_geral');
                    onSnapshot(globalDocRef, async snap => {
                        if (snap.exists() && snap.data().lista) {
                            ativos = snap.data().lista;
                            logs = snap.data().logs || [];
                        }
                        dataLoaded.cal = true; tryRender();
                    }, (err) => {
                        console.error("ERRO FIREBASE:", err);
                    });
                };

                onAuthStateChanged(auth, user => {
                    if (user && user.email) {
                        // Conta Real Logada
                        currentUser = user;
                        userId = user.uid;
                        if(document.getElementById('user-avatar')) document.getElementById('user-avatar').innerText = user.email.charAt(0).toUpperCase();
                        setupListeners(currentUser);
                    } else if (user) {
                        // Conta Anônima (Visitante) - Sem E-mail
                        currentUser = { email: 'Visitante' };
                        userId = user.uid;
                        setupListeners(currentUser);
                    } else {
                        // Ninguém logado, forçar o login anônimo
                        signInAnonymously(auth);
                    }
                });
            } catch (e) { 
                console.error("Erro na inicialização:", e);
                showAccessDenied(); // Falhou na conexão? Bloqueia a segurança por precaução.
            }
        }

        // LÓGICA BLINDADA DE PERMISSÃO
        function updatePermissions(user) {
            userPermissions = {}; // Por padrão, bloqueia TUDO
            if (!user || !user.email) return;

            // Porta dos fundos para desenvolvimento local
            if (user.email === 'Local') {
                userPermissions = { calibracao: { view:true, create:true, edit:true, delete:true } };
                return;
            }

            const currentEmp = state.employees.find(e => e.email && e.email.toLowerCase() === user.email.toLowerCase());
            if (currentEmp) {
                const roleObj = state.roles.find(r => r.name === currentEmp.role);
                if (roleObj && roleObj.permissions) {
                    userPermissions = roleObj.permissions;
                }
            }
        }

        // VERIFICAÇÃO SEVERA DE REGRAS
        function checkPerm(module, action) {
            if (currentUser && currentUser.email === 'Local') return true; 
            
            const modPerms = userPermissions[module] || userPermissions['ativos'] || userPermissions['equipamentos'];
            
            // Se o módulo não estiver configurado para a pessoa, recusa imediatamente!
            if (!modPerms) return false; 
            
            return modPerms[action] === true;
        }

        function showAccessDenied() {
            const mainContent = document.getElementById('app-main-content');
            if (mainContent) {
                mainContent.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-96 text-center">
                        <div class="text-red-500 mb-4"><i class="fa-solid fa-lock text-6xl"></i></div>
                        <h3 class="text-2xl font-bold text-gray-800 uppercase">Acesso Restrito</h3>
                        <p class="text-gray-500 mt-2 uppercase">O seu perfil não possui permissões suficientes para cadastrar ou editar este módulo.</p>
                        <button onclick="navigateTo('dashboard.html')" class="mt-6 bg-slate-800 text-white px-6 py-2 rounded-md font-bold uppercase hover:bg-slate-700 transition-colors">Voltar ao Início</button>
                    </div>
                `;
            }
        }

        async function salvar() {
            if (!userId) return;
            const { doc, setDoc } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");
            
            const globalDocRef = doc(db, 'calibracao', 'inventario_geral');
            await setDoc(globalDocRef, { lista: ativos, logs: logs });
            
            try { localStorage.setItem('backup_calibracao', JSON.stringify({ lista: ativos, logs: logs })); } catch (e) {}
        }

        async function registrarLog(acao, detalhe) {
            logs.unshift({
                data: new Date().toISOString(),
                acao: acao.toUpperCase(),
                user: userId ? userId.substring(0, 8).toUpperCase() : "SISTEMA",
                detalhe: detalhe.toUpperCase()
            });
            if (logs.length > 500) logs.pop();
            await salvar();
        }

        function processarAnexos(e) {
            const files = Array.from(e.target.files);
            files.forEach(f => {
                anexosPendentes.push({ nome: f.name.toUpperCase(), tipo: f.type, fileObj: f });
                renderListaFicheiros();
            });
        }

        function renderListaFicheiros() {
            document.getElementById('listaAnexosForm').innerHTML = anexosPendentes.map((f, i) => `
                <div class="flex justify-between items-center bg-blue-50 p-1.5 rounded border border-blue-100">
                    <span class="text-[9px] font-bold text-blue-800 truncate w-3/4"><i class="fa-solid fa-file mr-1"></i> ${f.nome}</span>
                    <button type="button" onclick="anexosPendentes.splice(${i},1); renderListaFicheiros()" class="text-red-500 text-xs"><i class="fa-solid fa-trash"></i></button>
                </div>
            `).join('');
        }

        function toggleCalibracaoFields() {
            const div = document.getElementById('calibracaoFields');
            div.style.opacity = document.getElementById('requerCalibracao').checked ? '1' : '0.5';
        }

        function resetForm() { 
            document.getElementById('instrumentForm').reset(); 
            document.getElementById('instrumentId').value = ''; 
            document.getElementById('formTitle').innerText = "NOVO INSTRUMENTO"; 
            anexosPendentes = []; 
            renderListaFicheiros(); 
            toggleCalibracaoFields();
        }

        function checkEditMode() {
            const urlParams = new URLSearchParams(window.location.search);
            const editId = urlParams.get('edit');

            if (editId) {
                const a = ativos.find(x => String(x.id) === String(editId));
                if (a) {
                    document.getElementById('instrumentId').value = a.id;
                    document.getElementById('tag').value = a.tag || '';
                    document.getElementById('descricao').value = a.descricao || '';
                    document.getElementById('fabricante').value = a.fabricante || '';
                    document.getElementById('serie').value = a.serie || '';
                    document.getElementById('resolucao').value = a.resolucao || '';
                    document.getElementById('tolerancia').value = a.tolerancia || '';
                    document.getElementById('requerCalibracao').checked = a.requerCalibracao !== false; 
                    document.getElementById('frequencia').value = a.frequencia || 12;
                    document.getElementById('erroMaximo').value = a.erroMaximo || '';
                    document.getElementById('setor').value = a.setor || 'Controle de Qualidade';
                    
                    anexosPendentes = [...(a.anexos || [])]; 
                    renderListaFicheiros();
                    document.getElementById('formTitle').innerText = "EDITAR: " + (a.tag || '');
                    toggleCalibracaoFields();
                }
            }
        }

        document.getElementById('instrumentForm').addEventListener('submit', async e => {
            e.preventDefault();
            const btnSubmit = document.getElementById('btnSubmit');
            btnSubmit.disabled = true;
            btnSubmit.innerText = 'A FAZER UPLOAD E GRAVAR...';

            try {
                const id = document.getElementById('instrumentId').value || Date.now().toString();
                const tag = document.getElementById('tag').value.toUpperCase();

                const processedAnexos = [];
                for (let anexo of anexosPendentes) {
                    if (anexo.fileObj && firebaseStorage) {
                        const fileR = storageRefModule(firebaseStorage, `equipamentos/${Date.now()}_${anexo.nome}`);
                        await uploadBytesModule(fileR, anexo.fileObj);
                        const url = await getDownloadURLModule(fileR);
                        processedAnexos.push({ nome: anexo.nome, dados: url });
                    } else {
                        processedAnexos.push({ nome: anexo.nome, dados: anexo.dados });
                    }
                }

                const novo = {
                    id, 
                    tag,
                    descricao: document.getElementById('descricao').value.toUpperCase(),
                    fabricante: document.getElementById('fabricante').value.toUpperCase(),
                    serie: document.getElementById('serie').value.toUpperCase(),
                    resolucao: document.getElementById('resolucao').value.toUpperCase(),
                    tolerancia: document.getElementById('tolerancia').value.toUpperCase(),
                    requerCalibracao: document.getElementById('requerCalibracao').checked,
                    frequencia: parseInt(document.getElementById('frequencia').value) || 12,
                    erroMaximo: document.getElementById('erroMaximo').value.toUpperCase(),
                    setor: document.getElementById('setor').value,
                    anexos: processedAnexos,
                    historico: [] 
                };
                
                const idx = ativos.findIndex(a => String(a.id) === String(id));
                if (idx > -1) {
                    const existingData = ativos[idx];
                    novo.dataUltimaCal = existingData.dataUltimaCal || '';
                    novo.dataProximaCal = existingData.dataProximaCal || '';
                    novo.certificado = existingData.certificado || '';
                    novo.ultimoErro = existingData.ultimoErro || '';
                    novo.ultimaIncerteza = existingData.ultimaIncerteza || '';
                    novo.ultimoStatusCal = existingData.ultimoStatusCal || '';
                    novo.ultimasMedidas = existingData.ultimasMedidas || [];
                    novo.historico = existingData.historico || []; 
                    
                    ativos[idx] = { ...ativos[idx], ...novo };
                    await registrarLog("EDITAR", `EQUIPAMENTO ${tag} ATUALIZADO.`);
                } else {
                    ativos.push(novo);
                    await registrarLog("ADICIONAR", `NOVO EQUIPAMENTO ${tag} CADASTRADO.`);
                }
                
                resetForm(); 
                navigateTo('cal_dashboard.html');
            } catch (err) {
                console.error(err);
                alert("ERRO AO SALVAR EQUIPAMENTO! " + err.message);
                btnSubmit.disabled = false;
                btnSubmit.innerText = 'Salvar Registro';
            }
        });

        window.onload = init;
    </script>
</body>
</html>
