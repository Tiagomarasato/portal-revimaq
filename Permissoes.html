<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGQ - Controle de Permissões (ISO 9001)</title>
    
    <!-- Tailwind CSS para Estilização -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons para Ícones -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- SweetAlert2 para Modais e Mensagens -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- FIREBASE V8 -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .custom-scrollbar::-webkit-scrollbar { height: 8px; width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Toggle Switch Customizado para Tailwind */
        .toggle-checkbox:checked { right: 0; border-color: #68D391; }
        .toggle-checkbox:checked + .toggle-label { background-color: #10B981; }
        .toggle-checkbox:disabled + .toggle-label { background-color: #e2e8f0; cursor: not-allowed; }
    </style>
</head>
<body class="flex flex-col h-screen text-gray-800 bg-gray-50">

    <!-- Header / Navbar Superior -->
    <header class="bg-white shadow-sm z-20">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex">
                    <div class="flex-shrink-0 flex items-center">
                        <div class="p-2 bg-slate-800 rounded-lg mr-3">
                            <i data-lucide="shield-check" class="w-6 h-6 text-white"></i>
                        </div>
                        <h1 class="text-xl font-bold text-gray-800">SGQ <span class="text-slate-600">Acessos</span></h1>
                    </div>
                </div>
                <div class="flex items-center space-x-3">
                    <a href="index.html" class="hidden md:inline-flex items-center px-4 py-2 border border-transparent text-sm font-bold rounded-md shadow-sm text-white bg-slate-800 hover:bg-slate-700 focus:outline-none transition-colors">
                        <i data-lucide="arrow-left" class="w-4 h-4 mr-2"></i> PORTAL
                    </a>
                    <a href="Cadastro.html" class="hidden md:inline-flex items-center px-3 py-2 border border-gray-300 text-sm font-medium rounded-md shadow-sm text-gray-700 bg-white hover:bg-gray-50 focus:outline-none transition-colors">
                        <i data-lucide="users" class="w-4 h-4 mr-2"></i> Cadastros
                    </a>
                    <a href="dashboard.html" class="hidden md:inline-flex items-center px-3 py-2 border border-transparent text-sm font-medium rounded-md shadow-sm text-amber-700 bg-amber-100 hover:bg-amber-200 focus:outline-none transition-colors">
                        <i data-lucide="bar-chart-2" class="w-4 h-4 mr-2"></i> Operação
                    </a>
                    
                    <div class="h-8 w-8 rounded-full bg-slate-700 flex items-center justify-center text-white font-bold text-sm ml-2" id="user-avatar" title="Usuário logado">--</div>
                    
                    <!-- Mobile menu button -->
                    <div class="flex items-center md:hidden ml-2">
                        <button type="button" onclick="document.getElementById('mobile-menu').classList.toggle('hidden')" class="p-2 rounded-md text-gray-400 hover:bg-gray-100">
                            <i data-lucide="menu" class="w-6 h-6"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Mobile Menu -->
        <div class="hidden md:hidden absolute w-full bg-white z-50 border-t shadow-lg" id="mobile-menu">
            <div class="pt-2 pb-3 space-y-1">
                <a href="index.html" class="block pl-4 py-3 text-white bg-slate-800 hover:bg-slate-700 font-bold border-b border-gray-200"><i data-lucide="arrow-left" class="w-5 h-5 inline mr-2"></i> PORTAL</a>
                <a href="Cadastro.html" class="block pl-4 py-3 text-gray-700 bg-gray-50 hover:bg-gray-100 font-medium border-b border-gray-200"><i data-lucide="users" class="w-5 h-5 inline mr-2"></i> Cadastros</a>
                <a href="dashboard.html" class="block pl-4 py-3 text-amber-700 bg-amber-50 hover:bg-amber-100 font-medium"><i data-lucide="bar-chart-2" class="w-5 h-5 inline mr-2"></i> Operação</a>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 overflow-auto bg-gray-50 p-4 md:p-6" id="main-container">
        <div class="max-w-[1200px] mx-auto mb-4 flex justify-between items-center">
             <h2 class="text-2xl font-semibold text-gray-800" id="page-title">Matriz de Permissões por Grupo (Cargo)</h2>
        </div>
        
        <div class="max-w-[1200px] mx-auto" id="app-content">
            <div class="flex h-64 w-full items-center justify-center">
                <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-slate-800"></div>
                <span class="ml-3 text-gray-500 font-medium">A carregar grupos e permissões...</span>
            </div>
        </div>
    </main>

    <!-- Script Global -->
    <script>
        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyBqV0KOQMAYR4z6P_RKnrQPDfkAR2CsXBI",
            authDomain: "gestao-de-pessoas-49200.firebaseapp.com",
            projectId: "gestao-de-pessoas-49200",
            storageBucket: "gestao-de-pessoas-49200.firebasestorage.app",
            messagingSenderId: "615097388185",
            appId: "1:615097388185:web:ef87969b64f4a886f23c08"
        };
        
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        
        const auth = firebase.auth();
        const db = firebase.firestore();
        db.settings({ experimentalForceLongPolling: true });

        const appId = 'gestao-de-pessoas-49200';
        let currentUser = null;

        // --- 1. STATE MANAGEMENT ---
        const defaultData = {
            roles: [], // Cargos servirão como Grupos de Acesso
            logs: []
        };
        
        let state = JSON.parse(JSON.stringify(defaultData));
        let selectedRoleId = null;

        // Módulos do sistema disponíveis para permissão
        const systemModules = [
            { id: 'colaboradores', name: 'Gestão de Colaboradores (RH)' },
            { id: 'cargos', name: 'Descrições de Cargos' },
            { id: 'habilidades', name: 'Matriz de Habilidades' },
            { id: 'treinamentos', name: 'Catálogo de Treinamentos' },
            { id: 'presenca', name: 'Listas de Presença / Atas' },
            { id: 'eficacia', name: 'Avaliações de Eficácia' },
            { id: 'desempenho', name: 'Avaliações de Desempenho' },
            { id: 'planejamento', name: 'Calendário de Planejamento' },
            { id: 'permissoes', name: 'Controle de Acessos (Admin)' }
        ];

        function loadDataFromFirestore() {
            if (!currentUser) return;

            db.collection(`artifacts/${appId}/public/data/roles`).onSnapshot((snapshot) => {
                state.roles = snapshot.docs.map(doc => doc.data());
                renderPermissionsPage();
            }, (error) => { console.error(`Erro ao ler coleção roles:`, error); });
        }

        async function dbSave(collection, docId, data) {
            try { await db.collection(`artifacts/${appId}/public/data/${collection}`).doc(docId.toString()).set(data); } 
            catch(e) { console.error(e); }
        }

        // ================= CONSTRUÇÃO DA TELA DE PERMISSÕES =================
        function renderPermissionsPage() {
            const container = document.getElementById('app-content');
            
            let html = `
                <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                    
                    <!-- MENU LATERAL: LISTA DE GRUPOS (CARGOS) -->
                    <div class="bg-white rounded-xl shadow-sm border border-gray-100 flex flex-col h-[75vh]">
                        <div class="p-4 border-b border-gray-100 bg-gray-50 rounded-t-xl">
                            <h3 class="font-bold text-gray-800 text-sm"><i data-lucide="users" class="w-4 h-4 inline mr-1 text-slate-600"></i> Grupos de Acesso (Cargos)</h3>
                        </div>
                        <div class="overflow-y-auto flex-1 custom-scrollbar p-2 space-y-1">
                            ${state.roles.map(role => `
                                <button onclick="selectRole(${role.id})" class="w-full text-left px-4 py-3 rounded-lg text-sm font-medium transition-colors border ${selectedRoleId === role.id ? 'bg-slate-800 text-white border-slate-800 shadow-md' : 'bg-white text-gray-700 border-transparent hover:bg-gray-100'}">
                                    ${role.name}
                                </button>
                            `).join('') || '<p class="text-xs text-gray-500 text-center py-4">Nenhum cargo cadastrado no sistema.</p>'}
                        </div>
                    </div>

                    <!-- ÁREA PRINCIPAL: MATRIZ DE ACESSO -->
                    <div class="md:col-span-3 bg-white rounded-xl shadow-sm border border-gray-100 flex flex-col h-[75vh]">
            `;

            if (!selectedRoleId) {
                html += `
                        <div class="flex-1 flex flex-col items-center justify-center text-gray-400">
                            <div class="w-16 h-16 bg-gray-50 rounded-full flex items-center justify-center mb-4 border border-gray-200">
                                <i data-lucide="shield" class="w-8 h-8 text-gray-300"></i>
                            </div>
                            <p class="text-lg font-medium text-gray-500">Selecione um Grupo ao lado</p>
                            <p class="text-sm mt-2 max-w-sm text-center">Defina as políticas de visualização, criação, edição e exclusão para cada cargo do sistema.</p>
                        </div>
                `;
            } else {
                const role = state.roles.find(r => r.id === selectedRoleId);
                // Garante que o objeto permissions existe
                const perms = role.permissions || {};

                html += `
                        <div class="p-5 border-b border-gray-100 flex justify-between items-center bg-slate-50 rounded-t-xl">
                            <div>
                                <h3 class="font-bold text-lg text-gray-800">Permissões: <span class="text-blue-600">${role.name}</span></h3>
                                <p class="text-xs text-gray-500 mt-1">Configure o que os colaboradores com este cargo podem aceder.</p>
                            </div>
                            <button onclick="savePermissions()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg text-sm font-bold shadow-sm transition flex items-center">
                                <i data-lucide="save" class="w-4 h-4 mr-2"></i> Gravar Alterações
                            </button>
                        </div>
                        
                        <div class="flex-1 overflow-y-auto p-0 custom-scrollbar">
                            <table class="w-full text-left border-collapse">
                                <thead class="sticky top-0 bg-white shadow-sm z-10">
                                    <tr class="text-xs uppercase text-gray-500 border-b border-gray-200">
                                        <th class="p-4 font-bold w-1/3">Módulo do Sistema</th>
                                        <th class="p-4 text-center">Visualizar</th>
                                        <th class="p-4 text-center">Cadastrar</th>
                                        <th class="p-4 text-center">Editar</th>
                                        <th class="p-4 text-center">Excluir</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-gray-100">
                `;

                systemModules.forEach(mod => {
                    // Pega as permissões atuais ou define falso como padrão
                    const p = perms[mod.id] || { view: false, create: false, edit: false, delete: false };

                    html += `
                                    <tr class="hover:bg-slate-50 transition-colors">
                                        <td class="p-4 font-medium text-gray-700 text-sm border-r border-gray-50">${mod.name}</td>
                                        <td class="p-4 text-center">
                                            <label class="inline-flex items-center cursor-pointer">
                                                <input type="checkbox" id="perm_${mod.id}_view" class="sr-only peer" ${p.view ? 'checked' : ''} onchange="handleViewToggle('${mod.id}')">
                                                <div class="relative w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-green-500 mx-auto"></div>
                                            </label>
                                        </td>
                                        <td class="p-4 text-center">
                                            <label class="inline-flex items-center cursor-pointer">
                                                <input type="checkbox" id="perm_${mod.id}_create" class="sr-only peer perm-action-${mod.id}" ${p.create ? 'checked' : ''} ${!p.view ? 'disabled' : ''}>
                                                <div class="relative w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-500 mx-auto opacity-100 peer-disabled:opacity-50"></div>
                                            </label>
                                        </td>
                                        <td class="p-4 text-center">
                                            <label class="inline-flex items-center cursor-pointer">
                                                <input type="checkbox" id="perm_${mod.id}_edit" class="sr-only peer perm-action-${mod.id}" ${p.edit ? 'checked' : ''} ${!p.view ? 'disabled' : ''}>
                                                <div class="relative w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-amber-500 mx-auto opacity-100 peer-disabled:opacity-50"></div>
                                            </label>
                                        </td>
                                        <td class="p-4 text-center">
                                            <label class="inline-flex items-center cursor-pointer">
                                                <input type="checkbox" id="perm_${mod.id}_delete" class="sr-only peer perm-action-${mod.id}" ${p.delete ? 'checked' : ''} ${!p.view ? 'disabled' : ''}>
                                                <div class="relative w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-red-500 mx-auto opacity-100 peer-disabled:opacity-50"></div>
                                            </label>
                                        </td>
                                    </tr>
                    `;
                });

                html += `
                                </tbody>
                            </table>
                        </div>
                `;
            }

            html += `
                    </div>
                </div>
            `;
            
            container.innerHTML = html;
            if(window.lucide) window.lucide.createIcons();
        }

        // Se desligar a permissão de Visualizar, desliga e bloqueia as outras de edição/exclusão (lógica de segurança)
        function handleViewToggle(moduleId) {
            const viewCb = document.getElementById(`perm_${moduleId}_view`);
            const actionCbs = document.querySelectorAll(`.perm-action-${moduleId}`);
            
            actionCbs.forEach(cb => {
                if (!viewCb.checked) {
                    cb.checked = false;
                    cb.disabled = true;
                } else {
                    cb.disabled = false;
                }
            });
        }

        function selectRole(roleId) {
            selectedRoleId = roleId;
            renderPermissionsPage();
        }

        function savePermissions() {
            if (!selectedRoleId) return;
            
            const role = state.roles.find(r => r.id === selectedRoleId);
            if (!role) return;

            let updatedPermissions = {};

            systemModules.forEach(mod => {
                const viewEl = document.getElementById(`perm_${mod.id}_view`);
                const createEl = document.getElementById(`perm_${mod.id}_create`);
                const editEl = document.getElementById(`perm_${mod.id}_edit`);
                const deleteEl = document.getElementById(`perm_${mod.id}_delete`);
                
                if (viewEl) {
                    updatedPermissions[mod.id] = {
                        view: viewEl.checked,
                        create: createEl.checked,
                        edit: editEl.checked,
                        delete: deleteEl.checked
                    };
                }
            });

            // Atualiza o objeto do cargo
            role.permissions = updatedPermissions;

            // Salva no Firebase
            Swal.fire({title: 'Gravando acessos...', allowOutsideClick: false, didOpen: () => Swal.showLoading()});
            dbSave('roles', role.id, role).then(() => {
                Swal.fire('Políticas Salvas!', `As permissões do grupo ${role.name} foram atualizadas com sucesso.`, 'success');
            });
        }

        // INICIALIZAÇÃO
        auth.onAuthStateChanged((user) => { 
            if(user) { 
                currentUser = user; 
                document.getElementById('user-avatar').innerText = user.email ? user.email.charAt(0).toUpperCase() : 'U'; 
                loadDataFromFirestore(); 
            } else {
                auth.signInAnonymously().then(() => {
                    currentUser = { email: 'Local' };
                    loadDataFromFirestore();
                }); 
            }
        });
    </script>
</body>
</html>
