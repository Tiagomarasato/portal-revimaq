    <!-- Scripts de Lógica -->
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBqV0KOQMAYR4z6P_RKnrQPDfkAR2CsXBI",
            authDomain: "gestao-de-pessoas-49200.firebaseapp.com",
            projectId: "gestao-de-pessoas-49200",
            storageBucket: "gestao-de-pessoas-49200.firebasestorage.app",
            messagingSenderId: "615097388185",
            appId: "1:615097388185:web:efe0ff09ca41de81f23c08"
        };

        let ativos = [], logs = [], db, userId = null, currentUser = null, appId = 'gestao-de-pessoas-49200';

        // Permissões
        let state = { roles: [], employees: [] };
        let userPermissions = {};

        async function init() {
            try {
                const { initializeApp } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js");
                const { getAuth, signInAnonymously, onAuthStateChanged } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js");
                const { getFirestore, doc, collection, onSnapshot, setDoc, getDoc } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");

                const app = initializeApp(firebaseConfig);
                const auth = getAuth(app);
                db = getFirestore(app);

                await signInAnonymously(auth);
                onAuthStateChanged(auth, user => {
                    if (user) {
                        currentUser = user;
                        userId = user.uid;
                        if(document.getElementById('user-avatar')) {
                            document.getElementById('user-avatar').innerText = user.email ? user.email.charAt(0).toUpperCase() : 'U'; 
                        }

                        let dataLoaded = { roles: false, emp: false, cal: false };
                        const tryRender = () => {
                            if (dataLoaded.roles && dataLoaded.emp && dataLoaded.cal) {
                                updatePermissions(currentUser);
                                if (checkPerm('calibracao', 'view')) {
                                    populateSelects();
                                    if(window.lucide) window.lucide.createIcons();
                                } else {
                                    showAccessDenied();
                                }
                            }
                        };

                        const rolesRef = collection(db, 'artifacts', appId, 'public', 'data', 'roles');
                        onSnapshot(rolesRef, snap => {
                            state.roles = snap.docs.map(d => d.data());
                            dataLoaded.roles = true;
                            tryRender();
                        });

                        const empRef = collection(db, 'artifacts', appId, 'public', 'data', 'employees');
                        onSnapshot(empRef, snap => {
                            state.employees = snap.docs.map(d => d.data());
                            dataLoaded.emp = true;
                            tryRender();
                        });

                        const globalDocRef = doc(db, 'calibracao', 'inventario_geral');
                        onSnapshot(globalDocRef, async snap => {
                            if (snap.exists() && snap.data().lista && snap.data().lista.length > 0) {
                                ativos = snap.data().lista;
                                logs = snap.data().logs || [];
                            }
                            dataLoaded.cal = true;
                            tryRender();
                        }, (err) => {
                            console.error("ERRO FIREBASE:", err);
                        });
                    }
                });
            } catch (e) { 
                console.error(e);
                const local = JSON.parse(localStorage.getItem('backup_calibracao') || '{"lista":[],"logs":[]}');
                ativos = local.lista || []; logs = local.logs || [];
                populateSelects();
            }
        }

        function updatePermissions(user) {
            if (user && user.email && user.email !== 'Local') {
                const currentEmp = state.employees.find(e => e.email === user.email);
                if (currentEmp) {
                    const roleObj = state.roles.find(r => r.name === currentEmp.role);
                    if (roleObj && roleObj.permissions) userPermissions = roleObj.permissions;
                    else userPermissions = {};
                } else {
                    userPermissions = {};
                }
            } else {
                userPermissions = { calibracao: { view:true, create:true, edit:true, delete:true } };
            }
        }

        // FUNÇÃO DE SEGURANÇA CORRIGIDA
        function checkPerm(module, action) {
            if (currentUser && currentUser.email === 'Local') return true; 
            const modPerms = userPermissions[module] || userPermissions['ativos'] || userPermissions['equipamentos'];
            if (!modPerms) return false; // Bloqueia caso o utilizador não tenha este módulo nas permissões.
            return modPerms[action] === true;
        }

        function showAccessDenied() {
            const mainContent = document.getElementById('app-main-content');
            mainContent.innerHTML = `
                <div class="flex flex-col items-center justify-center h-96 text-center">
                    <div class="text-red-500 mb-4"><i class="fa-solid fa-lock text-6xl"></i></div>
                    <h3 class="text-2xl font-bold text-gray-800 uppercase">Acesso Restrito</h3>
                    <p class="text-gray-500 mt-2 uppercase">O seu perfil não possui permissão para consultar o histórico de equipamentos.</p>
                    <button onclick="navigateTo('dashboard.html')" class="mt-6 bg-slate-800 text-white px-6 py-2 rounded-md font-bold uppercase hover:bg-slate-700 transition-colors">Voltar ao Início</button>
                </div>
            `;
        }

        async function salvar() {
            if (!userId) return;
            const { doc, setDoc } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");
            const globalDocRef = doc(db, 'calibracao', 'inventario_geral');
            await setDoc(globalDocRef, { lista: ativos, logs: logs });
            localStorage.setItem('backup_calibracao', JSON.stringify({ lista: ativos, logs: logs }));
        }

        async function registrarLog(acao, detalhe) {
            logs.unshift({
                data: new Date().toISOString(),
                acao: acao.toUpperCase(),
                user: userId ? userId.substring(0, 8).toUpperCase() : "SISTEMA",
                detalhe: detalhe.toUpperCase()
            });
            if (logs.length > 500) logs.pop();
            await salvar();
        }

        function formatarData(iso) { if (!iso) return '-'; const [y,m,d] = iso.split('-'); return `${d}/${m}/${y}`; }

        function populateSelects() {
            const histSelect = document.getElementById('selectEquipamentoHist');
            const currentHistVal = histSelect ? histSelect.value : '';

            const html = '<option value="">-- SELECIONAR EQUIPAMENTO --</option>' + ativos.sort((a,b)=>a.tag.localeCompare(b.tag)).map(a => `<option value="${a.id}">${a.tag} - ${a.descricao}</option>`).join('');
            
            if (histSelect) {
                histSelect.innerHTML = html;
                
                const urlParams = new URLSearchParams(window.location.search);
                const autoSelectId = urlParams.get('id');

                if (autoSelectId && !currentHistVal) {
                    histSelect.value = autoSelectId;
                } else if (currentHistVal) {
                    histSelect.value = currentHistVal; 
                }
                
                renderHistoricoEquipamento();
            }
        }

        function recalcularStatusAtivo(idx) {
            if (ativos[idx].historico && ativos[idx].historico.length > 0) {
                const sorted = [...ativos[idx].historico].sort((x, y) => new Date(y.data) - new Date(x.data));
                const ultima = sorted[0];
                ativos[idx].dataUltimaCal = ultima.data;
                ativos[idx].certificado = ultima.certificado;
                ativos[idx].dataProximaCal = ultima.proxima;
                ativos[idx].ultimoErro = ultima.erro;
                ativos[idx].ultimaIncerteza = ultima.incerteza;
                ativos[idx].ultimasMedidas = ultima.medidas;
                ativos[idx].ultimoStatusCal = ultima.status;
            } else {
                ativos[idx].dataUltimaCal = '';
                ativos[idx].certificado = '';
                ativos[idx].dataProximaCal = '';
                ativos[idx].ultimoErro = '';
                ativos[idx].ultimaIncerteza = '';
                ativos[idx].ultimasMedidas = [];
                ativos[idx].ultimoStatusCal = '';
            }
        }

        function renderHistoricoEquipamento() {
            const id = document.getElementById('selectEquipamentoHist').value;
            const container = document.getElementById('historicoContainer');
            
            if (!id) {
                container.innerHTML = '<p class="text-center text-gray-400 py-10 font-bold uppercase">SELECIONE UM EQUIPAMENTO ACIMA PARA CONSULTAR O HISTÓRICO.</p>';
                return;
            }
            
            const a = ativos.find(x => String(x.id) === String(id));
            if (!a) return;
            
            let hist = (a.historico || []).map((h, index) => ({ ...h, originalIndex: index }));
            
            if (hist.length === 0 && a.dataUltimaCal) {
                hist.push({
                    originalIndex: -1,
                    data: a.dataUltimaCal,
                    certificado: a.certificado,
                    proxima: a.dataProximaCal,
                    status: a.ultimoStatusCal,
                    erro: a.ultimoErro,
                    incerteza: a.ultimaIncerteza,
                    medidas: a.ultimasMedidas || [],
                    anexos: []
                });
            }

            if (hist.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-400 py-10 font-bold uppercase">NENHUMA CALIBRAÇÃO REGISTRADA PARA ESTE EQUIPAMENTO.</p>';
                return;
            }

            hist.sort((x, y) => new Date(y.data) - new Date(x.data));

            container.innerHTML = hist.map(h => {
                const isPercent = (a.erroMaximo || '').includes('%');
                let medidasHtml = '';
                
                if (h.medidas && h.medidas.length > 0) {
                    medidasHtml = `
                        <div class="mt-4 border border-gray-200 rounded">
                            <table class="w-full text-left text-[10px] border-collapse uppercase">
                                <thead class="bg-gray-100 border-b border-gray-200">
                                    <tr>
                                        <th class="p-2 font-semibold">Ponto (VVC)</th>
                                        <th class="p-2 font-semibold">Medido</th>
                                        <th class="p-2 font-semibold">Erro</th>
                                        <th class="p-2 font-semibold">Incerteza (U)</th>
                                        <th class="p-2 font-semibold text-center">|E| + U</th>
                                        ${isPercent ? '<th class="p-2 font-semibold text-center">Erro %</th>' : ''}
                                    </tr>
                                </thead>
                                <tbody>
                                    ${h.medidas.map(m => {
                                        const ponto = parseFloat(m.ponto);
                                        const medido = parseFloat(m.medido);
                                        const inc = parseFloat(m.incerteza);
                                        const erro = medido - ponto;
                                        const soma = Math.abs(erro) + inc;
                                        let somaPerc = 0;
                                        if (ponto !== 0) somaPerc = (soma / Math.abs(ponto)) * 100;
                                        return `
                                        <tr class="border-b border-gray-50 hover:bg-gray-50">
                                            <td class="p-2 font-bold">${m.ponto}</td>
                                            <td class="p-2">${m.medido}</td>
                                            <td class="p-2">${erro.toFixed(4)}</td>
                                            <td class="p-2">${m.incerteza}</td>
                                            <td class="p-2 text-center font-bold text-gray-700">${soma.toFixed(4)}</td>
                                            ${isPercent ? `<td class="p-2 text-center font-bold text-gray-700">${somaPerc.toFixed(3)}%</td>` : ''}
                                        </tr>
                                        `;
                                    }).join('')}
                                </tbody>
                            </table>
                        </div>
                    `;
                }

                let anexosHtml = '';
                if (h.anexos && h.anexos.length > 0) {
                    anexosHtml = `
                        <div class="mt-3 border-t border-gray-100 pt-3">
                            <span class="block text-[9px] font-bold text-gray-400 uppercase mb-2">ANEXOS DA CALIBRAÇÃO:</span>
                            <div class="flex gap-2 flex-wrap">
                                ${h.anexos.map(anexo => `
                                    <a href="${anexo.dados}" download="${anexo.nome}" class="inline-flex items-center gap-1 bg-gray-100 border border-gray-300 text-gray-700 px-2 py-1 rounded text-[9px] font-bold hover:bg-gray-200 transition-colors" title="Baixar ${anexo.nome}">
                                        <i class="fa-solid fa-paperclip"></i> ${anexo.nome}
                                    </a>
                                `).join('')}
                            </div>
                        </div>
                    `;
                }

                return `
                    <div class="border border-gray-200 rounded-lg overflow-hidden mb-4 shadow-sm">
                        <div class="bg-gray-50 p-4 flex flex-col md:flex-row justify-between items-start md:items-center border-b border-gray-200 gap-2">
                            <div>
                                <div class="font-black text-isoBlue text-sm flex items-center">
                                    CERTIFICADO: ${h.certificado || 'S/N'}
                                    <button onclick="editarCalibracaoHistorico('${a.id}', ${h.originalIndex})" class="text-blue-500 hover:text-blue-700 ml-4 print:hidden" title="Editar Calibração"><i class="fa-solid fa-pen text-xs"></i></button>
                                    <button onclick="apagarCalibracaoHistorico('${a.id}', ${h.originalIndex})" class="text-red-400 hover:text-red-600 ml-3 print:hidden" title="Excluir Calibração"><i class="fa-solid fa-trash text-xs"></i></button>
                                </div>
                                <div class="text-xs text-gray-500 font-bold mt-1"><i class="fa-regular fa-calendar mr-1"></i> DATA: ${formatarData(h.data)}</div>
                            </div>
                            <div>
                                <span class="px-3 py-1 rounded-full text-[10px] font-black border ${h.status === 'APROVADO' ? 'bg-green-100 text-green-700 border-green-200' : (h.status === 'REPROVADO' ? 'bg-red-100 text-red-700 border-red-200' : 'bg-gray-200 text-gray-600 border-gray-300')}">${h.status || 'N/A'}</span>
                            </div>
                        </div>
                        <div class="p-4 bg-white">
                            <div class="grid grid-cols-3 gap-4 text-xs bg-blue-50/50 p-3 rounded border border-blue-100">
                                <div><span class="block text-[9px] font-bold text-blue-400 uppercase">PIOR ERRO</span><span class="font-bold text-blue-900">${h.erro && !isNaN(parseFloat(h.erro)) ? parseFloat(h.erro).toFixed(4) : '-'}</span></div>
                                <div><span class="block text-[9px] font-bold text-blue-400 uppercase">INCERTEZA (U)</span><span class="font-bold text-blue-900">${h.incerteza && !isNaN(parseFloat(h.incerteza)) ? parseFloat(h.incerteza).toFixed(4) : '-'}</span></div>
                                <div><span class="block text-[9px] font-bold text-blue-400 uppercase">VÁLIDO ATÉ</span><span class="font-bold text-blue-900">${formatarData(h.proxima)}</span></div>
                            </div>
                            ${medidasHtml}
                            ${anexosHtml}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function editarCalibracaoHistorico(ativoId, histIndex) {
            if (!checkPerm('calibracao', 'edit')) {
                return alert('Acesso Negado: O seu perfil não possui permissão para editar calibrações do histórico.');
            }
            navigateTo(`cal_lancamento.html?eqId=${ativoId}&editIndex=${histIndex}`);
        }

        async function apagarCalibracaoHistorico(ativoId, histIndex) {
            if (!checkPerm('calibracao', 'delete')) {
                return alert('Acesso Negado: O seu perfil não possui permissão para excluir calibrações do histórico.');
            }

            if (!confirm(`Deseja realmente excluir esta calibração?\n\nEsta ação não poderá ser desfeita.`)) return;

            const idx = ativos.findIndex(x => String(x.id) === String(ativoId));
            if (idx === -1) return;

            if (histIndex === -1) {
                ativos[idx].dataUltimaCal = '';
                ativos[idx].certificado = '';
                ativos[idx].dataProximaCal = '';
                ativos[idx].ultimoErro = '';
                ativos[idx].ultimaIncerteza = '';
                ativos[idx].ultimasMedidas = [];
                ativos[idx].ultimoStatusCal = '';
            } else if (histIndex >= 0 && histIndex < (ativos[idx].historico || []).length) {
                ativos[idx].historico.splice(histIndex, 1);
            }

            recalcularStatusAtivo(idx);
            await registrarLog("ELIMINAR", `CALIBRAÇÃO DO EQUIPAMENTO ${ativos[idx].tag} FOI EXCLUÍDA.`);
            
            renderHistoricoEquipamento(); 
            alert('Calibração excluída com sucesso!');
        }

        function verAnexos(id) {
            // Logica para anexos
        }

        function fecharModalAnexos() { 
            document.getElementById('modalAnexos').classList.add('hidden'); 
        }

        window.onload = init;
    </script>
</body>
</html>
