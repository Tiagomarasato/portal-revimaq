<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGQ - Cadastros e Configurações (ISO 9001)</title>
    
    <!-- Tailwind CSS para Estilização -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons para Ícones -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- SweetAlert2 para Modais e Mensagens -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- FIREBASE V8 (A versão blindada) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .custom-scrollbar::-webkit-scrollbar { height: 8px; width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .modal-open { overflow: hidden; }
    </style>
</head>
<body class="flex flex-col h-screen text-gray-800 bg-gray-50">

    <!-- Header / Navbar Superior -->
    <header class="bg-white shadow-sm z-20">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex">
                    <div class="flex-shrink-0 flex items-center">
                        <div class="p-2 bg-blue-100 rounded-lg mr-3"><i data-lucide="database" class="w-6 h-6 text-blue-700"></i></div>
                        <h1 class="text-xl font-bold text-gray-800">SGQ <span class="text-blue-600">Cadastros</span></h1>
                    </div>
                    <!-- Desktop Menu -->
                    <nav class="hidden md:ml-6 md:flex md:space-x-4">
                        <a href="#" onclick="navigate('colaboradores')" class="nav-colaboradores menu-item inline-flex items-center px-1 pt-1 border-b-2 border-transparent text-sm font-medium text-gray-500 hover:text-gray-700 hover:border-gray-300 transition-colors">Colaboradores</a>
                        <a href="#" onclick="navigate('cargos')" class="nav-cargos menu-item inline-flex items-center px-1 pt-1 border-b-2 border-transparent text-sm font-medium text-gray-500 hover:text-gray-700 hover:border-gray-300 transition-colors">Cargos</a>
                        <a href="#" onclick="navigate('habilidades')" class="nav-habilidades menu-item inline-flex items-center px-1 pt-1 border-b-2 border-transparent text-sm font-medium text-gray-500 hover:text-gray-700 hover:border-gray-300 transition-colors">Habilidades</a>
                        <a href="#" onclick="navigate('treinamentos')" class="nav-treinamentos menu-item inline-flex items-center px-1 pt-1 border-b-2 border-transparent text-sm font-medium text-gray-500 hover:text-gray-700 hover:border-gray-300 transition-colors">Catálogo de Treinamentos</a>
                    </nav>
                </div>
                <div class="flex items-center">
                    <!-- Botão Mágico para o Dashboard Operacional -->
                    <a href="dashboard.html" class="hidden md:inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md shadow-sm text-blue-700 bg-blue-100 hover:bg-blue-200 focus:outline-none transition-colors mr-4">
                        <i data-lucide="layout-dashboard" class="w-4 h-4 mr-2"></i> Ir para Operação (Dashboard) &rarr;
                    </a>
                    <button class="text-gray-500 hover:text-blue-600 relative mr-4" onclick="showDevInfo()">
                        <i data-lucide="info" class="w-5 h-5"></i>
                    </button>
                    <div class="h-8 w-8 rounded-full bg-blue-600 flex items-center justify-center text-white font-bold text-sm mr-4" id="user-avatar" title="Usuário logado">
                        --
                    </div>
                    <!-- Mobile menu button -->
                    <div class="flex items-center md:hidden ml-2">
                        <button type="button" onclick="toggleMobileMenu()" class="inline-flex items-center justify-center p-2 rounded-md text-gray-400 hover:text-gray-500 hover:bg-gray-100 focus:outline-none">
                            <i data-lucide="menu" class="w-6 h-6"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Mobile Menu -->
        <div class="md:hidden hidden border-t border-gray-200 shadow-lg absolute w-full bg-white z-50 top-16" id="mobile-menu">
            <div class="pt-2 pb-3 space-y-1">
                <a href="#" onclick="navigate('colaboradores')" class="nav-colaboradores menu-item block pl-4 pr-4 py-3 border-l-4 border-transparent text-base font-medium text-gray-600 hover:bg-gray-50">Colaboradores</a>
                <a href="#" onclick="navigate('cargos')" class="nav-cargos menu-item block pl-4 pr-4 py-3 border-l-4 border-transparent text-base font-medium text-gray-600 hover:bg-gray-50">Cargos</a>
                <a href="#" onclick="navigate('habilidades')" class="nav-habilidades menu-item block pl-4 pr-4 py-3 border-l-4 border-transparent text-base font-medium text-gray-600 hover:bg-gray-50">Habilidades</a>
                <a href="#" onclick="navigate('treinamentos')" class="nav-treinamentos menu-item block pl-4 pr-4 py-3 border-l-4 border-transparent text-base font-medium text-gray-600 hover:bg-gray-50">Catálogo de Treinamentos</a>
                <a href="dashboard.html" class="block pl-4 pr-4 py-3 border-l-4 border-transparent text-base font-medium text-blue-700 bg-blue-50 hover:bg-blue-100 border-t border-gray-100 mt-1">
                    <i data-lucide="layout-dashboard" class="w-5 h-5 inline mr-2"></i> Ir para Operação &rarr;
                </a>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 overflow-auto bg-gray-50 p-4 md:p-6" id="main-container">
        <div class="max-w-7xl mx-auto mb-4 flex justify-between items-center">
             <h2 class="text-2xl font-semibold text-gray-800" id="page-title">Carregando...</h2>
        </div>
        
        <div class="max-w-7xl mx-auto" id="app-content">
            <div class="flex h-64 w-full items-center justify-center">
                <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600"></div>
                <span class="ml-3 text-gray-500 font-medium">Conectando ao banco de dados...</span>
            </div>
        </div>
    </main>

    <!-- Generic Modal Container -->
    <div id="modal-container" class="fixed inset-0 z-50 flex items-center justify-center hidden bg-black bg-opacity-50 backdrop-blur-sm transition-opacity p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-[750px] max-h-[95vh] flex flex-col transform transition-all scale-95" id="modal-content-wrapper">
            <div class="px-5 py-3 border-b border-gray-200 flex justify-between items-center bg-white rounded-t-xl flex-shrink-0">
                <h3 class="text-xl font-bold text-[#1e293b]" id="modal-title">Título do Modal</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 transition-colors">
                    <i data-lucide="x" class="w-5 h-5" stroke-width="2.5"></i>
                </button>
            </div>
            <div class="p-5 overflow-y-auto overflow-x-hidden custom-scrollbar flex-1 min-h-0" id="modal-body"></div>
            <div class="px-5 py-3 border-t border-gray-100 bg-white rounded-b-xl flex justify-end items-center gap-3 flex-shrink-0" id="modal-footer"></div>
        </div>
    </div>

    <!-- Script Global -->
    <script>
        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyBqV0KOQMAYR4z6P_RKnrQPDfkAR2CsXBI",
            authDomain: "gestao-de-pessoas-49200.firebaseapp.com",
            projectId: "gestao-de-pessoas-49200",
            storageBucket: "gestao-de-pessoas-49200.firebasestorage.app",
            messagingSenderId: "615097388185",
            appId: "1:615097388185:web:ef87969b64f4a886f23c08"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        
        const auth = firebase.auth();
        const db = firebase.firestore();
        const storage = firebase.storage();

        // CORREÇÃO CRÍTICA PARA DISCOS LOCAIS
        db.settings({ experimentalForceLongPolling: true });

        const appId = 'gestao-de-pessoas-49200';
        let currentUser = null;

        // --- 1. STATE MANAGEMENT ---
        const defaultData = {
            roles: [],
            employees: [],
            skills: [],
            employeeSkills: [],
            trainings: [],
            attendanceLists: [],
            effectivenessEvaluations: [],
            performanceReviews: [],
            logs: []
        };
        
        let state = JSON.parse(JSON.stringify(defaultData));

        function loadDataFromFirestore() {
            if (!currentUser) return;
            
            const fallbackTimer = setTimeout(() => {
                if(!currentPage) {
                    currentPage = 'colaboradores';
                    navigate(currentPage);
                }
            }, 3000);

            // Carrega TODAS as coleções para manter a integridade dos dados (ex: não apagar colaborador com histórico)
            const collections = ['roles', 'employees', 'skills', 'employeeSkills', 'trainings', 'attendanceLists', 'effectivenessEvaluations', 'performanceReviews', 'logs'];
            let loadedCount = 0;

            collections.forEach(col => {
                db.collection(`artifacts/${appId}/public/data/${col}`).onSnapshot((snapshot) => {
                    state[col] = snapshot.docs.map(doc => doc.data());
                    
                    if(col === 'logs') state.logs.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                    if(col === 'attendanceLists') state.attendanceLists.sort((a, b) => new Date(a.date) - new Date(b.date));
                    
                    loadedCount++;
                    if(loadedCount >= collections.length) {
                        clearTimeout(fallbackTimer);
                        if (!currentPage) {
                            currentPage = 'colaboradores';
                            navigate(currentPage);
                        } else {
                            navigate(currentPage);
                        }
                    }
                }, (error) => {
                    console.error(`Erro ao ler coleção ${col}:`, error);
                });
            });
        }

        async function dbSave(collection, docId, data) {
            if(!currentUser) return;
            try { await db.collection(`artifacts/${appId}/public/data/${collection}`).doc(docId.toString()).set(data); } 
            catch(e) { console.error(`Erro ao salvar em ${collection}:`, e); }
        }

        async function dbDelete(collection, docId) {
            if(!currentUser) return;
            try { await db.collection(`artifacts/${appId}/public/data/${collection}`).doc(docId.toString()).delete(); } 
            catch(e) { console.error(`Erro ao excluir de ${collection}:`, e); }
        }

        const generateId = (array) => array.length > 0 ? Math.max(...array.map(i => i.id)) + 1 : 1;
        const formatDate = (dateStr) => {
            if(!dateStr) return '-';
            const [y, m, d] = dateStr.split('-');
            return `${d}/${m}/${y}`;
        };

        function addLog(moduleName, action, details) {
            const newLog = {
                id: Date.now() + Math.floor(Math.random() * 1000),
                module: moduleName, action: action,
                details: details, timestamp: new Date().toISOString(),
                user: currentUser ? (currentUser.email || 'Visitante') : 'Sistema'
            };
            dbSave('logs', newLog.id, newLog);
        }

        function openLogModal(moduleName) {
            const moduleLogs = state.logs.filter(l => l.module === moduleName);
            let bodyHtml = moduleLogs.length === 0 
                ? '<p class="text-gray-500 text-center py-6">Nenhum registo encontrado.</p>' 
                : '<ul class="space-y-4">' + moduleLogs.map(log => `
                    <li class="border-l-4 border-blue-500 bg-gray-50 p-3 rounded-r-lg shadow-sm">
                        <div class="flex justify-between items-start">
                            <p class="text-sm font-semibold text-gray-800">${log.action}</p>
                            <span class="text-xs font-medium text-gray-500 whitespace-nowrap ml-2">${new Date(log.timestamp).toLocaleString('pt-PT')}</span>
                        </div>
                        <p class="text-sm text-gray-600 mt-1">${log.details}</p>
                        <p class="text-[10px] text-gray-400 mt-2">Utilizador: ${log.user}</p>
                    </li>`).join('') + '</ul>';
            openModal(`Histórico - ${moduleName}`, bodyHtml, `<button onclick="closeModal()" class="px-4 py-2 bg-gray-200 text-gray-800 rounded-lg">Fechar</button>`);
        }

        // --- 2. UI HELPERS & NAVIGATION ---
        let currentPage = '';
        let currentMatrixRole = '';

        function toggleMobileMenu() { document.getElementById('mobile-menu').classList.toggle('hidden'); }

        function navigate(page) {
            currentPage = page;
            document.querySelectorAll('.menu-item').forEach(el => {
                el.classList.remove('border-blue-600', 'text-blue-700', 'bg-blue-50');
                if (el.classList.contains('block')) el.classList.add('border-transparent', 'text-gray-600');
                else el.classList.add('border-transparent', 'text-gray-500');
            });
            document.querySelectorAll(`.nav-${page}`).forEach(el => {
                el.classList.remove('border-transparent', 'text-gray-500', 'text-gray-600');
                el.classList.add('border-blue-600', 'text-blue-700');
                if (el.classList.contains('block')) el.classList.add('bg-blue-50');
            });
            const mobileMenu = document.getElementById('mobile-menu');
            if(mobileMenu && !mobileMenu.classList.contains('hidden')) mobileMenu.classList.add('hidden');

            const contentDiv = document.getElementById('app-content');
            const titleEl = document.getElementById('page-title');
            
            switch(page) {
                case 'cargos': titleEl.innerText = 'Gestão de Cargos e Descrições'; renderCargos(contentDiv); break;
                case 'colaboradores': titleEl.innerText = 'Gestão de Colaboradores'; renderColaboradores(contentDiv); break;
                case 'habilidades': titleEl.innerText = 'Matriz de Habilidades'; renderHabilidades(contentDiv); break;
                case 'treinamentos': titleEl.innerText = 'Catálogo de Treinamentos'; renderTreinamentos(contentDiv); break;
            }
            if(window.lucide) window.lucide.createIcons();
        }

        function showDevInfo() { 
            Swal.fire({ 
                title: 'SGQ Cadastros', 
                html: `
                    <p class="mb-5 text-gray-600">Módulo de Cadastros conectado ao Firebase.</p>
                    <div class="border-t border-gray-200 pt-4 mt-2">
                        <p class="text-xs text-red-600 font-bold mb-2 uppercase tracking-wider">Zona de Perigo (Admin)</p>
                        <button onclick="confirmFactoryReset()" class="bg-red-50 text-red-700 border border-red-200 hover:bg-red-100 px-4 py-2.5 rounded-lg text-sm font-bold w-full flex items-center justify-center">
                            <i data-lucide="alert-triangle" class="w-4 h-4 mr-2"></i> Limpar Todo o Banco de Dados
                        </button>
                    </div>
                `, 
                icon: 'info',
                showConfirmButton: false,
                showCloseButton: true,
                didOpen: () => { if(window.lucide) window.lucide.createIcons(); }
            }); 
        }

        function confirmFactoryReset() {
            requirePasswordForAction(async () => {
                Swal.fire({ title: 'Limpando...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });
                const collections = ['roles', 'employees', 'skills', 'employeeSkills', 'trainings', 'attendanceLists', 'effectivenessEvaluations', 'performanceReviews', 'logs'];
                try {
                    for (const col of collections) {
                        const snapshot = await db.collection(`artifacts/${appId}/public/data/${col}`).get();
                        const batch = db.batch();
                        snapshot.docs.forEach((doc) => batch.delete(doc.ref));
                        await batch.commit();
                    }
                    state = JSON.parse(JSON.stringify(defaultData));
                    Swal.fire('Zerado!', 'O banco de dados foi completamente limpo.', 'success').then(() => navigate('colaboradores'));
                } catch (e) { Swal.fire('Erro', 'Ocorreu um erro ao limpar o banco de dados.', 'error'); }
            });
        }

        async function requirePasswordForAction(actionCallback) {
            const user = firebase.auth().currentUser;
            if (!user || user.isAnonymous) {
                Swal.fire({
                    title: 'Autenticação (Teste)', text: 'Digite a senha mestre "admin":', input: 'password', showCancelButton: true
                }).then((result) => {
                    if (result.value === 'admin') actionCallback();
                    else if (result.isConfirmed) Swal.fire('Erro', 'Senha incorreta.', 'error');
                });
                return;
            }
            const { value: password } = await Swal.fire({ title: 'Segurança', text: 'Confirme sua senha:', input: 'password', showCancelButton: true });
            if (password) {
                try { Swal.showLoading(); await firebase.auth().signInWithEmailAndPassword(user.email, password); actionCallback(); } 
                catch (error) { Swal.fire('Negado', 'Senha incorreta.', 'error'); }
            }
        }

        function openModal(title, bodyHtml, footerHtml) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-body').innerHTML = bodyHtml;
            document.getElementById('modal-footer').innerHTML = footerHtml;
            const modal = document.getElementById('modal-container');
            const wrapper = document.getElementById('modal-content-wrapper');
            modal.classList.remove('hidden');
            setTimeout(() => { wrapper.classList.remove('scale-95'); wrapper.classList.add('scale-100'); }, 10);
            document.body.classList.add('modal-open');
            if(window.lucide) window.lucide.createIcons();
        }

        function closeModal() {
            const modal = document.getElementById('modal-container');
            const wrapper = document.getElementById('modal-content-wrapper');
            wrapper.classList.remove('scale-100'); wrapper.classList.add('scale-95');
            setTimeout(() => { modal.classList.add('hidden'); document.body.classList.remove('modal-open'); }, 200);
        }

        // ================= COLABORADORES (COMPLETO) =================
        let tempEmpAttachments = []; // Variável global para gerir múltiplos arquivos no modal

        function renderColaboradores(container) {
            let html = `
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                    <div class="p-6 border-b flex flex-col md:flex-row justify-between items-start md:items-center bg-gray-50 gap-4">
                        <h3 class="text-lg font-semibold text-gray-800">Quadro de Funcionários</h3>
                        <div class="flex space-x-2">
                            <button onclick="openLogModal('Colaboradores')" class="bg-white border border-gray-300 text-gray-700 hover:bg-gray-50 px-4 py-2 rounded-lg text-sm font-medium transition-colors flex items-center">
                                <i data-lucide="history" class="w-4 h-4 mr-2"></i> Histórico
                            </button>
                            <button onclick="openEmployeeModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors flex items-center">
                                <i data-lucide="plus" class="w-4 h-4 mr-2"></i> Novo Colaborador
                            </button>
                        </div>
                    </div>
                    <div class="overflow-x-auto custom-scrollbar">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-gray-50 text-gray-500 text-xs uppercase tracking-wider border-b">
                                    <th class="p-4 font-medium">Nome / E-mail Portal</th>
                                    <th class="p-4 font-medium">Cargo</th>
                                    <th class="p-4 font-medium">Departamento</th>
                                    <th class="p-4 font-medium">Status Portal</th>
                                    <th class="p-4 font-medium">Status Geral</th>
                                    <th class="p-4 font-medium text-center">Ações</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-100 text-sm">
                                ${state.employees.map(emp => `
                                    <tr class="hover:bg-gray-50 transition-colors">
                                        <td class="p-4">
                                            <div class="font-medium text-gray-800 flex items-center">
                                                ${emp.name}
                                                ${(emp.attachments && emp.attachments.length > 0) || emp.attachment ? `<button onclick="openEmpAttachmentsViewer(${emp.id})" class="text-blue-500 ml-2 bg-blue-50 px-1.5 py-0.5 rounded text-[10px] font-bold uppercase transition hover:bg-blue-100" title="Ver Documentos do Colaborador"><i data-lucide="paperclip" class="w-3 h-3 inline"></i> Docs (${emp.attachments ? emp.attachments.length : 1})</button>` : ''}
                                            </div>
                                            <div class="text-[10px] text-gray-400 font-normal italic mt-0.5">${emp.email || 'Sem login configurado'}</div>
                                        </td>
                                        <td class="p-4 text-gray-600">${emp.role}</td>
                                        <td class="p-4 text-gray-600">${emp.dept}</td>
                                        <td class="p-4">
                                            ${emp.forcePasswordChange ? 
                                                '<span class="px-2 py-0.5 bg-amber-100 text-amber-700 text-[10px] font-bold rounded-full">TROCA SENHA</span>' : 
                                                (emp.email ? '<span class="px-2 py-0.5 bg-blue-100 text-blue-700 text-[10px] font-bold rounded-full">ATIVO</span>' : '<span class="px-2 py-0.5 bg-gray-100 text-gray-400 text-[10px] font-bold rounded-full">SEM ACESSO</span>')}
                                        </td>
                                        <td class="p-4">
                                            <span class="px-2.5 py-1 text-xs font-semibold rounded-full ${emp.status === 'Ativo' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}">
                                                ${emp.status}
                                            </span>
                                        </td>
                                        <td class="p-4 text-center whitespace-nowrap">
                                            <button onclick="openEmployeeDossier(${emp.id})" class="text-emerald-600 hover:text-emerald-800 mx-1" title="Dossiê de Treinamentos"><i data-lucide="book-open" class="w-4 h-4"></i></button>
                                            <button onclick="openEmployeeModal(${emp.id})" class="text-blue-600 hover:text-blue-800 mx-1" title="Editar"><i data-lucide="edit" class="w-4 h-4"></i></button>
                                            <button onclick="deleteEmployee(${emp.id})" class="text-red-600 hover:text-red-800 mx-1" title="Excluir (Requer Senha)"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                        </td>
                                    </tr>
                                `).join('') || '<tr><td colspan="6" class="p-4 text-center text-gray-500">Nenhum colaborador cadastrado.</td></tr>'}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
            container.innerHTML = html;
        }

        function openEmpAttachmentsViewer(id) {
            const emp = state.employees.find(e => e.id === id);
            if (!emp) return;

            let atts = [];
            if (emp.attachments) atts = emp.attachments;
            else if (emp.attachment) atts = [{docName: 'Documento Principal', expirationDate: '', ...emp.attachment}];

            if(atts.length === 0) return;

            let html = '<div class="space-y-3 text-left">';
            atts.forEach((a, i) => {
                let statusBadge = '';
                if (a.expirationDate) {
                    const valDate = new Date(a.expirationDate + 'T00:00:00');
                    const today = new Date(); today.setHours(0,0,0,0);
                    if (valDate < today) statusBadge = '<span class="ml-2 px-2 py-0.5 bg-red-100 text-red-800 text-[10px] rounded font-bold uppercase shadow-sm">Vencido</span>';
                    else statusBadge = '<span class="ml-2 px-2 py-0.5 bg-green-100 text-green-800 text-[10px] rounded font-bold uppercase shadow-sm">Válido</span>';
                }

                html += `
                <div class="border border-gray-200 p-3 rounded-lg bg-gray-50 flex justify-between items-center">
                    <div>
                        <p class="text-sm font-bold text-gray-800 flex items-center">${a.docName || 'Documento'} ${statusBadge}</p>
                        <p class="text-xs text-gray-500 mt-1"><i data-lucide="file" class="w-3 h-3 inline mr-1"></i>${a.fileName || 'Arquivo'} ${a.expirationDate ? '| Validade: ' + formatDate(a.expirationDate) : ''}</p>
                    </div>

        function downloadEmpAttachment(empId, index) {
            const emp = state.employees.find(e => e.id == empId);

            let atts = [];
            if (emp.attachments) atts = emp.attachments;
            else if (emp.attachment) atts = [{docName: 'Documento Principal', expirationDate: '', ...emp.attachment}];

            const a = atts[index];
            if (!a) return;

            if (a.url) {
                window.open(a.url, '_blank');
            } else if (a.data) {
                const link = document.createElement('a');
                link.href = a.data;
                link.download = a.fileName || 'documento';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }
        }

        function renderEmpAttachmentsList() {
            const container = document.getElementById('empAttachmentsList');
            if (!container) return;

            if (tempEmpAttachments.length === 0) {
                container.innerHTML = '<p class="text-xs text-gray-500 italic text-center py-2">Nenhum documento anexado.</p>';
                return;
            }

            container.innerHTML = tempEmpAttachments.map((att, index) => {
                let statusText = '';
                if (att.expirationDate) {
                    const valDate = new Date(att.expirationDate + 'T00:00:00');
                    const today = new Date(); today.setHours(0,0,0,0);
                    if (valDate < today) statusText = '<span class="text-[9px] bg-red-100 text-red-800 px-1.5 py-0.5 rounded font-bold uppercase ml-2">Vencido</span>';
                    else statusText = '<span class="text-[9px] bg-green-100 text-green-800 px-1.5 py-0.5 rounded font-bold uppercase ml-2">Válido</span>';
                }

                return `
                <div class="flex justify-between items-center bg-white border border-gray-200 p-2 rounded-lg text-sm shadow-sm">
                    <div class="flex flex-col truncate w-3/4">
                        <span class="font-bold text-gray-800 flex items-center truncate">${att.docName || 'Documento'} ${statusText}</span>
                        <span class="text-[10px] text-gray-500 mt-0.5 truncate"><i data-lucide="file" class="w-3 h-3 inline mr-1"></i>${att.fileName || 'Arquivo'} ${att.expirationDate ? '| Validade: ' + formatDate(att.expirationDate) : ''}</span>

                    </button>
                </div>
                `;
            }).join('');
            if(window.lucide) window.lucide.createIcons();
        }

        function addEmpAttachment() {
            const docName = document.getElementById('newAttName').value.trim();
            const expDate = document.getElementById('newAttDate').value;
            const fileInput = document.getElementById('newAttFile');

            if (!docName) return Swal.fire('Aviso', 'Preencha o Nome do Documento (Ex: CNH, ASO).', 'warning');
            if (fileInput.files.length === 0) return Swal.fire('Aviso', 'Selecione um arquivo no seu computador para anexar.', 'warning');

            const file = fileInput.files[0];
            if (file.size > 5 * 1024 * 1024) return Swal.fire('Erro', 'O limite é de 5MB por arquivo.', 'error');

            tempEmpAttachments.push({
                docName: docName,
                expirationDate: expDate,
                fileName: file.name,
                isNew: true,
                fileObj: file
            });

            // Limpa os campos para o próximo
            document.getElementById('newAttName').value = '';
            document.getElementById('newAttDate').value = '';
            fileInput.value = '';

            renderEmpAttachmentsList();
        }

        function removeEmpAttachment(index) {
            tempEmpAttachments.splice(index, 1);
            renderEmpAttachmentsList();
        }

        const processSingleEmpFile = (att) => {
            return new Promise((resolve, reject) => {
                if (!att.isNew) {
                    // Mantém o que já estava lá, remove só a flag local se houver
                    resolve({
                        docName: att.docName,
                        expirationDate: att.expirationDate,
                        fileName: att.fileName,
                        data: att.data,
                        url: att.url
                    });
                    return;
                }

                const file = att.fileObj;
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = (e) => {
                        const img = new Image(); img.src = e.target.result;
                        img.onload = () => {
                            const canvas = document.createElement('canvas'); let w=img.width, h=img.height;
                            if(w>1200){h=Math.round(h*1200/w);w=1200;} if(h>1200){w=Math.round(w*1200/h);h=1200;}
                            canvas.width=w; canvas.height=h; canvas.getContext('2d').drawImage(img,0,0,w,h);
                            let dataUrl = canvas.toDataURL('image/jpeg', 0.8);

                            if(dataUrl.length <= 950*1024) {
                                resolve({ docName: att.docName, expirationDate: att.expirationDate, fileName: file.name, data: dataUrl });
                            } else {
                                uploadToStorageAsPromise(file, att).then(resolve).catch(reject);
                            }
                        };
                        img.onerror = () => reject(new Error('Erro ao processar a imagem: ' + file.name));
                    };
                    reader.onerror = () => reject(new Error('Erro no leitor de arquivo: ' + file.name));
                } else {
                    if (file.size <= 750*1024) {
                        const r = new FileReader();
                        r.onload = (e) => resolve({ docName: att.docName, expirationDate: att.expirationDate, fileName: file.name, data: e.target.result });
                        r.readAsDataURL(file);
                        r.onerror = () => reject(new Error('Erro no leitor de arquivo: ' + file.name));
                    } else {
                        uploadToStorageAsPromise(file, att).then(resolve).catch(reject);
                    }
                }
            });
        };

        const uploadToStorageAsPromise = (file, att) => {
            return new Promise((resolve, reject) => {
                let timeoutFired = false;
                const fallbackTimer = setTimeout(() => { timeoutFired = true; reject(new Error(`O arquivo ${file.name} é muito grande e excedeu o tempo (Plano Grátis).`)); }, 15000);

                const storageRef = storage.ref(`funcionarios/documentos/${Date.now()}_${file.name.replace(/[^a-zA-Z0-9.]/g, '_')}`);
                const uploadTask = storageRef.put(file);

                uploadTask.on('state_changed',
                    (s) => { if(s.bytesTransferred > 0) clearTimeout(fallbackTimer); if(timeoutFired) uploadTask.cancel(); },
                    (e) => { clearTimeout(fallbackTimer); reject(new Error('Falha no upload para a Nuvem.')); },
                    () => {
                        clearTimeout(fallbackTimer);
                        if(timeoutFired) return;
                        uploadTask.snapshot.ref.getDownloadURL().then(url => {
                            resolve({ docName: att.docName, expirationDate: att.expirationDate, fileName: file.name, url: url });
                        }).catch(reject);
                    }
                );
            });
        };

        async function saveEmployee() {
            const id = document.getElementById('empId').value;
            const name = document.getElementById('empName').value;
            const role = document.getElementById('empRole').value;
            const admission = document.getElementById('empAdm').value;
            
            if(!name || !role || !admission) return Swal.fire('Aviso', 'Preencha Nome, Cargo e Admissão (*).', 'warning');

            const isEdit = !!id;

            Swal.fire({title: 'Processando Dados e Anexos...', html: 'Por favor, aguarde.', allowOutsideClick: false, didOpen: () => Swal.showLoading()});

            try {
                // Processa todos os arquivos adicionados (Upload/Conversão) de forma paralela
                const processedAttachments = await Promise.all(tempEmpAttachments.map(att => processSingleEmpFile(att)));

                const empObj = { 
                    id: isEdit ? parseInt(id) : generateId(state.employees), 
                    name, role, 
                    dept: document.getElementById('empDept').value, 
                    admission, 
                    status: document.getElementById('empStatus').value, 
                    email: document.getElementById('empEmail').value.trim(),
                    forcePasswordChange: isEdit ? (document.getElementById('empResetPass')?.checked || false) : (document.getElementById('empTempPass')?.value.length > 0),
                    cpf: document.getElementById('empCpf').value, 
                    rg: document.getElementById('empRg').value, 
                    dataNasc: document.getElementById('empNasc').value,
                    telefone: document.getElementById('empTel').value,
                    cep: document.getElementById('empCep').value, 
                    logradouro: document.getElementById('empLogradouro').value, 
                    numero: document.getElementById('empNumero').value, 
                    complemento: document.getElementById('empCompl').value,
                    bairro: document.getElementById('empBairro').value, 
                    cidade: document.getElementById('empCidade').value,
                    uf: document.getElementById('empUf').value,
                    attachments: processedAttachments
                };
                
                // Limpeza do antigo "attachment" para quem já possuía e foi migrado
                delete empObj.attachment;
                
                await dbSave('employees', empObj.id, empObj);
                addLog('Colaboradores', isEdit ? 'Edição' : 'Criação', `Perfil de "${name}" salvo com ${processedAttachments.length} anexo(s).`);
                
                closeModal(); 
                renderColaboradores(document.getElementById('app-content'));
                Swal.fire('Sucesso!', 'Dados e anexos salvos com sucesso.', 'success');
            } catch (error) {
                console.error(error);
                Swal.fire('Erro no Processamento', error.message || 'Ocorreu um problema ao salvar os arquivos.', 'error');
            }
        }

        function deleteEmployee(id) {
            const emp = state.employees.find(e => e.id === id);
            if (!emp) return;

            // Verificação de Integridade Relacional (Regra ISO 9001)
            const hasAttendance = state.attendanceLists.some(l => l.attendees && l.attendees.includes(id));
            const hasEffectiveness = state.effectivenessEvaluations.some(e => e.empId === id);
            const hasSkills = state.employeeSkills.some(e => e.empId === id && (e.req > 0 || e.actual > 0));
            const hasPerformance = state.performanceReviews.some(p => p.empId === id);

            if (hasAttendance || hasEffectiveness || hasSkills || hasPerformance) {
                Swal.fire({
                    title: 'Ação Restrita (ISO 9001)',
                    html: `O colaborador <strong>${emp.name}</strong> possui históricos no sistema.<br>Para manter a integridade, ele não pode ser excluído.<br><br>Deseja alterá-lo para <strong>INATIVO</strong>?`,
                    icon: 'warning', showCancelButton: true, confirmButtonColor: '#f59e0b', confirmButtonText: 'Sim, Inativar'
                }).then((result) => {
                    if (result.isConfirmed) {
                        emp.status = 'Inativo'; dbSave('employees', emp.id, emp);
                        addLog('Colaboradores', 'Inativação', `"${emp.name}" inativado para preservação de histórico.`);
                        renderColaboradores(document.getElementById('app-content'));
                    }
                });
                return;
            }

            requirePasswordForAction(() => {
                dbDelete('employees', id);
                addLog('Colaboradores', 'Exclusão', `O colaborador "${emp.name}" foi removido.`);
                renderColaboradores(document.getElementById('app-content'));
                Swal.fire('Excluído!', '', 'success');
            });
        }

        function viewTrainingHistory(empId, trainingId) {

                <table class="w-full text-sm border-collapse min-w-[500px]">
                    <thead><tr class="bg-gray-50 border-b text-xs text-gray-500 uppercase tracking-wider">
                        <th class="p-3 font-medium">Data Realização</th><th class="p-3 font-medium">Instrutor</th><th class="p-3 font-medium text-center">Eficácia</th><th class="p-3 font-medium text-center">Evidência</th>
                    </tr></thead><tbody class="divide-y divide-gray-100">`;

            parts.forEach((p, index) => {
                const isLatest = index === 0;
                const evalRecord = state.effectivenessEvaluations.find(e => e.recordId === p.id && e.empId === empId);
                let efStatus = 'Pendente'; let efClass = 'bg-amber-100 text-amber-700';
                if (evalRecord) {
                    if (evalRecord.status === 'Eficaz') { efStatus = 'Eficaz'; efClass = 'bg-green-100 text-green-700'; }
                    else if (evalRecord.status === 'Ineficaz') { efStatus = 'Não Eficaz'; efClass = 'bg-red-100 text-red-700'; }
                }
                
                let anexoBtn = p.attachment ? `<button onclick="viewAttachment(${p.id})" class="text-blue-600 hover:text-blue-800"><i data-lucide="paperclip" class="w-4 h-4 inline"></i></button>` : '-';

                html += `<tr class="hover:bg-gray-50 ${isLatest ? 'bg-blue-50/40' : ''}">
                    <td class="p-3 text-gray-800 font-medium">${formatDate(p.date)} ${isLatest ? '<span class="ml-2 px-1 py-0.5 bg-blue-100 text-blue-700 text-[9px] rounded uppercase">Atual</span>' : ''}</td>
                    <td class="p-3 text-gray-600">${p.instructor || '-'}</td>
                    <td class="p-3 text-center"><span class="px-2 py-0.5 rounded-full text-[10px] font-bold ${efClass}">${efStatus}</span></td>
                    <td class="p-3 text-center">${anexoBtn}</td>
                </tr>`;
            });
            html += `</tbody></table></div>`;

            Swal.fire({ title: `<h3 class="text-lg font-bold text-gray-800 border-b pb-3"><i data-lucide="history" class="w-5 h-5 inline mr-2 text-blue-600"></i> Histórico de Renovação</h3>`, html: html, width: '700px', showCloseButton: true, showConfirmButton: false, didOpen: () => { if(window.lucide) window.lucide.createIcons(); } });
        }

        function viewPerformanceHistory(empId) {
            const emp = state.employees.find(e => e.id === empId); if(!emp) return;
            const reviews = state.performanceReviews.filter(r => r.empId === empId).sort((a, b) => new Date(b.date) - new Date(a.date));
            if (reviews.length === 0) return Swal.fire('Aviso', 'Sem avaliações de desempenho.', 'info');

            let allSkillsMap = new Map();
            reviews.forEach(r => { if(r.skills) r.skills.forEach(s => allSkillsMap.set(s.skillId, s.skillName)); });

            let html = `
                <div class="text-left mb-4"><p class="text-sm text-gray-500">Acompanhamento: <strong class="text-gray-800">${emp.name}</strong></p></div>
                <div class="overflow-x-auto border border-gray-200 rounded-lg custom-scrollbar">
                    <table class="w-full text-left border-collapse text-sm">
                        <thead><tr class="bg-gray-50 border-b text-xs text-gray-500 uppercase"><th class="p-3">Competência Avaliada</th>${reviews.map((r, index) => `<th class="p-3 text-center border-l bg-white">${formatDate(r.date)}${index===0?' <br><span class="text-[9px] bg-emerald-100 text-emerald-700 px-1 rounded">Atual</span>':''}</th>`).join('')}</tr></thead>
                        <tbody class="divide-y divide-gray-100">`;

            if(allSkillsMap.size > 0) {
                allSkillsMap.forEach((skillName, skillId) => {
                    html += `<tr><td class="p-3 font-medium">${skillName}</td>`;
                    reviews.forEach(r => { const sk = r.skills ? r.skills.find(x => x.skillId === skillId) : null; const score = sk && sk.score > 0 ? sk.score : '-'; html += `<td class="p-3 text-center border-l font-bold ${score !== '-' ? 'text-blue-600' : 'text-gray-300'}">${score}</td>`; });
                    html += `</tr>`;
                });
            }

            html += `
                        <tr class="bg-gray-100/60 border-t-2">
                            <td class="p-3 font-bold text-right text-xs uppercase">Média Global:</td>
                            ${reviews.map(r => `<td class="p-3 text-center border-l font-black text-base ${!r.minScore ? 'text-blue-700' : (r.score >= r.minScore ? 'text-green-600' : 'text-red-600')}">${r.score}</td>`).join('')}
                        </tr>
                    </tbody>
                </table>
            </div>`;

            Swal.fire({ title: `<h3 class="text-lg font-bold border-b pb-3"><i data-lucide="bar-chart-2" class="w-5 h-5 inline mr-2 text-emerald-600"></i> Evolução Anual</h3>`, html: html, width: '850px', showCloseButton: true, showConfirmButton: false, didOpen: () => { if(window.lucide) window.lucide.createIcons(); } });
        }

        function openEmployeeDossier(empId) {
            const emp = state.employees.find(e => e.id === empId); if(!emp) return;
            const role = state.roles.find(r => r.name === emp.role);
            let dossierTrainings = []; let processedIds = [];

            const processTraining = (tId, isMandatory) => {
                if (processedIds.includes(tId)) return; processedIds.push(tId);
                const tr = state.trainings.find(t => t.id === tId); if(!tr) return;
                
                const parts = state.attendanceLists.filter(l => l.trainingId === tId && l.attendees.includes(empId)).sort((a, b) => new Date(b.date) - new Date(a.date));
                
                let status = isMandatory ? 'Não realizado' : 'Realizado'; let statusClass = isMandatory ? 'bg-red-100 text-red-800' : 'bg-blue-100 text-blue-800';
                let lastDate = '-'; let valDate = '-'; let listId = null; let hasAttachment = false; let historyCount = 0;
                let efStatus = 'Não realizado'; let efClass = 'bg-gray-100 text-gray-500';

                if(parts.length > 0) {
                    historyCount = parts.length > 1 ? parts.length - 1 : 0;
                    const lastPart = parts[0]; lastDate = formatDate(lastPart.date); listId = lastPart.id; hasAttachment = !!lastPart.attachment;
                    
                    const evalRecord = state.effectivenessEvaluations.find(e => e.recordId === listId && e.empId === empId);
                    if (evalRecord) {
                        if (evalRecord.status === 'Eficaz') { efStatus = 'Eficaz'; efClass = 'bg-green-100 text-green-700'; } 
                        else if (evalRecord.status === 'Ineficaz') { efStatus = 'Não Eficaz'; efClass = 'bg-red-100 text-red-700'; } 
                        else { efStatus = 'Pendente'; efClass = 'bg-amber-100 text-amber-700'; }
                    } else { efStatus = 'Pendente'; efClass = 'bg-amber-100 text-amber-700'; }
                    
                    if(tr.periodicityMonths > 0) {
                        const [y,m,d] = lastPart.date.split('-'); const val = new Date(y, m-1, d); val.setMonth(val.getMonth() + tr.periodicityMonths);
                        valDate = `${String(val.getDate()).padStart(2, '0')}/${String(val.getMonth() + 1).padStart(2, '0')}/${val.getFullYear()}`;
                        if(new Date() > val) { status = 'Vencido'; statusClass = 'bg-orange-100 text-orange-800'; } else { status = 'Em dia'; statusClass = 'bg-green-100 text-green-800'; }
                    } else { status = 'Em dia'; statusClass = 'bg-green-100 text-green-800'; valDate = 'Indeterminado'; }
                } else if (!isMandatory) return;

                dossierTrainings.push({ tId, empId, trName: tr.title, isMandatory, status, statusClass, lastDate, valDate, listId, hasAttachment, efStatus, efClass, historyCount });
            };

            if(role && role.trainingIds) role.trainingIds.forEach(tId => processTraining(tId, true));
            state.attendanceLists.forEach(list => { if (list.attendees.includes(empId)) processTraining(list.trainingId, false); });

            const bodyHtml = `
                <div class="mb-4 flex items-center gap-3">
                    <div class="h-12 w-12 rounded-full bg-blue-100 flex items-center justify-center text-blue-700 font-bold text-xl">${emp.name.charAt(0).toUpperCase()}</div>
                    <div>
                        <div class="flex items-center gap-2"><h4 class="text-lg font-bold text-gray-800">${emp.name}</h4><button onclick="viewPerformanceHistory(${emp.id})" class="bg-emerald-50 text-emerald-700 border border-emerald-200 px-2 py-0.5 rounded text-[10px] font-bold"><i data-lucide="bar-chart-2" class="w-3 h-3 inline mr-1"></i> Evolução de Notas</button></div>
                        <p class="text-xs font-semibold text-gray-500 mt-1">Cargo: <span class="text-blue-600">${emp.role}</span></p>
                    </div>
                </div>
                <div class="overflow-x-auto custom-scrollbar border border-gray-200 rounded-lg shadow-sm">
                    <table class="w-full text-left border-collapse min-w-[650px]">
                        <thead><tr class="bg-gray-50 text-gray-600 text-xs uppercase border-b"><th class="p-3">Treinamento</th><th class="p-3 text-center">Status</th><th class="p-3 text-center">Realização</th><th class="p-3 text-center">Validade</th><th class="p-3 text-center">Eficácia</th><th class="p-3 text-center">Evidência</th></tr></thead>
                        <tbody class="divide-y divide-gray-100 text-sm">
                            ${dossierTrainings.length > 0 ? dossierTrainings.map(t => `
                                <tr class="hover:bg-blue-50/50">
                                    <td class="p-3 font-medium text-gray-800">${t.trName} ${!t.isMandatory ? '<span class="px-1 py-0.5 rounded text-[9px] bg-purple-100 text-purple-700">Extra</span>' : ''}</td>
                                    <td class="p-3 text-center"><span class="px-2 py-1 rounded-full text-[10px] font-bold ${t.statusClass}">${t.status}</span></td>
                                    <td class="p-3 text-center"><div class="flex flex-col items-center"><span>${t.lastDate}</span>${t.historyCount > 0 ? `<button onclick="viewTrainingHistory(${t.empId}, ${t.tId})" class="mt-1 text-[10px] text-blue-600 bg-blue-50 px-2 py-0.5 rounded-full"><i data-lucide="history" class="w-3 h-3 inline"></i> +${t.historyCount}</button>` : ''}</div></td>
                                    <td class="p-3 text-center">${t.valDate}</td>
                                    <td class="p-3 text-center"><span class="px-2 py-1 rounded-full text-[10px] font-bold ${t.efClass}">${t.efStatus}</span></td>
                                    <td class="p-3 text-center">${t.hasAttachment ? `<button onclick="viewAttachment(${t.listId})" class="text-blue-600"><i data-lucide="paperclip" class="w-4 h-4 inline"></i> Abrir</button>` : '-'}</td>
                                </tr>
                            `).join('') : '<tr><td colspan="6" class="p-8 text-center text-gray-500">Sem treinamentos.</td></tr>'}
                        </tbody>
                    </table>
                </div>
            `;
            openModal('Dossiê de Treinamentos', bodyHtml, `<button onclick="closeModal()" class="px-5 py-2 bg-gray-100 text-gray-700 rounded-lg font-medium shadow-sm">Fechar</button>`);
        }

        // ================= CARGOS =================
        function renderCargos(container) {
            container.innerHTML = `
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                    <div class="p-6 border-b flex justify-between items-center bg-gray-50">
                        <h3 class="text-lg font-semibold text-gray-800">Descrições de Cargo</h3>
                        <div>
                            <button onclick="openLogModal('Cargos')" class="bg-white border px-4 py-2 rounded-lg text-sm mr-2"><i data-lucide="history" class="w-4 h-4 inline"></i></button>
                            <button onclick="openRoleModal()" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm"><i data-lucide="plus" class="w-4 h-4 inline mr-1"></i> Novo Cargo</button>
                        </div>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse text-sm">
                            <thead><tr class="bg-white text-gray-500 text-xs uppercase border-b"><th class="p-4">Cargo</th><th class="p-4">Missão / Descrição</th><th class="p-4">Experiência Exigida</th><th class="p-4 text-center">Ações</th></tr></thead>
                            <tbody class="divide-y divide-gray-100">
                                ${state.roles.map(role => `
                                    <tr class="hover:bg-gray-50">
                                        <td class="p-4 font-medium text-gray-800">${role.name}</td><td class="p-4 text-gray-600 truncate max-w-xs">${role.desc || '-'}</td><td class="p-4 text-gray-600">${role.experience || '-'}</td>
                                        <td class="p-4 text-center whitespace-nowrap"><button onclick="openRoleModal(${role.id})" class="text-blue-600 mx-1"><i data-lucide="edit" class="w-4 h-4"></i></button><button onclick="deleteRole(${role.id})" class="text-red-600 mx-1"><i data-lucide="trash-2" class="w-4 h-4"></i></button></td>
                                    </tr>
                                `).join('') || '<tr><td colspan="4" class="p-4 text-center text-gray-500">Nenhum cargo.</td></tr>'}
                            </tbody>
                        </table>
                    </div>
                </div>`;
        }

        function openRoleModal(id = null) {
            const role = id ? state.roles.find(r => r.id === id) : { name: '', desc: '', responsibilities: '', competencies: '', skillIds: [], trainingIds: [], experience: '' };
            const bodyHtml = `
                <form id="roleForm" class="space-y-3 text-left">
                    <input type="hidden" id="roleId" value="${id || ''}">
                    <div><label class="text-sm font-semibold">Nome do Cargo *</label><input type="text" id="roleName" value="${role.name}" required class="w-full border p-2 rounded"></div>
                    <div><label class="text-sm font-semibold">Missão</label><textarea id="roleDesc" rows="2" class="w-full border p-2 rounded">${role.desc || ''}</textarea></div>
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="text-sm font-semibold">Atividades</label><textarea id="roleResp" rows="2" class="w-full border p-2 rounded">${role.responsibilities || ''}</textarea></div>
                        <div><label class="text-sm font-semibold">Experiência</label><textarea id="roleExp" rows="2" class="w-full border p-2 rounded">${role.experience || ''}</textarea></div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="text-sm font-semibold">Comp. Comportamentais</label><textarea id="roleCompetencies" rows="2" class="w-full border p-2 rounded">${role.competencies || ''}</textarea></div>
                        <div>
                            <label class="text-sm font-semibold">Habilidades Técnicas</label>
                            <div class="flex gap-2"><select id="roleSkillSelect" class="flex-1 border p-1.5 rounded text-sm"><option value="">Selecionar...</option>${state.skills.filter(s => !(role.skillIds || []).includes(s.id)).map(s => `<option value="${s.id}">${s.name}</option>`).join('')}</select><button type="button" onclick="addSkillToRole()" class="bg-gray-100 px-3 rounded">Add</button></div>
                            <div id="roleSkillsContainer" class="flex flex-wrap gap-1 mt-1">${(role.skillIds || []).map(sId => { const s = state.skills.find(x => x.id === sId); return s ? `<span class="bg-blue-50 text-blue-800 border border-blue-200 rounded-full px-2 py-0.5 text-xs sk-badge" data-id="${s.id}">${s.name} <button onclick="removeSkillFromRole(this)" class="text-blue-500 ml-1">&times;</button></span>` : ''; }).join('')}</div>
                        </div>
                    </div>
                    <div>
                        <label class="text-sm font-semibold">Treinamentos Necessários</label>
                        <div class="flex gap-2"><select id="roleTrainingSelect" class="flex-1 border p-1.5 rounded text-sm"><option value="">Selecionar...</option>${state.trainings.filter(t => !(role.trainingIds || []).includes(t.id)).map(t => `<option value="${t.id}">${t.title}</option>`).join('')}</select><button type="button" onclick="addTrainingToRole()" class="bg-gray-100 px-3 rounded">Add</button></div>
                        <div id="roleTrainingsContainer" class="flex flex-wrap gap-1 mt-1">${(role.trainingIds || []).map(tId => { const t = state.trainings.find(x => x.id === tId); return t ? `<span class="bg-blue-50 text-blue-800 border border-blue-200 rounded-full px-2 py-0.5 text-xs tr-badge" data-id="${t.id}">${t.title} <button onclick="removeTrainingFromRole(this)" class="text-blue-500 ml-1">&times;</button></span>` : ''; }).join('')}</div>
                    </div>
                </form>
            `;
            openModal(id ? 'Editar Cargo' : 'Novo Cargo', bodyHtml, `<button onclick="closeModal()" class="px-4 py-2 text-gray-600">Cancelar</button><button onclick="saveRole()" class="px-4 py-2 bg-blue-600 text-white rounded">Salvar</button>`);
        }

        function addSkillToRole() { const select = document.getElementById('roleSkillSelect'); const sId = select.value; if (!sId) return; document.getElementById('roleSkillsContainer').insertAdjacentHTML('beforeend', `<span class="bg-blue-50 text-blue-800 border border-blue-200 rounded-full px-2 py-0.5 text-xs sk-badge" data-id="${sId}">${select.options[select.selectedIndex].text} <button onclick="removeSkillFromRole(this)" class="text-blue-500 ml-1">&times;</button></span>`); select.options[select.selectedIndex].remove(); }
        function removeSkillFromRole(btn) { const badge = btn.parentElement; const id = parseInt(badge.getAttribute('data-id')); badge.remove(); const s = state.skills.find(x=>x.id===id); if(s) document.getElementById('roleSkillSelect').insertAdjacentHTML('beforeend', `<option value="${s.id}">${s.name}</option>`); }
        function addTrainingToRole() { const select = document.getElementById('roleTrainingSelect'); const tId = select.value; if (!tId) return; document.getElementById('roleTrainingsContainer').insertAdjacentHTML('beforeend', `<span class="bg-blue-50 text-blue-800 border border-blue-200 rounded-full px-2 py-0.5 text-xs tr-badge" data-id="${tId}">${select.options[select.selectedIndex].text} <button onclick="removeTrainingFromRole(this)" class="text-blue-500 ml-1">&times;</button></span>`); select.options[select.selectedIndex].remove(); }
        function removeTrainingFromRole(btn) { const badge = btn.parentElement; const id = parseInt(badge.getAttribute('data-id')); badge.remove(); const t = state.trainings.find(x=>x.id===id); if(t) document.getElementById('roleTrainingSelect').insertAdjacentHTML('beforeend', `<option value="${t.id}">${t.title}</option>`); }

        function saveRole() {
            const id = document.getElementById('roleId').value; const name = document.getElementById('roleName').value;
            if(!name) return Swal.fire('Aviso', 'Nome obrigatório.', 'warning');
            const skillIds = Array.from(document.querySelectorAll('#roleSkillsContainer .sk-badge')).map(b => parseInt(b.getAttribute('data-id')));
            const trainingIds = Array.from(document.querySelectorAll('#roleTrainingsContainer .tr-badge')).map(b => parseInt(b.getAttribute('data-id')));
            const roleObj = { id: id ? parseInt(id) : generateId(state.roles), name, desc: document.getElementById('roleDesc').value, responsibilities: document.getElementById('roleResp').value, competencies: document.getElementById('roleCompetencies').value, skillIds, trainingIds, experience: document.getElementById('roleExp').value };
            dbSave('roles', roleObj.id, roleObj); addLog('Cargos', id?'Edição':'Criação', `Cargo "${name}" salvo.`);
            closeModal(); renderCargos(document.getElementById('app-content'));
        }

        function deleteRole(id) {
            const role = state.roles.find(r => r.id === id);
            if (state.employees.some(emp => emp.role === role.name)) return Swal.fire('Erro', 'Cargo associado a colaboradores.', 'error');
            requirePasswordForAction(() => { dbDelete('roles', id); renderCargos(document.getElementById('app-content')); Swal.fire('Excluído', '', 'success'); });
        }

        // ================= MATRIZ E HABILIDADES =================
        function renderHabilidades(container) {
            container.innerHTML = `
                <div class="bg-white rounded-xl shadow border p-6 mb-6">
                    <div class="flex justify-between items-center mb-6">
                        <div><h3 class="text-lg font-semibold text-gray-800">Matriz de Competências por Cargo</h3></div>
                        <div><button onclick="openManageSkillsModal()" class="bg-white border px-4 py-2 rounded text-sm mr-2"><i data-lucide="list" class="w-4 h-4 inline"></i> Catálogo</button><button onclick="openSkillModal()" class="bg-blue-600 text-white px-4 py-2 rounded text-sm"><i data-lucide="plus" class="w-4 h-4 inline"></i> Nova</button></div>
                    </div>
                    <div class="mb-6 bg-blue-50 p-4 rounded"><select id="matrixRoleFilter" onchange="updateMatrixView()" class="w-full md:w-1/3 border p-2 rounded"><option value="">-- Selecione o Cargo --</option>${state.roles.map(r => `<option value="${r.name}" ${currentMatrixRole === r.name ? 'selected' : ''}>${r.name}</option>`).join('')}</select></div>
                    <div id="matrixTableContainer" class="overflow-x-auto custom-scrollbar border rounded hidden"></div><div id="matrixEmptyState" class="text-center py-12 bg-gray-50 border-2 border-dashed rounded text-gray-500">Selecione um cargo.</div>
                </div>
            `;
            if(currentMatrixRole) updateMatrixView();
        }

        function updateMatrixView() {
            currentMatrixRole = document.getElementById('matrixRoleFilter').value;
            const container = document.getElementById('matrixTableContainer'); const emptyState = document.getElementById('matrixEmptyState');
            if (!currentMatrixRole) { container.classList.add('hidden'); emptyState.classList.remove('hidden'); return; }

            const role = state.roles.find(r => r.name === currentMatrixRole); const emps = state.employees.filter(e => e.role === currentMatrixRole && e.status === 'Ativo'); const roleSkills = (role.skillIds || []).map(id => state.skills.find(s => s.id === id)).filter(s => s);

            if (roleSkills.length === 0) container.innerHTML = `<div class="p-8 text-center text-gray-500">Este cargo não possui habilidades.</div>`;
            else {
                let html = `<table class="w-full text-left border-collapse min-w-[600px]"><thead><tr><th class="p-4 bg-gray-50 border-b text-sm">Colaborador</th>${roleSkills.map(s => `<th class="p-4 bg-gray-50 border-b text-center text-xs">${s.name}</th>`).join('')}</tr></thead><tbody>`;
                emps.forEach(emp => {
                    html += `<tr class="hover:bg-blue-50/50"><td class="p-4 border-b font-medium text-sm">${emp.name}</td>`;
                    roleSkills.forEach(skill => {
                        const es = state.employeeSkills.find(x => x.empId === emp.id && x.skillId === skill.id) || { req: 0, actual: 0 };
                        const gap = es.req > 0 && es.actual < es.req;
                        html += `<td class="p-2 border-b text-center cursor-pointer" onclick="openEvalSkillModal(${emp.id}, ${skill.id})"><div class="flex flex-col items-center"><span class="text-[10px] text-gray-400">Req: ${es.req}</span><span class="w-8 h-8 flex items-center justify-center rounded-full font-bold shadow-sm ${gap ? 'bg-red-50 text-red-600' : 'bg-green-50 text-green-600'}">${es.actual || '-'}</span></div></td>`;
                    });
                    html += `</tr>`;
                });
                container.innerHTML = html + `</tbody></table>`;
            }
            container.classList.remove('hidden'); emptyState.classList.add('hidden');
        }

        function openEvalSkillModal(empId, skillId) {
            const es = state.employeeSkills.find(x => x.empId === empId && x.skillId === skillId) || { req: 0, actual: 0 };
            openModal('Ajustar Competência / Meta', `<div class="bg-blue-50 p-3 rounded mb-4 text-sm text-blue-800">Nota Atual preenchida pela Avaliação de Desempenho. Defina apenas a <strong>Meta (Exigida)</strong>.</div><div class="grid grid-cols-2 gap-4"><div><label class="block font-bold">Exigida (Meta)</label><input type="number" id="skReq" value="${es.req}" class="w-full border p-2 rounded" step="0.5" min="0" max="5"></div><div><label class="block text-gray-400 font-bold">Nota Atual</label><input type="number" value="${es.actual}" class="w-full border p-2 rounded bg-gray-50 text-gray-500" disabled></div></div>`, `<button onclick="saveEmployeeSkill(${empId}, ${skillId})" class="bg-blue-600 text-white px-4 py-2 rounded">Salvar</button>`);
        }
        function saveEmployeeSkill(empId, skillId) { dbSave('employeeSkills', `${empId}_${skillId}`, { empId, skillId, req: parseFloat(document.getElementById('skReq').value) || 0, actual: parseFloat(document.querySelector('input[disabled]').value) || 0 }); closeModal(); updateMatrixView(); }

        function openManageSkillsModal() {
            openModal('Catálogo de Habilidades', `<table class="w-full text-left text-sm"><tr class="bg-gray-50 border-b"><th class="p-3">Habilidade</th><th class="p-3">Critérios</th><th class="p-3 text-center">Ações</th></tr>${state.skills.map(s => `<tr class="border-b"><td class="p-3 font-bold">${s.name}</td><td class="p-3 text-xs text-gray-600">${s.desc||'-'}</td><td class="p-3 text-center whitespace-nowrap"><button onclick="openSkillModal(${s.id})" class="text-blue-600 mx-1"><i data-lucide="edit" class="w-4 h-4"></i></button><button onclick="deleteSkill(${s.id})" class="text-red-600 mx-1"><i data-lucide="trash-2" class="w-4 h-4"></i></button></td></tr>`).join('')}</table>`, `<button onclick="closeModal()" class="bg-gray-100 px-4 py-2 rounded">Fechar</button>`);
        }
        function openSkillModal(id = null) {
            const skill = id ? state.skills.find(s => s.id === id) : { name: '', desc: '' };
            openModal(id?'Editar Habilidade':'Nova Habilidade', `<input type="hidden" id="skId" value="${id||''}"><div class="mb-3"><label class="block font-bold">Nome *</label><input type="text" id="skName" value="${skill.name}" class="w-full border p-2 rounded"></div><div><label class="block font-bold">Critérios</label><textarea id="skDesc" class="w-full border p-2 rounded" rows="3">${skill.desc||''}</textarea></div>`, `<button onclick="saveSkill()" class="bg-blue-600 text-white px-4 py-2 rounded">Salvar</button>`);
        }
        function saveSkill() { const name = document.getElementById('skName').value; if(!name) return; const obj = { id: document.getElementById('skId').value ? parseInt(document.getElementById('skId').value) : generateId(state.skills), name, desc: document.getElementById('skDesc').value }; dbSave('skills', obj.id, obj); closeModal(); renderHabilidades(document.getElementById('app-content')); if(document.getElementById('modal-title').innerText.includes('Catálogo')) openManageSkillsModal(); }
        function deleteSkill(id) { if(state.roles.some(r => r.skillIds && r.skillIds.includes(id))) return Swal.fire('Erro', 'Vinculada a Cargos.', 'error'); requirePasswordForAction(()=>{ dbDelete('skills', id); state.employeeSkills.filter(es=>es.skillId===id).forEach(es=>dbDelete('employeeSkills', `${es.empId}_${es.skillId}`)); renderHabilidades(document.getElementById('app-content')); openManageSkillsModal(); }); }

        // ================= TREINAMENTOS (CATÁLOGO) =================
        function renderTreinamentos(container) {
            container.innerHTML = `<div class="bg-white rounded-xl shadow border p-6"><div class="flex justify-between items-center mb-4"><h3 class="text-lg font-semibold">Catálogo de Treinamentos</h3><button onclick="openTrainingModal()" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm">Novo Treinamento</button></div><table class="w-full text-left text-sm"><tr class="bg-gray-50 border-b"><th class="p-3">Título</th><th class="p-3">Tipo</th><th class="p-3 text-center">Ações</th></tr>${state.trainings.map(t => `<tr class="border-b"><td class="p-3 font-medium">${t.title}</td><td class="p-3">${t.type}</td><td class="p-3 text-center"><button onclick="openTrainingModal(${t.id})" class="text-blue-600 mx-1"><i data-lucide="edit" class="w-4 h-4"></i></button><button onclick="deleteTraining(${t.id})" class="text-red-600 mx-1"><i data-lucide="trash-2" class="w-4 h-4"></i></button></td></tr>`).join('')}</table></div>`;
        }

        function openTrainingModal(id = null) {
            const tr = id ? state.trainings.find(t => t.id === id) : { title: '', type: 'Interno', periodicityMonths: 0, content: '', roleIds: [], criteria: [] };
            openModal(id?'Editar Treinamento':'Cadastrar Treinamento', `
                <input type="hidden" id="trId" value="${id || ''}">
                <div class="space-y-3 text-left">
                    <div><label class="block font-bold">Título *</label><input type="text" id="trTitle" value="${tr.title}" class="w-full border p-2 rounded"></div>
                    <div class="grid grid-cols-2 gap-4"><div><label class="block font-bold">Tipo</label><select id="trType" class="w-full border p-2 rounded"><option value="Interno" ${tr.type==='Interno'?'selected':''}>Interno</option><option value="Externo" ${tr.type==='Externo'?'selected':''}>Externo</option></select></div><div><label class="block font-bold">Validade (Meses)</label><input type="number" id="trPeriod" value="${tr.periodicityMonths}" class="w-full border p-2 rounded"></div></div>
                    <div><label class="block font-bold">Conteúdo</label><textarea id="trContent" class="w-full border p-2 rounded" rows="2">${tr.content||''}</textarea></div>
                    
                    <div class="border-t pt-3"><label class="block font-bold text-blue-700 mb-1">Cargos Associados</label>
                        <div class="flex gap-2"><select id="trRoleSelect" class="flex-1 border p-1.5 rounded"><option value="">Vincular cargo...</option>${state.roles.filter(r => !(tr.roleIds || []).includes(r.id)).map(r => `<option value="${r.id}">${r.name}</option>`).join('')}</select><button type="button" onclick="addRoleToTraining()" class="bg-gray-100 px-3 rounded">Add</button></div>
                        <div id="trRolesContainer" class="flex flex-wrap gap-1 mt-1">${(tr.roleIds || []).map(rId => { const role = state.roles.find(r => r.id === rId); return role ? `<span class="bg-blue-50 text-blue-800 border px-2 py-0.5 rounded text-xs tr-role-badge" data-id="${role.id}">${role.name} <button onclick="this.parentElement.remove()" class="text-blue-500 ml-1">&times;</button></span>` : ''; }).join('')}</div>
                    </div>
                    
                    <div class="border-t pt-3"><label class="block font-bold text-emerald-700 mb-1">Critérios de Avaliação</label>
                        <div class="flex gap-2"><input type="text" id="trCriteriaInput" class="flex-1 border p-1.5 rounded" placeholder="Ex: Prova..."><button type="button" onclick="addCriteriaToTraining()" class="bg-gray-100 px-3 rounded">Add</button></div>
                        <div id="trCriteriaContainer" class="flex flex-wrap gap-1 mt-1">${(tr.criteria || []).map(crit => `<span class="bg-emerald-50 text-emerald-800 border px-2 py-0.5 rounded text-xs tr-crit-badge" data-val="${crit}">${crit} <button onclick="this.parentElement.remove()" class="text-emerald-500 ml-1">&times;</button></span>`).join('')}</div>
                    </div>
                </div>
            `, `<button onclick="saveTraining()" class="bg-blue-600 text-white px-4 py-2 rounded">Salvar</button>`);
        }

        function addRoleToTraining() { const s = document.getElementById('trRoleSelect'); if(!s.value) return; document.getElementById('trRolesContainer').insertAdjacentHTML('beforeend', `<span class="bg-blue-50 text-blue-800 border px-2 py-0.5 rounded text-xs tr-role-badge" data-id="${s.value}">${s.options[s.selectedIndex].text} <button onclick="this.parentElement.remove()" class="text-blue-500 ml-1">&times;</button></span>`); s.options[s.selectedIndex].remove(); }
        function addCriteriaToTraining() { const i = document.getElementById('trCriteriaInput'); if(!i.value.trim()) return; document.getElementById('trCriteriaContainer').insertAdjacentHTML('beforeend', `<span class="bg-emerald-50 text-emerald-800 border px-2 py-0.5 rounded text-xs tr-crit-badge" data-val="${i.value}">${i.value} <button onclick="this.parentElement.remove()" class="text-emerald-500 ml-1">&times;</button></span>`); i.value=''; }

        function saveTraining() {
            const title = document.getElementById('trTitle').value; if(!title) return;
            const roleIds = Array.from(document.querySelectorAll('#trRolesContainer .tr-role-badge')).map(b => parseInt(b.getAttribute('data-id')));
            const criteria = Array.from(document.querySelectorAll('#trCriteriaContainer .tr-crit-badge')).map(b => b.getAttribute('data-val'));
            const obj = { id: document.getElementById('trId').value ? parseInt(document.getElementById('trId').value) : generateId(state.trainings), title, type: document.getElementById('trType').value, periodicityMonths: parseInt(document.getElementById('trPeriod').value)||0, content: document.getElementById('trContent').value, roleIds, criteria };
            
            dbSave('trainings', obj.id, obj);
            state.roles.forEach(r => {
                let mod = false; if(!r.trainingIds) r.trainingIds=[];
                if(roleIds.includes(r.id) && !r.trainingIds.includes(obj.id)) { r.trainingIds.push(obj.id); mod=true; }
                else if(!roleIds.includes(r.id) && r.trainingIds.includes(obj.id)) { r.trainingIds.splice(r.trainingIds.indexOf(obj.id), 1); mod=true; }
                if(mod) dbSave('roles', r.id, r);
            });
            closeModal(); renderTreinamentos(document.getElementById('app-content'));
        }

        function deleteTraining(id) { requirePasswordForAction(()=>{ dbDelete('trainings', id); renderTreinamentos(document.getElementById('app-content')); }); }

        // INICIALIZAÇÃO
        auth.onAuthStateChanged((user) => { if (user) { currentUser = user; document.getElementById('user-avatar').innerText = user.email ? user.email.charAt(0).toUpperCase() : 'U'; loadDataFromFirestore(); } else auth.signInAnonymously(); });
    </script>
</body>
</html>
