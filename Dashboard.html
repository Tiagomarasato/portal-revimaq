<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGQ - Dashboard Operacional (ISO 9001)</title>
    
    <!-- Tailwind CSS para Estilização -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons para Ícones -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- SweetAlert2 para Modais e Mensagens -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- FIREBASE V8 -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .custom-scrollbar::-webkit-scrollbar { height: 8px; width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .modal-open { overflow: hidden; }
        
        /* Estilos de Impressão Integrados */
        @media print {
            @page { margin: 1cm; }
            body { -webkit-print-color-adjust: exact; print-color-adjust: exact; background: white; }
            .page-break { page-break-after: always; }
        }
    </style>
</head>
<body class="flex flex-col h-screen text-gray-800 bg-gray-50">

    <!-- Header / Navbar Superior -->
    <header class="bg-white shadow-sm z-20">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex">
                    <div class="flex-shrink-0 flex items-center">
                        <div class="p-2 bg-amber-100 rounded-lg mr-3">
                            <i data-lucide="bar-chart-2" class="w-6 h-6 text-amber-600"></i>
                        </div>
                        <h1 class="text-xl font-bold text-gray-800">SGQ <span class="text-amber-600">Operação</span></h1>
                    </div>
                    <!-- Desktop Menu -->
                    <nav class="hidden md:ml-6 md:flex md:space-x-4">
                        <a href="#" onclick="navigate('dashboard')" class="nav-dashboard menu-item inline-flex items-center px-1 pt-1 border-b-2 border-transparent text-sm font-medium text-gray-500 hover:text-gray-700 hover:border-gray-300 transition-colors">Dashboard</a>
                        <a href="#" onclick="navigate('presenca')" class="nav-presenca menu-item inline-flex items-center px-1 pt-1 border-b-2 border-transparent text-sm font-medium text-gray-500 hover:text-gray-700 hover:border-gray-300 transition-colors">Listas de Presença</a>
                        <a href="#" onclick="navigate('eficacia')" class="nav-eficacia menu-item inline-flex items-center px-1 pt-1 border-b-2 border-transparent text-sm font-medium text-gray-500 hover:text-gray-700 hover:border-gray-300 transition-colors">Eficácia</a>
                        <a href="#" onclick="navigate('desempenho')" class="nav-desempenho menu-item inline-flex items-center px-1 pt-1 border-b-2 border-transparent text-sm font-medium text-gray-500 hover:text-gray-700 hover:border-gray-300 transition-colors">Desempenho</a>
                    </nav>
                </div>
                <div class="flex items-center">
                    <a href="index.html" class="hidden md:inline-flex items-center px-4 py-2 border border-transparent text-sm font-bold rounded-md shadow-sm text-white bg-slate-800 hover:bg-slate-700 focus:outline-none transition-colors mr-4">
                        <i data-lucide="arrow-left" class="w-4 h-4 mr-2"></i> PORTAL
                    </a>
                    
                    <a href="cadastro.html" class="hidden md:inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md shadow-sm text-gray-700 bg-gray-100 hover:bg-gray-200 focus:outline-none transition-colors mr-4">
                        <i data-lucide="users" class="w-4 h-4 mr-2"></i> Ir para Cadastros (RH) &rarr;
                    </a>
                    
                    <button class="text-gray-500 hover:text-amber-600 relative mr-4" onclick="showDevInfo()">
                        <i data-lucide="info" class="w-5 h-5"></i>
                    </button>
                    <div class="h-8 w-8 rounded-full bg-amber-600 flex items-center justify-center text-white font-bold text-sm mr-4" id="user-avatar" title="Usuário logado">
                        --
                    </div>
                    <div class="flex items-center md:hidden ml-2">
                        <button type="button" onclick="toggleMobileMenu()" class="inline-flex items-center justify-center p-2 rounded-md text-gray-400 hover:text-gray-500 hover:bg-gray-100 focus:outline-none">
                            <i data-lucide="menu" class="w-6 h-6"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Mobile Menu -->
        <div class="md:hidden hidden border-t border-gray-200 shadow-lg absolute w-full bg-white z-50 top-16" id="mobile-menu">
            <div class="pt-2 pb-3 space-y-1">
                <a href="#" onclick="navigate('dashboard')" class="nav-dashboard menu-item block pl-4 pr-4 py-3 border-l-4 border-transparent text-base font-medium text-gray-600 hover:bg-gray-50">Dashboard</a>
                <a href="#" onclick="navigate('presenca')" class="nav-presenca menu-item block pl-4 pr-4 py-3 border-l-4 border-transparent text-base font-medium text-gray-600 hover:bg-gray-50">Listas de Presença</a>
                <a href="#" onclick="navigate('eficacia')" class="nav-eficacia menu-item block pl-4 pr-4 py-3 border-l-4 border-transparent text-base font-medium text-gray-600 hover:bg-gray-50">Eficácia</a>
                <a href="#" onclick="navigate('desempenho')" class="nav-desempenho menu-item block pl-4 pr-4 py-3 border-l-4 border-transparent text-base font-medium text-gray-600 hover:bg-gray-50">Desempenho</a>
                <a href="cadastro.html" class="block pl-4 pr-4 py-3 border-l-4 border-transparent text-base font-medium text-gray-700 bg-gray-100 hover:bg-gray-200 border-t border-gray-200 mt-1">
                    <i data-lucide="users" class="w-5 h-5 inline mr-2"></i> Ir para Cadastros &rarr;
                </a>
                <a href="index.html" class="block pl-4 pr-4 py-3 border-l-4 border-transparent text-base font-bold text-white bg-slate-800 hover:bg-slate-700 mt-1">
                    <i data-lucide="arrow-left" class="w-5 h-5 inline mr-2"></i> PORTAL
                </a>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 overflow-auto bg-gray-50 p-4 md:p-6" id="main-container">
        <div class="max-w-7xl mx-auto mb-4 flex justify-between items-center">
             <h2 class="text-2xl font-semibold text-gray-800" id="page-title">Dashboard</h2>
        </div>
        
        <div class="max-w-7xl mx-auto" id="app-content">
            <div class="flex h-64 w-full items-center justify-center">
                <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-amber-600"></div>
                <span class="ml-3 text-gray-500 font-medium">A carregar dados...</span>
            </div>
        </div>
    </main>

    <!-- Generic Modal Container -->
    <div id="modal-container" class="fixed inset-0 z-50 flex items-center justify-center hidden bg-black bg-opacity-50 backdrop-blur-sm transition-opacity p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-[750px] max-h-[95vh] flex flex-col transform transition-all scale-95" id="modal-content-wrapper">
            <div class="px-5 py-3 border-b border-gray-200 flex justify-between items-center bg-white rounded-t-xl flex-shrink-0">
                <h3 class="text-xl font-bold text-[#1e293b]" id="modal-title">Título do Modal</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 transition-colors">
                    <i data-lucide="x" class="w-5 h-5" stroke-width="2.5"></i>
                </button>
            </div>
            <div class="p-5 overflow-y-auto overflow-x-hidden custom-scrollbar flex-1 min-h-0" id="modal-body"></div>
            <div class="px-5 py-3 border-t border-gray-100 bg-white rounded-b-xl flex justify-end items-center gap-3 flex-shrink-0" id="modal-footer"></div>
        </div>
    </div>

    <!-- Script Global -->
    <script>
        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyBqV0KOQMAYR4z6P_RKnrQPDfkAR2CsXBI",
            authDomain: "gestao-de-pessoas-49200.firebaseapp.com",
            projectId: "gestao-de-pessoas-49200",
            storageBucket: "gestao-de-pessoas-49200.firebasestorage.app",
            messagingSenderId: "615097388185",
            appId: "1:615097388185:web:ef87969b64f4a886f23c08"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        
        const auth = firebase.auth();
        const db = firebase.firestore();
        const storage = firebase.storage(); 

        db.settings({ experimentalForceLongPolling: true });

        const appId = 'gestao-de-pessoas-49200';
        let currentUser = null;

        // --- 1. STATE MANAGEMENT ---
        const defaultData = {
            roles: [], employees: [], skills: [], employeeSkills: [], trainings: [], attendanceLists: [], effectivenessEvaluations: [], performanceReviews: [], logs: []
        };
        
        let state = JSON.parse(JSON.stringify(defaultData));

        function loadDataFromFirestore() {
            if (!currentUser) return;
            
            const fallbackTimer = setTimeout(() => {
                if(!currentPage) { currentPage = 'dashboard'; navigate(currentPage); }
            }, 3000);

            const collections = ['roles', 'employees', 'skills', 'employeeSkills', 'trainings', 'attendanceLists', 'effectivenessEvaluations', 'performanceReviews', 'logs'];
            let loadedCount = 0;

            collections.forEach(col => {
                db.collection(`artifacts/${appId}/public/data/${col}`).onSnapshot((snapshot) => {
                    state[col] = snapshot.docs.map(doc => doc.data());
                    
                    if(col === 'logs') state.logs.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                    if(col === 'attendanceLists') state.attendanceLists.sort((a, b) => new Date(a.date) - new Date(b.date));
                    
                    loadedCount++;
                    if(loadedCount >= collections.length) {
                        clearTimeout(fallbackTimer);
                        if (!currentPage) { currentPage = 'dashboard'; navigate(currentPage); } 
                        else { navigate(currentPage); }
                    }
                }, (error) => { console.error(`Erro ao ler coleção ${col}:`, error); });
            });
        }

        async function dbSave(collection, docId, data) {
            if(!currentUser) return;
            try { await db.collection(`artifacts/${appId}/public/data/${collection}`).doc(docId.toString()).set(data); } catch(e) { console.error(e); }
        }

        async function dbDelete(collection, docId) {
            if(!currentUser) return;
            try { await db.collection(`artifacts/${appId}/public/data/${collection}`).doc(docId.toString()).delete(); } catch(e) { console.error(e); }
        }

        const generateId = (array) => array.length > 0 ? Math.max(...array.map(i => i.id)) + 1 : 1;
        const formatDate = (dateStr) => {
            if(!dateStr) return '-';
            const [y, m, d] = dateStr.split('-');
            return `${d}/${m}/${y}`;
        };
        const getEmpName = (id) => { const e = state.employees.find(e => e.id == id); return e ? e.name : 'Desconhecido'; };
        const getTrainingName = (id) => { const t = state.trainings.find(t => t.id == id); return t ? t.title : 'Desconhecido'; };

        // --- 2. UI HELPERS & NAVIGATION ---
        let currentPage = '';

        function toggleMobileMenu() { document.getElementById('mobile-menu').classList.toggle('hidden'); }

        function navigate(page) {
            currentPage = page;
            document.querySelectorAll('.menu-item').forEach(el => {
                el.classList.remove('border-amber-600', 'text-amber-700', 'bg-amber-50');
                if (el.classList.contains('block')) el.classList.add('border-transparent', 'text-gray-600');
                else el.classList.add('border-transparent', 'text-gray-500');
            });
            document.querySelectorAll(`.nav-${page}`).forEach(el => {
                el.classList.remove('border-transparent', 'text-gray-500', 'text-gray-600');
                el.classList.add('border-amber-600', 'text-amber-700');
                if (el.classList.contains('block')) el.classList.add('bg-amber-50');
            });
            const mobileMenu = document.getElementById('mobile-menu');
            if(mobileMenu && !mobileMenu.classList.contains('hidden')) mobileMenu.classList.add('hidden');

            const contentDiv = document.getElementById('app-content');
            const titleEl = document.getElementById('page-title');
            
            switch(page) {
                case 'dashboard': titleEl.innerText = 'Dashboard Operacional'; renderDashboard(contentDiv); break;
                case 'presenca': titleEl.innerText = 'Listas de Presença'; renderPresenca(contentDiv); break;
                case 'eficacia': titleEl.innerText = 'Avaliação da Eficácia'; renderEficacia(contentDiv); break;
                case 'desempenho': titleEl.innerText = 'Avaliação de Desempenho'; renderDesempenho(contentDiv); break;
            }
            if(window.lucide) window.lucide.createIcons();
        }

        function showDevInfo() { 
            Swal.fire({ title: 'Módulo de Operação', text: 'Conectado ao Firebase. Leitura e Escrita Sincronizadas.', icon: 'info' }); 
        }

        async function requirePasswordForAction(actionCallback) {
            const user = firebase.auth().currentUser;
            if (!user || user.isAnonymous) {
                Swal.fire({
                    title: 'Autenticação (Teste)', text: 'Digite a senha mestre "admin" para excluir:', input: 'password', showCancelButton: true, confirmButtonText: 'Excluir', confirmButtonColor: '#d33'
                }).then((result) => {
                    if (result.value === 'admin') actionCallback(); else if (result.isConfirmed) Swal.fire('Erro', 'Senha incorreta.', 'error');
                });
                return;
            }
            const { value: password } = await Swal.fire({ title: 'Segurança', text: 'Confirme sua senha:', input: 'password', showCancelButton: true, confirmButtonColor: '#d33', confirmButtonText: 'Confirmar' });
            if (password) {
                try { Swal.showLoading(); await firebase.auth().signInWithEmailAndPassword(user.email, password); actionCallback(); } 
                catch (error) { Swal.fire('Acesso Negado', 'Senha incorreta.', 'error'); }
            }
        }

        function openModal(title, bodyHtml, footerHtml) {
            document.getElementById('modal-title').innerText = title; document.getElementById('modal-body').innerHTML = bodyHtml; document.getElementById('modal-footer').innerHTML = footerHtml;
            const modal = document.getElementById('modal-container'); const wrapper = document.getElementById('modal-content-wrapper');
            modal.classList.remove('hidden'); setTimeout(() => { wrapper.classList.remove('scale-95'); wrapper.classList.add('scale-100'); }, 10);
            document.body.classList.add('modal-open'); if(window.lucide) window.lucide.createIcons();
        }

        function closeModal() {
            const modal = document.getElementById('modal-container'); const wrapper = document.getElementById('modal-content-wrapper');
            wrapper.classList.remove('scale-100'); wrapper.classList.add('scale-95');
            setTimeout(() => { modal.classList.add('hidden'); document.body.classList.remove('modal-open'); }, 200);
        }

        // ================= 3. RENDER FUNCTIONS (DASHBOARD) =================
        function renderDashboard(container) {
            const ativos = state.employees.filter(e => e.status === 'Ativo').length;
            
            let pendentesEficacia = 0;
            state.attendanceLists.forEach(list => {
                list.attendees.forEach(empId => {
                    const evalRecord = state.effectivenessEvaluations.find(e => e.recordId === list.id && e.empId === empId);
                    if(!evalRecord || evalRecord.status === 'Pendente') pendentesEficacia++;
                });
            });

            let skillGaps = 0;
            state.employeeSkills.forEach(es => { if(es.actual < es.req) skillGaps++; });

            let pendenciasDetalhadas = [];
            
            state.employees.filter(e => e.status === 'Ativo').forEach(emp => {
                
                // 1. CHECAGEM DE TREINAMENTOS (Matriz)
                const role = state.roles.find(r => r.name === emp.role);
                if(role && role.trainingIds && role.trainingIds.length > 0) {
                    role.trainingIds.forEach(tId => {
                        const training = state.trainings.find(t => t.id === tId);
                        if(!training) return;
                        const participacoes = state.attendanceLists
                            .filter(list => list.trainingId === tId && list.attendees.includes(emp.id))
                            .sort((a, b) => new Date(b.date) - new Date(a.date));

                        let isPendente = false, motivo = '', color = '';
                        if(participacoes.length === 0) {
                            isPendente = true; motivo = 'Não realizado'; color = 'bg-red-100 text-red-800';
                        } else {
                            if(training.periodicityMonths > 0) {
                                const [y, m, d] = participacoes[0].date.split('-');
                                const val = new Date(y, m - 1, d); val.setMonth(val.getMonth() + training.periodicityMonths);
                                const hoje = new Date(); hoje.setHours(0,0,0,0);
                                if(hoje > val) { isPendente = true; motivo = 'Vencido'; color = 'bg-orange-100 text-orange-800'; }
                            }
                        }
                        if(isPendente) pendenciasDetalhadas.push({ empName: emp.name, itemName: training.title, motivo, color, empId: emp.id, trainingId: training.id, type: 'treinamento' });
                    });
                }

                // 2. CHECAGEM DE AVALIAÇÃO DE DESEMPENHO (Com Regra de 30 dias e Período de Experiência)
                const empReviews = state.performanceReviews.filter(r => r.empId === emp.id).sort((a, b) => new Date(b.date) - new Date(a.date));
                const today = new Date(); today.setHours(0,0,0,0);
                const thirtyDaysFromNow = new Date(today); thirtyDaysFromNow.setDate(thirtyDaysFromNow.getDate() + 30);
                
                let manualDate = emp.nextReviewDate ? new Date(emp.nextReviewDate + 'T00:00:00') : null;
                let lastReviewDate = empReviews.length > 0 ? new Date(empReviews[0].date + 'T00:00:00') : null;
                
                let isPendente = false;
                let motivo = '';
                let color = '';

                if (empReviews.length === 0) {
                    if (manualDate) {
                        // Novo Colaborador com data de experiência definida
                        if (manualDate < today) {
                            isPendente = true; motivo = 'Experiência Vencida'; color = 'bg-red-100 text-red-800';
                        } else if (manualDate <= thirtyDaysFromNow) {
                            const diff = Math.ceil((manualDate - today) / (1000 * 60 * 60 * 24));
                            isPendente = true; motivo = `Exp. em ${diff} dias`; color = 'bg-amber-100 text-amber-800';
                        }
                    } else {
                        // Sem data e nunca avaliado
                        isPendente = true; motivo = 'Não realizada'; color = 'bg-red-100 text-red-800';
                    }
                } else {
                    // Já avaliado: Define se usa a data automática (1 ano) ou a data manual se o RH tiver definido uma nova meta.
                    let targetDate = new Date(lastReviewDate);
                    targetDate.setFullYear(targetDate.getFullYear() + 1); // Regra anual automática
                    let isManual = false;

                    if (manualDate && manualDate > lastReviewDate) {
                        targetDate = manualDate;
                        isManual = true;
                    }

                    if (targetDate < today) {
                        isPendente = true; 
                        motivo = isManual ? 'Avaliação Vencida' : 'Vencida (> 1 ano)'; 
                        color = 'bg-red-100 text-red-800';
                    } else if (targetDate <= thirtyDaysFromNow) {
                        const diff = Math.ceil((targetDate - today) / (1000 * 60 * 60 * 24));
                        isPendente = true; 
                        motivo = `Vence em ${diff} dias`; 
                        color = 'bg-amber-100 text-amber-800';
                    }
                }

                if (isPendente) {
                    pendenciasDetalhadas.push({ 
                        empName: emp.name, itemName: 'Avaliação de Desempenho', 
                        motivo: motivo, color: color, 
                        empId: emp.id, type: 'desempenho' 
                    });
                }

                // 3. CHECAGEM DE DOCUMENTOS (Regra: Apenas vencidos ou a vencer em <= 30 dias)
                let atts = [];
                if (emp.attachments) atts = emp.attachments;
                else if (emp.attachment && emp.attachment.expirationDate) atts = [{docName: 'Documento Principal', expirationDate: emp.attachment.expirationDate, ...emp.attachment}];

                atts.forEach(att => {
                    if (att.expirationDate) {
                        const valDate = new Date(att.expirationDate + 'T00:00:00');
                        
                        // Aparece apenas se vencido (menor que hoje) OU se vencer nos próximos 30 dias
                        if (valDate < today) {
                            pendenciasDetalhadas.push({ 
                                empName: emp.name, itemName: `Doc: ${att.docName || 'Anexo'}`, 
                                motivo: 'Documento Vencido', color: 'bg-red-100 text-red-800', 
                                empId: emp.id, type: 'documento' 
                            });
                        } else if (valDate <= thirtyDaysFromNow) {
                            const diffTime = Math.abs(valDate - today);
                            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                            pendenciasDetalhadas.push({ 
                                empName: emp.name, itemName: `Doc: ${att.docName || 'Anexo'}`, 
                                motivo: `Vence em ${diffDays} dias`, color: 'bg-amber-100 text-amber-800', 
                                empId: emp.id, type: 'documento' 
                            });
                        }
                    }
                });
            });

            container.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                    <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100 border-l-4 border-l-blue-500">
                        <div class="flex items-center justify-between"><div><p class="text-sm font-medium text-gray-500">Colaboradores Ativos</p><h3 class="text-2xl font-bold text-gray-800 mt-1">${ativos}</h3></div><div class="p-3 bg-blue-50 rounded-full text-blue-600"><i data-lucide="users"></i></div></div>
                    </div>
                    <div onclick="navigate('eficacia')" class="bg-white rounded-xl shadow-sm p-6 border border-gray-100 border-l-4 border-l-amber-500 cursor-pointer hover:-translate-y-1 transition-all">
                        <div class="flex items-center justify-between"><div><p class="text-sm font-medium text-gray-500">Eficácia Pendente</p><h3 class="text-2xl font-bold text-gray-800 mt-1">${pendentesEficacia}</h3></div><div class="p-3 bg-amber-50 rounded-full text-amber-600"><i data-lucide="target"></i></div></div>
                    </div>
                    <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100 border-l-4 border-l-red-500">
                        <div class="flex items-center justify-between"><div><p class="text-sm font-medium text-gray-500">Gaps na Matriz</p><h3 class="text-2xl font-bold text-gray-800 mt-1">${skillGaps}</h3></div><div class="p-3 bg-red-50 rounded-full text-red-600"><i data-lucide="alert-triangle"></i></div></div>
                    </div>
                    <div onclick="document.getElementById('pendencias-section').scrollIntoView({behavior: 'smooth'})" class="bg-white rounded-xl shadow-sm p-6 border border-gray-100 border-l-4 border-l-purple-500 cursor-pointer hover:-translate-y-1 transition-all">
                        <div class="flex items-center justify-between"><div><p class="text-sm font-medium text-gray-500">Total Alertas</p><h3 class="text-2xl font-bold text-gray-800 mt-1">${pendenciasDetalhadas.length}</h3></div><div class="p-3 bg-purple-50 rounded-full text-purple-600"><i data-lucide="bell"></i></div></div>
                    </div>
                </div>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
                        <h4 class="text-lg font-semibold text-gray-800 mb-4 flex items-center"><i data-lucide="history" class="w-5 h-5 mr-2 text-blue-500"></i> Últimas Atividades</h4>
                        <div class="space-y-4">
                            ${state.attendanceLists.slice(-4).reverse().map(list => `

        // ================= FUNÇÕES DE IMPRESSÃO PROFISSIONAL (ISO 9001) =================

                .part-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; border: 2px solid #000; }

        async function printPendingList() {
            let pendencias = [];
            state.employees.filter(e => e.status === 'Ativo').forEach(emp => {
                const role = state.roles.find(r => r.name === emp.role);
                if(role && role.trainingIds) {
                    role.trainingIds.forEach(tId => {
                        const tr = state.trainings.find(t => t.id === tId);
                        if(!tr) return;
                        const parts = state.attendanceLists.filter(l => l.trainingId === tId && l.attendees.includes(emp.id)).sort((a, b) => new Date(b.date) - new Date(a.date));
                        let pend = false;
                        if(parts.length === 0) pend = true;
                        else if(tr.periodicityMonths > 0) {
                            const [y,m,d] = parts[0].date.split('-'); const val = new Date(y, m-1, d); val.setMonth(val.getMonth() + tr.periodicityMonths);
                            if(new Date() > val) pend = true;
                        }
                        if(pend) pendencias.push({ emp, tr });
                    });
                }
            });
            
            if(pendencias.length === 0) { Swal.fire('Sem Pendências', 'Não há pendências de treinamentos da matriz para imprimir.', 'info'); return; }
            
            const { value: formValues } = await Swal.fire({
                title: 'Gerar Plano de Treinamento',
                html: `
                    <div class="flex flex-col gap-3 text-left">
                        <div><label class="text-xs font-semibold text-gray-600">Instrutor(a) Previsto</label><input id="swal-inst" class="w-full border p-2 rounded"></div>
                        <div><label class="text-xs font-semibold text-gray-600">Data Prevista</label><input id="swal-date" type="date" class="w-full border p-2 rounded"></div>
                        <div><label class="text-xs font-semibold text-gray-600">Carga Horária</label><input id="swal-ch" class="w-full border p-2 rounded"></div>
                        <div><label class="text-xs font-semibold text-gray-600">Local</label><input id="swal-local" class="w-full border p-2 rounded"></div>
                    </div>
                `,
                focusConfirm: false, showCancelButton: true, confirmButtonText: 'Imprimir', cancelButtonText: 'Cancelar',
                preConfirm: () => ({ inst: document.getElementById('swal-inst').value, date: document.getElementById('swal-date').value, ch: document.getElementById('swal-ch').value, local: document.getElementById('swal-local').value })
            });

            if (!formValues) return;

            let porTr = {};
            pendencias.forEach(p => { if(!porTr[p.tr.id]) porTr[p.tr.id] = { t: p.tr, emps: [] }; porTr[p.tr.id].emps.push(p.emp); });
            
            let w = window.open('','_blank');
            if(!w) { Swal.fire('Aviso','Bloqueador de pop-ups ativo.','warning'); return; }
            
            let h = `<html><head><title>Pendências de Treinamento</title>${getPrintStyles()}</head><body>`;
            let pages = Object.values(porTr);
            
            pages.forEach((i, index) => {
                h += `
                <div class="doc-header">
                    <div class="logo">LOGOTIPO</div><div class="title-box"><h1>Lista de Presença / Plano</h1></div>
                    <div class="info-box"><div>DOC: SGQ-FOR-001</div><div>DATA: ${formValues.date ? formatDate(formValues.date) : '___/___/____'}</div></div>
                </div>
                <table class="info-table">
                    <tr><th>Treinamento:</th><td colspan="3">${i.t.title}</td></tr>
                    <tr><th>Instrutor(a):</th><td>${formValues.inst}</td><th>Data Prevista:</th><td>${formValues.date ? formatDate(formValues.date) : '___/___/____'}</td></tr>
                    <tr><th>Carga Horária:</th><td>${formValues.ch}</td><th>Local:</th><td>${formValues.local}</td></tr>
                </table>
                <table class="part-table">
                    <thead><tr><th style="width: 5%;">Nº</th><th>Colaborador(a)</th><th>Cargo / Departamento</th><th>Assinatura</th></tr></thead>
                    <tbody>`;
                
                i.emps.forEach((e, idx) => { h += `<tr><td style="text-align: center;">${idx + 1}</td><td>${e.name}</td><td>${e.role} ${e.dept ? '/ ' + e.dept : ''}</td><td class="signature"></td></tr>`; });
                for(let j=0; j<3; j++) h += `<tr><td></td><td></td><td></td><td class="signature"></td></tr>`;
                
                h += `</tbody></table>
                <div class="footer-signatures">
                    <div class="sign-box"><div class="sign-line">Instrutor Responsável</div></div>
                    <div class="sign-box"><div class="sign-line">Visto da Liderança</div></div>
                </div>`;
                
                if (index < pages.length - 1) h += `<div class="page-break"></div>`;
            });
            
            h += `<script>setTimeout(()=>window.print(),500);<\/script></body></html>`;
            w.document.write(h); w.document.close();
        }

        async function printSinglePendingItem(empId, tId) {
            const emp = state.employees.find(e => e.id === empId); const t = state.trainings.find(x => x.id === tId);
            if(!emp || !t) return;
            
            let allPending = [];
            state.employees.filter(e => e.status === 'Ativo').forEach(e => {
                const role = state.roles.find(r => r.name === e.role);
                if(role && role.trainingIds && role.trainingIds.includes(tId)) {
                    const parts = state.attendanceLists.filter(l => l.trainingId === tId && l.attendees.includes(e.id)).sort((a, b) => new Date(b.date) - new Date(a.date));
                    let pend = false;
                    if(parts.length === 0) pend = true;
                    else if(t.periodicityMonths > 0) {
                        const [y,m,d] = parts[0].date.split('-'); const val = new Date(y, m-1, d); val.setMonth(val.getMonth() + t.periodicityMonths);
                        if(new Date() > val) pend = true;
                    }
                    if(pend) allPending.push(e);
                }
            });

            const otherPending = allPending.filter(e => e.id !== empId);
            let othersHtml = '';
            if (otherPending.length > 0) {
                othersHtml = `
                    <div class="mt-4 border-t border-gray-200 pt-3">

                                    <input type="checkbox" class="mr-2 swal-other-emp" value="${e.id}" checked>
                                    <span class="font-medium">${e.name}</span> <span class="text-[10px] text-gray-400 ml-1">(${e.role})</span>

            }

            const { value: formValues } = await Swal.fire({
                title: 'Preencher Cabeçalho',
                html: `
                    <div class="flex flex-col gap-3 text-left">
                        <div><label class="text-xs font-semibold">Instrutor(a)</label><input id="swal-inst" class="w-full border p-2 rounded"></div>
                        <div><label class="text-xs font-semibold">Data</label><input id="swal-date" type="date" class="w-full border p-2 rounded"></div>

                    </div>
                    ${othersHtml}
                `,
                focusConfirm: false, showCancelButton: true, confirmButtonText: 'Imprimir', cancelButtonText: 'Cancelar',
                didOpen: () => { if(window.lucide) window.lucide.createIcons(); },
                preConfirm: () => {
                    const selectedOthers = Array.from(document.querySelectorAll('.swal-other-emp:checked')).map(cb => parseInt(cb.value));
                    return {
                        inst: document.getElementById('swal-inst').value, date: document.getElementById('swal-date').value, ch: document.getElementById('swal-ch').value, local: document.getElementById('swal-local').value,
                        includedEmps: [empId, ...selectedOthers]
                    };
                }
            });

            if (!formValues) return;
            const empsToPrint = formValues.includedEmps.map(id => state.employees.find(e => e.id === id)).filter(e => e);
            let w = window.open('','_blank');
            if(!w) return Swal.fire('Aviso','Bloqueador de pop-ups ativo.','warning');

            let h = `<html><head><title>Lista de Presença</title>${getPrintStyles()}</head><body>
            <div class="doc-header">
                <div class="logo">LOGOTIPO</div><div class="title-box"><h1>Lista de Presença</h1></div>
                <div class="info-box"><div>DOC: SGQ-FOR-001</div><div>DATA: ${formValues.date ? formatDate(formValues.date) : '___/___/____'}</div></div>
            </div>
            <table class="info-table">
                <tr><th>Treinamento:</th><td colspan="3">${t.title}</td></tr>
                <tr><th>Instrutor(a):</th><td>${formValues.inst}</td><th>Data:</th><td>${formValues.date ? formatDate(formValues.date) : '___/___/____'}</td></tr>
                <tr><th>Carga Horária:</th><td>${formValues.ch}</td><th>Local:</th><td>${formValues.local}</td></tr>
            </table>
            <table class="part-table">
                <thead><tr><th style="width: 5%;">Nº</th><th>Colaborador(a)</th><th>Cargo</th><th>Assinatura</th></tr></thead>
                <tbody>`;
            
            empsToPrint.forEach((e, idx) => { h += `<tr><td style="text-align: center;">${idx + 1}</td><td>${e.name}</td><td>${e.role}</td><td class="signature"></td></tr>`; });
            for(let j=0; j<4; j++) h += `<tr><td></td><td></td><td></td><td class="signature"></td></tr>`;
            
            h += `</tbody></table>
            <div class="footer-signatures"><div class="sign-box"><div class="sign-line">Instrutor Responsável</div></div><div class="sign-box"><div class="sign-line">Aprovação</div></div></div>
            <script>setTimeout(()=>window.print(),500);<\/script></body></html>`;
            w.document.write(h); w.document.close();
        }

            const reqRoles = state.roles.filter(r=>r.trainingIds&&r.trainingIds.includes(tId)).map(r=>r.name);
            const tr = state.trainings.find(t=>t.id===tId);
            
            currentAttEmps = state.employees.filter(e => e.status==='Ativo' && reqRoles.includes(e.role) && (!state.attendanceLists.some(l=>l.trainingId===tId&&l.attendees.includes(e.id)) || (tr.periodicityMonths>0 && new Date() > new Date(new Date(state.attendanceLists.filter(l=>l.trainingId===tId&&l.attendees.includes(e.id)).sort((a,b)=>new Date(b.date)-new Date(a.date))[0].date).setMonth(new Date(state.attendanceLists.filter(l=>l.trainingId===tId&&l.attendees.includes(e.id)).sort((a,b)=>new Date(b.date)-new Date(a.date))[0].date).getMonth()+tr.periodicityMonths)))));
            renderAttendanceEmpList();
        }

        function renderAttendanceEmpList(uncheckedIds = []) {
            document.getElementById('attEmpContainer').innerHTML = currentAttEmps.map(e=>{
                const isChecked = !uncheckedIds.includes(e.id);
                return `<label class="flex items-center text-sm p-1.5 hover:bg-white rounded border border-transparent cursor-pointer"><input type="checkbox" name="attEmp" value="${e.id}" class="mr-3" ${isChecked?'checked':''}> <span class="font-medium">${e.name}</span> <span class="text-[10px] ml-2 text-gray-500">(${e.role})</span></label>`;
            }).join('') || '<p class="text-xs text-center text-gray-500 py-4">Nenhum funcionário pendente neste treinamento na matriz.</p>';
            
            const extraSelect = document.getElementById('attExtraSelect');
            const avail = state.employees.filter(e => e.status === 'Ativo' && !currentAttEmps.find(ce => ce.id === e.id));
            extraSelect.innerHTML = `<option value="">Adicionar outro colaborador...</option>` + avail.map(e => `<option value="${e.id}">${e.name} (${e.role})</option>`).join('');
        }

        function addExtraAttendanceEmp() {
            const sel = document.getElementById('attExtraSelect'); const empId = parseInt(sel.value); if(!empId) return;
            const unchecked = Array.from(document.querySelectorAll('input[name="attEmp"]:not(:checked)')).map(cb=>parseInt(cb.value));
            const emp = state.employees.find(e=>e.id===empId);
            if(emp && !currentAttEmps.find(e=>e.id===emp.id)) { currentAttEmps.unshift(emp); renderAttendanceEmpList(unchecked); }
        }

        function saveAttendance() {
            const trId = parseInt(document.getElementById('attTr').value); const date = document.getElementById('attDate').value; const attendees = Array.from(document.querySelectorAll('input[name="attEmp"]:checked')).map(c=>parseInt(c.value)); const fileInput = document.getElementById('attFile');
            if(!date || attendees.length===0) return Swal.fire('Erro','Data e pelo menos 1 participante são obrigatórios.','error');
            
            const performSave = (fileObj) => {
                const id = editAttId || generateId(state.attendanceLists);
                const obj = {id, trainingId:trId, date, instructor:document.getElementById('attInst').value, workload:document.getElementById('attWorkload').value, local:document.getElementById('attLocal').value, attendees, attachment: fileObj || (editAttId && state.attendanceLists.find(x=>x.id===editAttId).attachment ? state.attendanceLists.find(x=>x.id===editAttId).attachment : null) };
                
                dbSave('attendanceLists', id, obj);
                
                if (editAttId) { const oldAtt = state.attendanceLists.find(x=>x.id===editAttId); if(oldAtt) { const removed = oldAtt.attendees.filter(a=>!attendees.includes(a)); removed.forEach(empId=>dbDelete('effectivenessEvaluations', `${id}_${empId}`)); } }
                attendees.forEach(empId => { if(!state.effectivenessEvaluations.some(e=>e.recordId===id&&e.empId===empId)) dbSave('effectivenessEvaluations', `${id}_${empId}`, {recordId:id, empId:empId, status:'Pendente', comments:''}); });
                
                closeModal(); renderPresenca(document.getElementById('app-content')); Swal.fire('Sucesso','Turma e presenças registradas!','success');
            };

            if(fileInput.files.length > 0) {
                const file = fileInput.files[0];
                
                if (file.type.startsWith('image/')) {
                    Swal.fire({title:'Otimizando...', allowOutsideClick:false, didOpen:()=>Swal.showLoading()});
                    const reader = new FileReader(); reader.readAsDataURL(file);
                    reader.onload = (e) => {
                        const img = new Image(); img.src = e.target.result;
                        img.onload = () => {
                            const canvas = document.createElement('canvas'); let w=img.width, h=img.height;
                            if(w>1200){h=Math.round(h*1200/w);w=1200;} if(h>1200){w=Math.round(w*1200/h);h=1200;}
                            canvas.width=w; canvas.height=h; canvas.getContext('2d').drawImage(img,0,0,w,h);
                            let dataUrl = canvas.toDataURL('image/jpeg', 0.8);
                            if(dataUrl.length <= 950*1024) performSave({name:file.name, data:dataUrl}); else uploadToStorage(file, performSave);
                        };
                    };
                } else {
                    if (file.size <= 750*1024) { Swal.fire({title:'Processando...', allowOutsideClick:false, didOpen:()=>Swal.showLoading()}); const r = new FileReader(); r.onload=(e)=>performSave({name:file.name, data:e.target.result}); r.readAsDataURL(file); } 
                    else uploadToStorage(file, performSave);
                }
            } else performSave(null);
        }

        function uploadToStorage(rawFile, performSave) {
            if (rawFile.size > 5*1024*1024) return Swal.fire('Erro', 'Tamanho máximo de 5MB excedido.', 'error');
            Swal.fire({title:'A enviar para a Nuvem...', allowOutsideClick:false, didOpen:()=>Swal.showLoading()});
            
            let timeoutFired = false;
            const fallbackTimer = setTimeout(() => { timeoutFired = true; Swal.fire('Bloqueio Firebase', 'O arquivo é muito grande e a nuvem bloqueou.', 'error'); }, 15000);
            
            const storageRef = storage.ref(`evidencias/${Date.now()}_${rawFile.name}`);
            const uploadTask = storageRef.put(rawFile);
            uploadTask.on('state_changed', 
                (s) => { if(s.bytesTransferred > 0) clearTimeout(fallbackTimer); if(timeoutFired) uploadTask.cancel(); }, 
                (e) => { clearTimeout(fallbackTimer); Swal.fire('Erro Nuvem', 'Falha no Storage.', 'error'); }, 
                () => { clearTimeout(fallbackTimer); if(timeoutFired) return; uploadTask.snapshot.ref.getDownloadURL().then(url => performSave({name:rawFile.name, url:url})); }
            );
        }

        function confirmDeleteAttendance(id) { requirePasswordForAction(()=>{ dbDelete('attendanceLists', id); state.effectivenessEvaluations.filter(e=>e.recordId===id).forEach(e=>dbDelete('effectivenessEvaluations',`${id}_${e.empId}`)); renderPresenca(document.getElementById('app-content')); Swal.fire('Deletado','A lista foi removida.','success'); }); }
        
        function viewAttachment(id) { const l = state.attendanceLists.find(x=>x.id===id); if(l&&l.attachment) { if(l.attachment.url) window.open(l.attachment.url); else { const a=document.createElement('a'); a.href=l.attachment.data; a.download=l.attachment.name; a.click(); } } }

        // ================= 3. EFICÁCIA =================
        function renderEficacia(container) {
            let html = `
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
                    <h3 class="text-lg font-semibold mb-4 text-gray-800">Avaliações de Eficácia de Treinamento (Req. 7.2)</h3>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-sm border-collapse">
                            <thead><tr class="bg-gray-50 border-b text-xs uppercase"><th class="p-4">Treinamento / Turma</th><th class="p-4">Colaborador Avaliado</th><th class="p-4 text-center">Status</th></tr></thead>
                            <tbody class="divide-y divide-gray-100">`;
            
            let hasEvals = false;
            state.attendanceLists.slice().reverse().forEach(l => {
                l.attendees.forEach(eId => {
                    hasEvals = true;
                    const ev = state.effectivenessEvaluations.find(e=>e.recordId===l.id&&e.empId===eId)||{status:'Pendente'}; 
                    html += `<tr class="hover:bg-gray-50 transition">
                        <td class="p-4"><strong>${getTrainingName(l.trainingId)}</strong><br><span class="text-[10px] text-gray-500">Realizado em: ${formatDate(l.date)}</span></td>
                        <td class="p-4 font-medium">${getEmpName(eId)}</td>
                        <td class="p-4 text-center"><button onclick="openEficaciaModal(${l.id}, ${eId})" class="text-xs px-3 py-1.5 rounded-full font-bold shadow-sm ${ev.status==='Eficaz'?'bg-green-100 text-green-700 hover:bg-green-200':ev.status==='Ineficaz'?'bg-red-100 text-red-700 hover:bg-red-200':'bg-amber-100 text-amber-700 hover:bg-amber-200'}">${ev.status} <i data-lucide="edit-2" class="w-3 h-3 inline ml-1"></i></button></td>
                    </tr>`; 
                });
            });
            if(!hasEvals) html += `<tr><td colspan="3" class="p-6 text-center text-gray-500">Nenhuma turma registrada para avaliar eficácia.</td></tr>`;
            container.innerHTML = html + `</tbody></table></div></div>`;
            if(window.lucide) window.lucide.createIcons();
        }

        function openEficaciaModal(rid, eid) {
            const ev = state.effectivenessEvaluations.find(e=>e.recordId===rid&&e.empId===eid)||{status:'Pendente', comments:''};
            openModal('Julgar Eficácia do Treinamento', `
                <div class="text-left space-y-4">
                    <div class="bg-blue-50 p-3 rounded text-sm text-blue-800">Com base na observação prática, o colaborador absorveu o conhecimento e está apto?</div>
                    <div><label class="block text-sm font-bold mb-1">Status da Avaliação</label><select id="efSt" class="w-full border p-2 rounded outline-none focus:ring-2 focus:ring-amber-500"><option value="Eficaz" ${ev.status==='Eficaz'?'selected':''}>Eficaz (Aprovado)</option><option value="Ineficaz" ${ev.status==='Ineficaz'?'selected':''}>Não Eficaz (Requer Retreinamento)</option></select></div>
                    <div><label class="block text-sm font-bold mb-1">Justificativa / Comentário (Obrigatório se Ineficaz)</label><textarea id="efComm" class="w-full border p-2 rounded outline-none focus:ring-2 focus:ring-amber-500" rows="3">${ev.comments}</textarea></div>
                </div>
            `, `<button onclick="saveEficacia(${rid}, ${eid})" class="bg-amber-600 text-white px-5 py-2 rounded-lg font-medium shadow-sm hover:bg-amber-700">Salvar Avaliação</button>`);
        }
        function saveEficacia(rid, eid) { dbSave('effectivenessEvaluations',`${rid}_${eid}`, {recordId:rid, empId:eid, status:document.getElementById('efSt').value, date:new Date().toISOString(), comments:document.getElementById('efComm').value}); closeModal(); renderEficacia(document.getElementById('app-content')); }

        // ================= 4. DESEMPENHO E MATRIZ =================
        function renderDesempenho(container) {
            container.innerHTML = `
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-lg font-semibold text-gray-800">Avaliações de Desempenho e Competências</h3>
                        <button onclick="openPerformanceModal()" class="bg-amber-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-amber-700 transition"><i data-lucide="plus" class="w-4 h-4 inline mr-1"></i> Nova Avaliação</button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-sm border-collapse">
                            <thead><tr class="bg-gray-50 border-b text-xs uppercase"><th class="p-4">Data</th><th class="p-4">Colaborador</th><th class="p-4 text-center">Nota Global</th><th class="p-4 text-center">Ações</th></tr></thead>
                            <tbody class="divide-y divide-gray-100">
                            ${state.performanceReviews.slice().reverse().map(r => `
                                <tr class="hover:bg-gray-50 transition">
                                    <td class="p-4 text-gray-600">${formatDate(r.date)}</td>
                                    <td class="p-4 font-bold text-gray-800">${getEmpName(r.empId)}</td>
                                    <td class="p-4 text-center"><div class="flex flex-col items-center"><span class="${!r.minScore ? 'bg-blue-600' : (r.score >= r.minScore ? 'bg-green-600' : 'bg-red-600')} text-white px-3 py-1 rounded-full text-xs font-bold shadow-sm">${r.score}</span>${r.minScore?`<span class="text-[9px] text-gray-400 mt-1">Mín: ${r.minScore}</span>`:''}</div></td>
                                    <td class="p-4 text-center whitespace-nowrap">
                                        <button onclick="viewPerformanceHistory(${r.empId})" class="text-emerald-500 hover:text-emerald-700 mx-1" title="Comparativo Ano a Ano"><i data-lucide="bar-chart-2" class="w-4 h-4"></i></button>
                                        <button onclick="printPerformanceReview(${r.id})" class="text-blue-500 hover:text-blue-700 mx-1" title="Imprimir/PDF"><i data-lucide="printer" class="w-4 h-4"></i></button>
                                        <button onclick="confirmDeletePerformance(${r.id})" class="text-red-500 hover:text-red-700 mx-1" title="Excluir"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                    </td>
                                </tr>`).join('') || '<tr><td colspan="4" class="p-8 text-center text-gray-500">Nenhuma avaliação realizada.</td></tr>'}
                            </tbody>
                        </table>
                    </div>
                </div>`;
            if(window.lucide) window.lucide.createIcons();
        }

        function openPerformanceModal() {
            openModal('Registrar Desempenho (Atualiza Matriz)', `
                <div class="space-y-4 text-left">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div class="col-span-2">
                            <label class="block text-sm font-semibold mb-1">Colaborador Avaliado *</label>
                            <select id="pfEmp" class="w-full border p-2 rounded outline-none focus:ring-2 focus:ring-amber-500" onchange="updatePerformanceSkills()">
                                <option value="">-- Selecione o Colaborador --</option>${state.employees.filter(e=>e.status==='Ativo').map(e=>`<option value="${e.id}">${e.name} (${e.role})</option>`).join('')}
                            </select>
                        </div>
                        <div class="col-span-1">
                            <label class="block text-sm font-semibold mb-1">Nota Mín. Aceitável</label>
                            <input type="number" id="pfMinScore" value="3.0" step="0.5" min="1" max="5" class="w-full border p-2 rounded text-center outline-none focus:ring-2 focus:ring-amber-500">
                        </div>
                    </div>
                    
                    <div id="pfSkillsContainer" class="border border-gray-200 rounded-lg p-3 bg-gray-50 max-h-64 overflow-y-auto custom-scrollbar">
                        <p class="text-xs text-center py-4 text-gray-500">Selecione o colaborador acima para carregar as habilidades baseadas na descrição do cargo dele.</p>
                    </div>
                    
                    <div><label class="block text-sm font-semibold mb-1">Feedback / Plano de Ação</label><textarea id="pfFeedback" placeholder="Observações..." class="w-full border p-2 rounded outline-none focus:ring-2 focus:ring-amber-500" rows="3"></textarea></div>
                </div>
            `, `<button onclick="savePerformance()" class="bg-amber-600 text-white px-5 py-2 rounded-lg font-medium shadow-sm hover:bg-amber-700">Salvar & Atualizar Matriz de Habilidades</button>`);
        }

        function updatePerformanceSkills() {
            const eId = parseInt(document.getElementById('pfEmp').value); if(!eId) return;
            const emp = state.employees.find(e=>e.id===eId); const role = state.roles.find(r=>r.name===emp.role);
            if(!role || !role.skillIds || role.skillIds.length===0) { document.getElementById('pfSkillsContainer').innerHTML = '<p class="text-sm text-center py-4 text-amber-600"><i data-lucide="alert-circle" class="w-4 h-4 inline mr-1"></i>O cargo deste funcionário não possui habilidades exigidas na matriz.</p>'; if(window.lucide) window.lucide.createIcons(); return; }
            
            let html = `<p class="text-xs font-bold text-gray-600 mb-3 border-b pb-2 uppercase tracking-wide">Avalie as competências (Cargo: ${role.name}):</p><div class="space-y-2">`;
            role.skillIds.forEach(sId => {
                const s = state.skills.find(x=>x.id===sId);
                if(s) {
                    const es = state.employeeSkills.find(x=>x.empId===eId&&x.skillId===sId)||{req:0, actual:0};
                    html += `<div class="flex items-center justify-between bg-white p-2 border rounded shadow-sm"><div class="flex flex-col w-2/3"><span class="text-sm font-medium truncate">${s.name}</span><span class="text-[10px] text-gray-500">Meta na Matriz: <strong>${es.req>0?es.req:'-'}</strong></span></div><div class="w-1/3 flex justify-end"><input type="number" min="1" max="5" step="0.5" value="${es.actual||''}" placeholder="1 a 5" class="border p-1 rounded w-16 text-center text-sm outline-none focus:ring-2 focus:ring-amber-500 pf-skill" data-id="${s.id}" data-name="${s.name}"></div></div>`;
                }
            });
            document.getElementById('pfSkillsContainer').innerHTML = html + `</div>`;
        }

        function savePerformance() {
            const empId = parseInt(document.getElementById('pfEmp').value); if(!empId) return Swal.fire('Aviso', 'Selecione o colaborador.', 'warning');
            const inputs = document.querySelectorAll('.pf-skill'); let total=0, count=0, skills=[];
            
            inputs.forEach(i => {
                const val = parseFloat(i.value)||0; const sId = parseInt(i.getAttribute('data-id'));
                if(val>0){
                    total+=val; count++; skills.push({skillId:sId, skillName:i.getAttribute('data-name'), score:val});
                    const es = state.employeeSkills.find(x=>x.empId===empId&&x.skillId===sId)||{req:0};
                    dbSave('employeeSkills', `${empId}_${sId}`, {empId, skillId:sId, req:es.req, actual:val});
                }
            });
            
            if(count===0) return Swal.fire('Aviso', 'Dê nota em pelo menos uma habilidade para formar a média.', 'warning');
            const obj = { id:generateId(state.performanceReviews), empId, score:parseFloat((total/count).toFixed(1)), minScore:parseFloat(document.getElementById('pfMinScore').value)||0, skills, date:new Date().toISOString(), feedback:document.getElementById('pfFeedback').value, evaluator: currentUser?(currentUser.email||'Admin'):'Gestor' };
            
            dbSave('performanceReviews', obj.id, obj); closeModal(); renderDesempenho(document.getElementById('app-content'));
            Swal.fire('Sucesso!', 'Avaliação salva e Matriz de Habilidades atualizada.', 'success');
        }

        function confirmDeletePerformance(id) { requirePasswordForAction(()=>{ dbDelete('performanceReviews', id); renderDesempenho(document.getElementById('app-content')); Swal.fire('Deletado', 'A avaliação foi removida.', 'success'); }); }

        function viewPerformanceHistory(empId) {
            const emp = state.employees.find(e => e.id === empId); if(!emp) return;
            const reviews = state.performanceReviews.filter(r => r.empId === empId).sort((a, b) => new Date(b.date) - new Date(a.date));
            if (reviews.length === 0) return Swal.fire('Aviso', 'Sem avaliações anteriores.', 'info');

            let allMap = new Map(); reviews.forEach(r => { if(r.skills) r.skills.forEach(s => allMap.set(s.skillId, s.skillName)); });
            
            let html = `<div class="text-left mb-4"><p class="text-sm">Acompanhamento: <strong>${emp.name}</strong></p></div><div class="overflow-x-auto border rounded-lg custom-scrollbar"><table class="w-full text-left text-sm border-collapse"><thead><tr class="bg-gray-50 border-b text-xs uppercase text-gray-500"><th class="p-3">Competência</th>${reviews.map((r,i) => `<th class="p-3 text-center border-l">${formatDate(r.date)}${i===0?' <br><span class="text-[9px] bg-emerald-100 text-emerald-700 px-1 rounded">Atual</span>':''}</th>`).join('')}</tr></thead><tbody class="divide-y divide-gray-100">`;
            
            if(allMap.size > 0) {
                allMap.forEach((name, sId) => {
                    html += `<tr><td class="p-3 font-medium text-gray-800">${name}</td>`;
                    reviews.forEach(r => { const sk = r.skills?r.skills.find(x=>x.skillId===sId):null; const score = sk&&sk.score>0?sk.score:'-'; html += `<td class="p-3 text-center border-l font-bold ${score!=='-'?'text-blue-600':'text-gray-300'}">${score}</td>`; }); html += `</tr>`;
                });
            }
            
            html += `<tr class="bg-gray-100 border-t-2"><td class="p-3 font-bold text-right text-xs uppercase">Média:</td>${reviews.map(r => `<td class="p-3 text-center border-l font-black text-base ${!r.minScore?'text-blue-700':(r.score>=r.minScore?'text-green-600':'text-red-600')}">${r.score}</td>`).join('')}</tr></tbody></table></div>`;
            Swal.fire({ title: `<h3 class="text-lg font-bold border-b pb-2"><i data-lucide="bar-chart-2" class="w-5 h-5 inline mr-2 text-emerald-600"></i> Comparativo Anual</h3>`, html: html, width: '850px', showCloseButton: true, showConfirmButton: false, didOpen: () => { if(window.lucide) window.lucide.createIcons(); } });
        }

        function printPerformanceReview(id) {
            const rev = state.performanceReviews.find(r => r.id === id); if(!rev) return;
            const emp = state.employees.find(e => e.id === rev.empId); if(!emp) return;

            let w = window.open('','_blank'); if(!w) return Swal.fire('Aviso','Permita os pop-ups para imprimir.','warning');
            let h = `<html><head><title>Avaliação - ${emp.name}</title>${getPrintStyles()}</head><body>
            <div class="doc-header"><div class="logo">LOGOTIPO</div><div class="title-box"><h1>Avaliação de Desempenho</h1></div><div class="info-box"><div>DOC: SGQ-FOR-002</div><div>DATA: ${formatDate(rev.date)}</div></div></div>
            <table class="info-table"><tr><th>Colaborador:</th><td colspan="3">${emp.name}</td></tr><tr><th>Cargo:</th><td>${emp.role}</td><th>Avaliador:</th><td>${rev.evaluator || '-'}</td></tr><tr><th>Mín. Exigido:</th><td colspan="3">${rev.minScore || '-'}</td></tr></table>
            <h3 style="font-size: 12px; font-weight: bold; text-transform: uppercase; border-bottom: 2px solid #000; margin-bottom: 10px; margin-top: 25px;">Competências</h3>
            <table class="part-table"><thead><tr><th style="text-align: left;">Habilidade</th><th style="width: 150px;">Nota</th></tr></thead><tbody>`;
            
            if(rev.skills && rev.skills.length > 0) rev.skills.forEach(sk => { h += `<tr><td style="padding: 8px;">${sk.skillName}</td><td style="text-align: center; font-weight: bold; font-size: 14px;">${sk.score}</td></tr>`; });
            else h += `<tr><td colspan="2" style="text-align: center; padding: 15px;">Avaliação Geral (Sem detalhamento).</td></tr>`;

            h += `<tr style="background-color: #f9f9f9;"><td style="text-align: right; font-weight: bold; padding: 10px;">MÉDIA GERAL:</td><td style="text-align: center; font-weight: bold; font-size: 18px;">${rev.score}</td></tr></tbody></table>`;
            h += `<h3 style="font-size: 12px; font-weight: bold; border-bottom: 2px solid #000; margin-top: 25px;">Observações</h3><div style="border: 1px solid #000; padding: 15px; min-height: 120px;">${rev.feedback ? rev.feedback.replace(/\n/g, '<br>') : '-'}</div>`;
            h += `<div class="footer-signatures" style="margin-top: 80px;"><div class="sign-box"><div class="sign-line">Avaliador / RH</div></div><div class="sign-box"><div class="sign-line">Colaborador Avaliado</div></div></div><script>setTimeout(()=>window.print(),500);<\/script></body></html>`;
            w.document.write(h); w.document.close();
        }

        // INICIALIZAÇÃO
        auth.onAuthStateChanged((user) => { if(user) { currentUser = user; document.getElementById('user-avatar').innerText = user.email ? user.email.charAt(0).toUpperCase() : 'U'; loadDataFromFirestore(); } else auth.signInAnonymously(); });
    </script>
</body>
</html>
