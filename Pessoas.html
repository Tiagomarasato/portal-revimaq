                <a href="javascript:void(0)" onclick="navigate('setores')" class="nav-setores menu-item block pl-4 pr-4 py-3 border-l-4 border-transparent text-base font-medium text-gray-600 hover:bg-gray-50">Setores</a>
                <a href="javascript:void(0)" onclick="navigate('cargos')" class="nav-cargos menu-item block pl-4 pr-4 py-3 border-l-4 border-transparent text-base font-medium text-gray-600 hover:bg-gray-50">Cargos</a>
                <a href="javascript:void(0)" onclick="navigate('colaboradores')" class="nav-colaboradores menu-item block pl-4 pr-4 py-3 border-l-4 border-transparent text-base font-medium text-gray-600 hover:bg-gray-50">Colaboradores</a>
                <a href="javascript:void(0)" onclick="navigate('treinamentos')" class="nav-treinamentos menu-item block pl-4 pr-4 py-3 border-l-4 border-transparent text-base font-medium text-gray-600 hover:bg-gray-50">Treinamentos</a>
                <a href="javascript:void(0)" onclick="navigate('presenca')" class="nav-presenca menu-item block pl-4 pr-4 py-3 border-l-4 border-transparent text-base font-medium text-gray-600 hover:bg-gray-50">Presença</a>
                <a href="javascript:void(0)" onclick="navigate('eficacia')" class="nav-eficacia menu-item block pl-4 pr-4 py-3 border-l-4 border-transparent text-base font-medium text-gray-600 hover:bg-gray-50">Eficácia</a>

    <!-- Main Content -->
    <main class="flex-1 overflow-auto bg-gray-50 p-4 md:p-6" id="main-container">
        <div class="max-w-7xl mx-auto mb-4 flex justify-between items-center no-print">
             <h2 class="text-2xl font-semibold text-gray-800" id="page-title">Dashboard</h2>
        </div>
        
        <div class="max-w-7xl mx-auto" id="app-content">
            <div class="flex h-64 w-full items-center justify-center">

    <!-- Generic Modal Container -->
    <div id="modal-container" class="fixed inset-0 z-50 flex items-center justify-center hidden bg-black bg-opacity-50 backdrop-blur-sm transition-opacity p-4 no-print">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-[750px] max-h-[95vh] flex flex-col transform transition-all scale-95" id="modal-content-wrapper">
            <div class="px-5 py-3 border-b border-gray-200 flex justify-between items-center bg-white rounded-t-xl flex-shrink-0">
                <h3 class="text-xl font-bold text-[#1e293b]" id="modal-title">Título do Modal</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 transition-colors">
                    <i data-lucide="x" class="w-5 h-5" stroke-width="2.5"></i>
                </button>
            </div>
            <div class="p-5 overflow-y-auto overflow-x-hidden custom-scrollbar flex-1 min-h-0" id="modal-body"></div>
            <div class="px-5 py-3 border-t border-gray-100 bg-white rounded-b-xl flex justify-end items-center gap-3 flex-shrink-0" id="modal-footer"></div>
        </div>
    </div>

    <!-- Script Global -->
    <script>
        // ================= CONFIGURAÇÃO DO FIREBASE =================
        const firebaseConfig = {
            apiKey: "AIzaSyBqV0KOQMAYR4z6P_RKnrQPDfkAR2CsXBI",
            authDomain: "gestao-de-pessoas-49200.firebaseapp.com",
            projectId: "gestao-de-pessoas-49200",
            storageBucket: "gestao-de-pessoas-49200.firebasestorage.app",
            messagingSenderId: "615097388185",
            appId: "1:615097388185:web:ef87969b64f4a886f23c08"
        };
        
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        
        const auth = firebase.auth();
        const db = firebase.firestore();
        const storage = firebase.storage();
        db.settings({ experimentalForceLongPolling: true });

        const appId = 'gestao-de-pessoas-49200';
        let currentUser = null;

        // ================= ESTADO GLOBAL =================
        let state = {
            roles: [], 
            setores: [], 
            employees: [], 
            skills: [], 
            employeeSkills: [],
            trainings: [], 
            attendanceLists: [], 
            effectivenessEvaluations: [],
            performanceReviews: [], 
            logs: []
        };
        
        let currentPage = '';
        let currentMatrixRole = '';
        let initialLoadCompleted = false;
        let loadedCollections = new Set();

        // ================= CARREGAMENTO DE DADOS =================
        function loadDataFromFirestore() {
            if (!currentUser) return;
            
            const collections = ['roles', 'setores', 'employees', 'skills', 'employeeSkills', 'trainings', 'attendanceLists', 'effectivenessEvaluations', 'performanceReviews', 'logs'];
            
            const fallbackTimer = setTimeout(() => {
                if(!initialLoadCompleted) {
                    initialLoadCompleted = true;
                    if(!currentPage) currentPage = 'dashboard';
                    navigate(currentPage);
                }
            }, 3000); 

            collections.forEach(col => {
                db.collection(`artifacts/${appId}/public/data/${col}`).onSnapshot((snapshot) => {
                    state[col] = snapshot.docs.map(doc => doc.data());
                    if(col === 'logs') state.logs.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                    if(col === 'attendanceLists') state.attendanceLists.sort((a, b) => new Date(a.date) - new Date(b.date));
                    
                    loadedCollections.add(col);
                    
                    if(loadedCollections.size === collections.length) {
                        clearTimeout(fallbackTimer);
                        if (!initialLoadCompleted) {
                            initialLoadCompleted = true;
                            if(!currentPage) currentPage = 'dashboard';
                            navigate(currentPage);
                        } else {
                            if(currentPage) navigate(currentPage); 
                        }
                    }
                }, (error) => {
                    console.error(`Erro ao ler coleção ${col}:`, error);
                });
            });
        }

        async function dbSave(collection, docId, data) {
            if(!currentUser) return;
            try { await db.collection(`artifacts/${appId}/public/data/${collection}`).doc(docId.toString()).set(data); } 
            catch(e) { console.error(`Erro ao salvar em ${collection}:`, e); }
        }

        async function dbDelete(collection, docId) {
            if(!currentUser) return;
            try { await db.collection(`artifacts/${appId}/public/data/${collection}`).doc(docId.toString()).delete(); } 
            catch(e) { console.error(`Erro ao excluir de ${collection}:`, e); }
        }

        const generateId = (array) => array.length > 0 ? Math.max(...array.map(i => i.id)) + 1 : 1;
        const formatDate = (dateStr) => {
            if(!dateStr) return '-';
            const [y, m, d] = dateStr.split('-');
            return `${d}/${m}/${y}`;
        };
        const getEmpName = (id) => { const e = state.employees.find(e => e.id == id); return e ? e.name : 'Desconhecido'; };
        const getTrainingName = (id) => { const t = state.trainings.find(t => t.id == id); return t ? t.title : 'Desconhecido'; };

        // ================= UTILITÁRIOS & UI =================
        function addLog(moduleName, action, details) {
            const newLog = {
                id: Date.now() + Math.floor(Math.random() * 1000), module: moduleName, action: action,
                details: details, timestamp: new Date().toISOString(), user: currentUser ? (currentUser.email || 'Visitante') : 'Sistema'
            };
            dbSave('logs', newLog.id, newLog);
        }

        function openLogModal(moduleName) {
            const moduleLogs = state.logs.filter(l => l.module === moduleName);
            let bodyHtml = moduleLogs.length === 0 
                ? '<p class="text-gray-500 text-center py-6">Nenhum registo encontrado.</p>' 
                : '<ul class="space-y-4">' + moduleLogs.map(log => `
                    <li class="border-l-4 border-blue-500 bg-gray-50 p-3 rounded-r-lg shadow-sm">
                        <div class="flex justify-between items-start"><p class="text-sm font-semibold text-gray-800">${log.action}</p><span class="text-xs font-medium text-gray-500 ml-2">${new Date(log.timestamp).toLocaleString('pt-PT')}</span></div>
                        <p class="text-sm text-gray-600 mt-1">${log.details}</p>
                        <p class="text-[10px] text-gray-400 mt-2">Utilizador: ${log.user}</p>
                    </li>`).join('') + '</ul>';
            openModal(`Histórico - ${moduleName}`, bodyHtml, `<button onclick="closeModal()" class="px-4 py-2 bg-gray-200 text-gray-800 rounded-lg">Fechar</button>`);
        }

        function toggleMobileMenu() { document.getElementById('mobile-menu').classList.toggle('hidden'); }

        function navigate(page) {
            currentPage = page;
            document.querySelectorAll('.menu-item').forEach(el => {
                el.classList.remove('border-blue-600', 'text-blue-700', 'bg-blue-50');
                if (el.classList.contains('block')) el.classList.add('border-transparent', 'text-gray-600');
                else el.classList.add('border-transparent', 'text-gray-500');
            });
            document.querySelectorAll(`.nav-${page}`).forEach(el => {
                el.classList.remove('border-transparent', 'text-gray-500', 'text-gray-600');
                el.classList.add('border-blue-600', 'text-blue-700');
                if (el.classList.contains('block')) el.classList.add('bg-blue-50');
            });
            
            const mobileMenu = document.getElementById('mobile-menu');
            if(mobileMenu && !mobileMenu.classList.contains('hidden')) mobileMenu.classList.add('hidden');

            const contentDiv = document.getElementById('app-content');
            const titleEl = document.getElementById('page-title');
            
            switch(page) {
                case 'dashboard': titleEl.innerText = 'Dashboard SGQ'; renderDashboard(contentDiv); break;
                case 'setores': titleEl.innerText = 'Gestão de Setores Corporativos'; renderSetores(contentDiv); break;
                case 'cargos': titleEl.innerText = 'Gestão de Cargos e Descrições'; renderCargos(contentDiv); break;
                case 'colaboradores': titleEl.innerText = 'Gestão de Colaboradores'; renderColaboradores(contentDiv); break;
                case 'habilidades': titleEl.innerText = 'Matriz de Habilidades'; renderHabilidades(contentDiv); break;
                case 'treinamentos': titleEl.innerText = 'Catálogo de Treinamentos'; renderTreinamentos(contentDiv); break;
                case 'presenca': titleEl.innerText = 'Listas de Presença'; renderPresenca(contentDiv); break;
                case 'eficacia': titleEl.innerText = 'Avaliação da Eficácia'; renderEficacia(contentDiv); break;
                case 'desempenho': titleEl.innerText = 'Avaliação de Desempenho'; renderDesempenho(contentDiv); break;
            }
            if(window.lucide) window.lucide.createIcons();
        }

        function showDevInfo() { 
            Swal.fire({ 
                title: 'Sistema SGQ', 
                html: `
                    <p class="mb-5 text-gray-600">Conectado ao Firebase V8 Seguro com Multi-Coleções e Long-Polling.</p>
                    <div class="border-t border-gray-200 pt-4 mt-2">
                        <p class="text-xs text-red-600 font-bold mb-2 uppercase tracking-wider">Zona de Perigo (Admin)</p>
                        <button onclick="confirmFactoryReset()" class="bg-red-50 text-red-700 border border-red-200 hover:bg-red-100 hover:border-red-300 px-4 py-2.5 rounded-lg text-sm font-bold transition-colors w-full flex items-center justify-center shadow-sm">
                            <i data-lucide="alert-triangle" class="w-4 h-4 mr-2"></i> Limpar Todo o Banco de Dados
                        </button>
                    </div>
                `, 
                icon: 'info', showConfirmButton: false, showCloseButton: true, didOpen: () => { if(window.lucide) window.lucide.createIcons(); }
            }); 
        }

        function confirmFactoryReset() {
            requirePasswordForAction(async () => {
                Swal.fire({title: 'Limpando...', allowOutsideClick: false, didOpen: () => Swal.showLoading()});
                const collections = ['roles', 'setores', 'employees', 'skills', 'employeeSkills', 'trainings', 'attendanceLists', 'effectivenessEvaluations', 'performanceReviews', 'logs'];
                try {
                    for (const col of collections) {
                        const snapshot = await db.collection(`artifacts/${appId}/public/data/${col}`).get();
                        const batch = db.batch();
                        snapshot.docs.forEach((doc) => batch.delete(doc.ref));
                        await batch.commit();
                    }
                    state = { roles: [], setores: [], employees: [], skills: [], employeeSkills: [], trainings: [], attendanceLists: [], effectivenessEvaluations: [], performanceReviews: [], logs: [] };
                    Swal.fire('Zerado!', 'Banco de dados limpo.', 'success').then(() => navigate('dashboard'));
                } catch (e) { Swal.fire('Erro', 'Falha ao limpar.', 'error'); }
            });
        }

        async function requirePasswordForAction(actionCallback) {
            const user = firebase.auth().currentUser;
            if (!user || user.isAnonymous) {
                Swal.fire({ title: 'Autenticação', text: 'Digite "admin":', input: 'password', showCancelButton: true, confirmButtonText: 'Excluir', confirmButtonColor: '#d33' })
                .then(r => { if (r.value === 'admin') actionCallback(); else if (r.isConfirmed) Swal.fire('Erro', 'Senha incorreta.', 'error'); });
                return;
            }
            const { value: password } = await Swal.fire({ title: 'Autenticação', input: 'password', showCancelButton: true, confirmButtonText: 'Confirmar', confirmButtonColor: '#d33' });
            if (password) {
                try { Swal.showLoading(); await firebase.auth().signInWithEmailAndPassword(user.email, password); actionCallback(); } 
                catch (error) { Swal.fire('Negado', 'Senha incorreta.', 'error'); }
            }
        }

        function openModal(title, bodyHtml, footerHtml) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-body').innerHTML = bodyHtml;
            document.getElementById('modal-footer').innerHTML = footerHtml;
            const modal = document.getElementById('modal-container');
            const wrapper = document.getElementById('modal-content-wrapper');
            modal.classList.remove('hidden');
            setTimeout(() => { wrapper.classList.remove('scale-95'); wrapper.classList.add('scale-100'); }, 10);
            document.body.classList.add('modal-open');
            if(window.lucide) window.lucide.createIcons();
        }

        function closeModal() {
            const modal = document.getElementById('modal-container');
            const wrapper = document.getElementById('modal-content-wrapper');
            wrapper.classList.remove('scale-100'); wrapper.classList.add('scale-95');
            setTimeout(() => { modal.classList.add('hidden'); document.body.classList.remove('modal-open'); }, 200);
        }

        // ================= DASHBOARD =================
        function renderDashboard(container) {
            const ativos = state.employees.filter(e => e.status === 'Ativo').length;
            let pendentesEficacia = 0;
            state.attendanceLists.forEach(list => {
                list.attendees.forEach(empId => {
                    const evalRecord = state.effectivenessEvaluations.find(e => e.recordId === list.id && e.empId === empId);
                    if(!evalRecord || evalRecord.status === 'Pendente') pendentesEficacia++;
                });
            });

            let skillGaps = 0; state.employeeSkills.forEach(es => { if(es.actual < es.req) skillGaps++; });

            let pendenciasDetalhadas = [];
            state.employees.filter(e => e.status === 'Ativo').forEach(emp => {
                const role = state.roles.find(r => r.name === emp.role);
                if(role && role.trainingIds) {
                    role.trainingIds.forEach(tId => {
                        const training = state.trainings.find(t => t.id === tId);
                        if(!training) return;
                        const participacoes = state.attendanceLists.filter(list => list.trainingId === tId && list.attendees.includes(emp.id)).sort((a, b) => new Date(b.date) - new Date(a.date));
                        let isPendente = false, motivo = '', color = '';
                        if(participacoes.length === 0) { isPendente = true; motivo = 'Não realizado'; color = 'bg-red-100 text-red-800 border-red-200'; } 
                        else if(training.periodicityMonths > 0) {
                            const [y, m, d] = participacoes[0].date.split('-'); const validade = new Date(y, m - 1, d); validade.setMonth(validade.getMonth() + training.periodicityMonths);
                            const hoje = new Date(); hoje.setHours(0,0,0,0);
                            if(hoje > validade) { isPendente = true; motivo = 'Vencido'; color = 'bg-orange-100 text-orange-800 border-orange-200'; }
                        }
                        if(isPendente) pendenciasDetalhadas.push({ empName: emp.name, trainingName: training.title, motivo, color, empId: emp.id, trainingId: training.id, type: 'tr' });
                    });
                }
                
                if (emp.nextEvalDate) {
                    const evalDate = new Date(emp.nextEvalDate); evalDate.setHours(0,0,0,0); const hoje = new Date(); hoje.setHours(0,0,0,0);
                    let motivo = '', color = '';
                    if (hoje > evalDate) { motivo = 'Avaliação Atrasada'; color = 'bg-red-100 text-red-800 border-red-200'; } 
                    else if (evalDate.getTime() - hoje.getTime() <= 15 * 24 * 60 * 60 * 1000) { motivo = 'Avaliação Próxima'; color = 'bg-amber-100 text-amber-800 border-amber-200'; } 
                    else { motivo = 'Avaliação Programada'; color = 'bg-emerald-100 text-emerald-800 border-emerald-200'; }
                    pendenciasDetalhadas.push({ empName: emp.name, trainingName: `Prog: ${formatDate(emp.nextEvalDate)}`, motivo: motivo, color: color, empId: emp.id, trainingId: null, type: 'ev', isEval: true });
                }

                // AVISO DE VENCIMENTO DE DOCUMENTO (30 DIAS)
                if (emp.docExpiryDate) {
                    const docExpDate = new Date(emp.docExpiryDate); docExpDate.setHours(0,0,0,0); const hoje = new Date(); hoje.setHours(0,0,0,0);
                    const diffDays = Math.ceil((docExpDate.getTime() - hoje.getTime()) / (1000 * 60 * 60 * 24));

        function saveSetor() {
            const id = document.getElementById('setorId').value;
            const name = document.getElementById('setorName').value.trim();
            const leader = document.getElementById('setorLeader').value.trim();

            if(!name) { Swal.fire('Aviso', 'O nome do setor é obrigatório.', 'warning'); return; }
            if(!state.setores) state.setores = [];

            let setorObj;
            if (id) {
                const index = state.setores.findIndex(s => s.id == id);
                setorObj = { id: parseInt(id), name, leader };
                state.setores[index] = setorObj;
                addLog('Setores', 'Edição', `O setor "${name}" foi atualizado.`);
            } else {
                setorObj = { id: generateId(state.setores), name, leader };
                state.setores.push(setorObj);
                addLog('Setores', 'Criação', `Novo setor "${name}" criado.`);
            }
            
            dbSave('setores', setorObj.id, setorObj);
            closeModal();
            renderSetores(document.getElementById('app-content'));
            Swal.fire('Sucesso!', 'Setor salvo com sucesso.', 'success');
        }

        function deleteSetor(id) {
            const setor = (state.setores || []).find(s => s.id === id);
            if (!setor) return;

            const isInUse = state.employees.some(emp => emp.dept === setor.name);
            if (isInUse) {
                Swal.fire('Ação Bloqueada (ISO 9001)', 'Este setor possui colaboradores vinculados a ele. Altere o departamento dos colaboradores antes de excluí-lo.', 'error');
                return;
            }

            requirePasswordForAction(() => {
                state.setores = state.setores.filter(s => s.id !== id);
                addLog('Setores', 'Exclusão', `O setor "${setor.name}" foi removido.`);
                dbDelete('setores', id);
                renderSetores(document.getElementById('app-content'));
                Swal.fire('Excluído!', 'O setor foi removido com sucesso.', 'success');
            });
        }

        function saveRole() {
            const id = document.getElementById('roleId').value;
            const name = document.getElementById('roleName').value;
            const desc = document.getElementById('roleDesc').value;
            const responsibilities = document.getElementById('roleResp').value;
            const competencies = document.getElementById('roleCompetencies').value;
            const experience = document.getElementById('roleExp').value;
            
            const skillBadges = document.querySelectorAll('#roleSkillsContainer .skill-badge');
            const skillIds = Array.from(skillBadges).map(badge => parseInt(badge.getAttribute('data-id')));

            const trainingBadges = document.querySelectorAll('#roleTrainingsContainer .training-badge');
            const trainingIds = Array.from(trainingBadges).map(badge => parseInt(badge.getAttribute('data-id')));

            if(!name) { Swal.fire('Aviso', 'O nome do cargo é obrigatório.', 'warning'); return; }

            let roleObj;
            if (id) {
                const index = state.roles.findIndex(r => r.id == id);
                roleObj = { id: parseInt(id), name, desc, responsibilities, competencies, skillIds, trainingIds, experience };
                state.roles[index] = roleObj;
                addLog('Cargos', 'Edição', `A descrição do cargo "${name}" foi atualizada.`);
            } else {
                roleObj = { id: generateId(state.roles), name, desc, responsibilities, competencies, skillIds, trainingIds, experience };
                state.roles.push(roleObj);
                addLog('Cargos', 'Criação', `Nova descrição de cargo "${name}" criada.`);
            }
            
            dbSave('roles', roleObj.id, roleObj);
            closeModal();
            renderCargos(document.getElementById('app-content'));
            Swal.fire('Sucesso!', 'Descrição do cargo guardada com sucesso.', 'success');
        }

        function deleteRole(id) {
            const role = state.roles.find(r => r.id === id);
            if (!role) return;

            const isRoleInUse = state.employees.some(emp => emp.role === role.name);
            if (isRoleInUse) {
                Swal.fire('Não é possível excluir', 'Este cargo está associado a colaboradores no sistema.', 'error');
                return;
            }

        async function buscarCEP(cep) {
            const cepLimpo = cep.replace(/\D/g, '');
            if (cepLimpo.length === 8) {
                document.getElementById('empLogradouro').value = 'A pesquisar...';
                document.getElementById('empBairro').value = 'A pesquisar...';
                document.getElementById('empCidade').value = 'A pesquisar...';
                
                try {
                    const response = await fetch(`https://viacep.com.br/ws/${cepLimpo}/json/`);
                    const data = await response.json();
                    
                    if (!data.erro) {
                        document.getElementById('empLogradouro').value = data.logradouro || '';
                        document.getElementById('empBairro').value = data.bairro || '';
                        document.getElementById('empCidade').value = (data.localidade && data.uf) ? `${data.localidade}/${data.uf}` : '';
                        document.getElementById('empNumero').focus();
                    } else {
                        document.getElementById('empLogradouro').value = '';
                        document.getElementById('empBairro').value = '';
                        document.getElementById('empCidade').value = '';
                        Swal.fire({toast: true, position: 'top-end', icon: 'error', title: 'CEP não encontrado.', showConfirmButton: false, timer: 2500});
                    }
                } catch (error) {
                    document.getElementById('empLogradouro').value = '';
                    document.getElementById('empBairro').value = '';
                    document.getElementById('empCidade').value = '';
                    console.error('Erro na busca do CEP:', error);
                }
            }
        }

            const cpf = document.getElementById('empCpf') ? document.getElementById('empCpf').value.trim() : '';

            const bairro = document.getElementById('empBairro') ? document.getElementById('empBairro').value.trim() : '';

                Swal.fire('Vencimento Inválido', 'Você informou que o documento possui validade, mas esqueceu-se de definir a data de vencimento.', 'warning');

            const performSave = (fileObj) => {
                const eObj = { 
                    id: id ? parseInt(id) : generateId(state.employees), 
                    name, 
                    role, 
                    dept, 
                    admission,

                    email, 
                    nextEvalDate,
                    docExpiryDate,
                    cpf, rg, cep, logradouro, numero, bairro, cidade,
                    attachment: fileObj
                };

                // Preserva o anexo antigo caso esteja a editar e não tenha enviado um ficheiro novo
                if (id && !fileObj) {
                    const existingEmp = state.employees.find(e => e.id == id);
                    if (existingEmp && existingEmp.attachment) {
                        eObj.attachment = existingEmp.attachment;
                    }
                }
                
                dbSave('employees', eObj.id, eObj); 
                closeModal(); 
                renderColaboradores(document.getElementById('app-content')); 
                Swal.fire('Registro Salvo!', 'Os dados do colaborador foram armazenados com sucesso.', 'success');
            };

            // Lógica de Upload Híbrida (Baseada no sistema de Treinamentos)
            if (fileInput && fileInput.files.length > 0) {
                const file = fileInput.files[0];
                
                const processFile = () => {
                    if (file.type.startsWith('image/')) {
                        Swal.fire({title: 'Otimizando Imagem...', html: 'A preparar o documento para a nuvem...', allowOutsideClick: false, didOpen: () => Swal.showLoading()});
                        const reader = new FileReader(); 
                        reader.readAsDataURL(file);
                        reader.onload = (e) => {
                            const img = new Image(); 
                            img.src = e.target.result;
                            img.onload = () => {
                                const canvas = document.createElement('canvas'); 
                                let w = img.width; let h = img.height; 
                                const maxW = 1200, maxH = 1200;
                                if(w > maxW) { h = Math.round((h * maxW) / w); w = maxW; } 
                                if(h > maxH) { w = Math.round((w * maxH) / h); h = maxH; }
                                canvas.width = w; canvas.height = h; 
                                canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                                
                                let quality = 0.8;
                                let dataUrl = canvas.toDataURL('image/jpeg', quality);
                                while (dataUrl.length > 750 * 1024 && quality > 0.2) { 
                                    quality -= 0.1; dataUrl = canvas.toDataURL('image/jpeg', quality); 
                                }
                                
                                if (dataUrl.length <= 950 * 1024) performSave({ name: file.name, data: dataUrl }); 
                                else uploadToStorage(file);
                            };
                        };
                    } else {
                        if (file.size <= 750 * 1024) {
                            Swal.fire({title: 'Processando Documento...', allowOutsideClick: false, didOpen: () => Swal.showLoading()});
                            const reader = new FileReader(); 
                            reader.onload = (e) => performSave({ name: file.name, data: e.target.result }); 
                            reader.readAsDataURL(file);
                        } else uploadToStorage(file);
                    }
                };

                const uploadToStorage = (rawFile) => {
                    if (rawFile.size > 5 * 1024 * 1024) return Swal.fire('Erro', 'O limite máximo para arquivos é 5MB.', 'error');
                    
                    Swal.fire({ 
                        title: 'A enviar documento para a Nuvem...', 
                        html: '<b class="text-blue-600 text-3xl">0%</b>', 
                        allowOutsideClick: false, showConfirmButton: false, didOpen: () => Swal.showLoading() 
                    });
                    
                    let timeoutFired = false;
                    const fallbackTimer = setTimeout(() => { 
                        timeoutFired = true; 
                        if(Swal.isVisible()) Swal.fire({ icon: 'error', title: 'Comunicação Bloqueada', text: 'O Firebase bloqueou o envio.' }); 
                    }, 15000);
                    
                    const storageRef = storage.ref(`colaboradores/documentos/${Date.now()}_${rawFile.name.replace(/[^a-zA-Z0-9.]/g, '_')}`);
                    const uploadTask = storageRef.put(rawFile);
                    
                    uploadTask.on('state_changed', 
                        (snapshot) => { 
                            if (snapshot.bytesTransferred > 0) clearTimeout(fallbackTimer); 
                            if (timeoutFired) { uploadTask.cancel(); return; } 
                            const pct = Math.round((snapshot.bytesTransferred / snapshot.totalBytes) * 100);
                            if (Swal.isVisible()) Swal.update({ html: `<b class="text-blue-600 text-3xl">${pct}%</b>` }); 
                        }, 
                        (error) => { clearTimeout(fallbackTimer); Swal.fire('Erro', 'Falha no envio.', 'error'); }, 
                        () => { 
                            clearTimeout(fallbackTimer); 
                            if (timeoutFired) return; 
                            uploadTask.snapshot.ref.getDownloadURL().then((url) => performSave({ name: rawFile.name, url: url })); 
                        }
                    );
                };
                
                processFile();
            } else {
                performSave(null);
            }
        }

                if(!tr) return;

                    .filter(l => l.trainingId === tId && l.attendees.includes(empId))
                    .sort((a, b) => new Date(b.date) - new Date(a.date));
                    
                let status = isMand ? 'Não realizado' : 'Realizado'; 
                let sClass = isMand ? 'text-red-700 bg-red-100 border-red-200' : 'text-blue-700 bg-blue-100 border-blue-200';
                
                let lastDate = '-'; 
                let valDate = '-'; 
                let lId = null; 
                let hasAtt = false; 
                let histCount = 0; 
                let efB = '-';
                
                if(parts.length > 0) {
                    histCount = parts.length > 1 ? parts.length - 1 : 0;

                    lastDate = formatDate(last.date); 
                    lId = last.id; 
                    hasAtt = !!last.attachment;

                        let badgeClass = 'text-gray-400 bg-gray-50 border border-dashed border-gray-200';

                            if(req > 0 && score < req) {
                                badgeClass = 'text-red-700 font-black bg-red-100 border border-red-200 shadow-sm';
                            } else if(req > 0 && score >= req) {
                                badgeClass = 'text-emerald-700 font-black bg-emerald-100 border border-emerald-200 shadow-sm';
                            } else {
                                badgeClass = 'text-blue-700 font-black bg-blue-100 border border-blue-200 shadow-sm';
                            }
                            tScore += score; 
                            sCount++;
                        }
                        
                        html += `<td class="p-3 text-center"><div class="px-3 py-1.5 rounded-lg inline-block w-full max-w-[60px] mx-auto ${badgeClass} transition-transform hover:scale-110">${score > 0 ? score : '-'}</div></td>`;
                    });
                    
                    const avg = sCount > 0 ? (tScore / sCount).toFixed(1) : '-';
                    let avgClass = 'text-gray-400 bg-gray-50';
                    if (avg !== '-') {
                        const numericAvg = parseFloat(avg);
                        if (numericAvg >= 3.0) avgClass = 'text-emerald-800 font-black bg-emerald-100/50';
                        else avgClass = 'text-red-800 font-black bg-red-100/50';
                    }
                    
                    html += `<td class="p-4 text-center border-l border-gray-100 ${avgClass} text-base">${avg}</td></tr>`;
                });
            }
            html += '</tbody></table>'; 
            container.innerHTML = html;
            if(window.lucide) window.lucide.createIcons();
        }

        function addTempRoleToTraining() {
            const sel = document.getElementById('trRoleSelect'); 
            const rId = parseInt(sel.value);
            if(!rId || tempTrainingRoles.includes(rId)) return;
            tempTrainingRoles.push(rId); sel.value = ''; renderTempTrainingRoles();
        }
        
        function removeTempRoleFromTraining(rId) { 
            tempTrainingRoles = tempTrainingRoles.filter(id => id !== rId); renderTempTrainingRoles(); 
        }
        
        function renderTempTrainingRoles() {
            const container = document.getElementById('trRolesContainer');
            if (tempTrainingRoles.length === 0) {
                container.innerHTML = '<span class="text-xs text-gray-400 italic px-2 py-1">Nenhum cargo vinculado. O treinamento será tratado como Extra/Opcional.</span>'; return;
            }
            container.innerHTML = tempTrainingRoles.map(rId => {
                const role = state.roles.find(r => r.id === rId);
                return role ? `<span class="bg-blue-100 text-blue-900 border border-blue-300 px-3 py-1.5 rounded-md text-[11px] font-bold flex items-center shadow-sm">${role.name} <button onclick="removeTempRoleFromTraining(${rId})" class="ml-2 bg-white rounded-full p-0.5 text-red-500 hover:text-red-700 hover:bg-red-50 transition-colors border border-transparent hover:border-red-200"><i data-lucide="x" class="w-3 h-3"></i></button></span>` : '';

        function addTempCriteriaToTraining() {
            const inp = document.getElementById('trCriteriaInput'); const val = inp.value.trim();
            if(!val || tempTrainingCriteria.includes(val)) return;
            tempTrainingCriteria.push(val); inp.value = ''; renderTempTrainingCriteria();
        }
        
        function removeTempCriteriaFromTraining(val) { 
            tempTrainingCriteria = tempTrainingCriteria.filter(v => v !== val); renderTempTrainingCriteria(); 
        }
        
        function renderTempTrainingCriteria() {
            const container = document.getElementById('trCriteriaContainer');
            if (tempTrainingCriteria.length === 0) {
                container.innerHTML = '<span class="text-xs text-gray-400 italic px-2 py-1">Nenhum critério definido. O padrão será apenas "Avaliação Livre".</span>'; return;
            }
            container.innerHTML = tempTrainingCriteria.map(val => `
                <span class="bg-emerald-100 text-emerald-900 border border-emerald-300 px-3 py-1.5 rounded-md text-[11px] font-bold flex items-center shadow-sm">
                    <i data-lucide="check-circle-2" class="w-3 h-3 mr-1 text-emerald-600"></i> ${val} 
                    <button onclick="removeTempCriteriaFromTraining('${val}')" class="ml-2 bg-white rounded-full p-0.5 text-gray-500 hover:text-red-600 hover:bg-red-50 transition-colors"><i data-lucide="x" class="w-3 h-3"></i></button>
                </span>
            `).join('');
            if(window.lucide) window.lucide.createIcons();
        }

        function saveTraining() {
            const idInput = document.getElementById('trId').value;
            const title = document.getElementById('trTitle').value.trim();
            if(!title) { Swal.fire('Nome Obrigatório', 'Você precisa dar um Título para este Treinamento.', 'error'); return; }

            const desc = document.getElementById('trDesc').value.trim();
            const type = document.getElementById('trType').value;
            const periodicityMonths = parseInt(document.getElementById('trPeriodicity').value) || 0;
            const id = idInput ? parseInt(idInput) : generateId(state.trainings);

            const trObj = { id, title, desc, type, periodicityMonths, criteria: tempTrainingCriteria };
            dbSave('trainings', id, trObj);

            state.roles.forEach(r => {
                let updated = false; let tIds = r.trainingIds || [];
                if (tempTrainingRoles.includes(r.id)) {
                    if (!tIds.includes(id)) { tIds.push(id); updated = true; }
                } else {
                    if (tIds.includes(id)) { tIds = tIds.filter(tid => tid !== id); updated = true; }
                }
                if (updated) { r.trainingIds = tIds; dbSave('roles', r.id, r); }
            });

            closeModal(); renderTreinamentos(document.getElementById('app-content')); 
            Swal.fire('Catálogo Atualizado!', 'O treinamento foi salvo e a Matriz LNT dos cargos associados já foi sincronizada.', 'success');
        }

        function deleteTraining(id) {
            if(state.attendanceLists.some(list => list.trainingId === id)) {
                Swal.fire('Exclusão Bloqueada', 'Não é possível excluir um treinamento que já possui Listas de Presença registradas na empresa. Você perderia a rastreabilidade (ISO). Em vez disso, edite-o ou remova os vínculos com os cargos.', 'error'); return;
            }
            requirePasswordForAction(() => { 
                dbDelete('trainings', id); 
                state.roles.forEach(r => {
                    if (r.trainingIds && r.trainingIds.includes(id)) { r.trainingIds = r.trainingIds.filter(tid => tid !== id); dbSave('roles', r.id, r); }
                });
                renderTreinamentos(document.getElementById('app-content')); Swal.fire('Excluído', 'O treinamento foi apagado permanentemente.', 'success'); 
            });
        }

        function renderPresenca(container) {

        function loadEmployeesForAttendance(selectedIds = []) {

            let html = ''; 
            const sortedEmps = [...state.employees].filter(e => e.status === 'Ativo').sort((a,b) => a.name.localeCompare(b.name));
            
            sortedEmps.forEach(emp => {
                const checked = selectedIds && selectedIds.includes(emp.id) ? 'checked' : '';
                html += `
                    <label class="flex items-center space-x-3 p-2 hover:bg-white rounded border border-transparent hover:border-blue-100 hover:shadow-sm cursor-pointer transition-all">
                        <input type="checkbox" name="attEmp" value="${emp.id}" ${checked} class="w-4 h-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500 cursor-pointer">
                        <div class="flex flex-col">
                            <span class="font-bold text-gray-800 text-sm">${emp.name}</span>

        function saveAttendance() {
            const trSelect = document.getElementById('attTr');
            const trId = parseInt(trSelect.value); 
            const date = document.getElementById('attDate').value; 
            const inst = document.getElementById('attInst').value.trim(); 
            const workloadRaw = document.getElementById('attWorkload').value.trim(); 
            const workload = workloadRaw ? workloadRaw + 'h' : ''; 
            const local = document.getElementById('attLocal').value.trim();
            
            const checkboxes = document.querySelectorAll('input[name="attEmp"]:checked');
            const attendees = Array.from(checkboxes).map(c => parseInt(c.value)); 
            
            const fileInput = document.getElementById('attFile');

            if(!trId) return Swal.fire('Falha na Submissão', 'Você se esqueceu de selecionar qual é o Treinamento!', 'error');
            if(!date) return Swal.fire('Falha na Submissão', 'A Data de Realização é um campo obrigatório.', 'error');
            if(attendees.length === 0) return Swal.fire('Falha na Submissão', 'Uma ata fantasma não é permitida. Marque pelo menos 1 (um) colaborador que participou da sessão.', 'error');

            const performSave = (fileObj) => {
                const id = editAttendanceId ? editAttendanceId : generateId(state.attendanceLists);
                const obj = { id, trainingId: trId, date, instructor: inst, workload, local, attendees, attachment: fileObj };
                
                if (editAttendanceId && !fileObj) { 
                    const oldAtt = state.attendanceLists.find(x => x.id === editAttendanceId); 
                    if (oldAtt && oldAtt.attachment) {
                        obj.attachment = oldAtt.attachment; 
                    }
                }
                
                dbSave('attendanceLists', id, obj);
                
                if (editAttendanceId) {
                    const oldAtt = state.attendanceLists.find(x => x.id === editAttendanceId);
                    if (oldAtt) {
                        const removedAttendees = oldAtt.attendees.filter(a => !attendees.includes(a));
                        removedAttendees.forEach(empId => dbDelete('effectivenessEvaluations', `${id}_${empId}`));
                    }
                }

                attendees.forEach(empId => {
                    const evalId = `${id}_${empId}`;
                    const existingEval = state.effectivenessEvaluations.find(e => e.recordId === id && e.empId === empId);
                    
                    if (!existingEval) {
                        dbSave('effectivenessEvaluations', evalId, { 
                            recordId: id, 
                            empId: empId, 
                            status: 'Pendente', 
                            date: '', 
                            comments: '' 
                        });
                    }
                });
                
                closeModal(); 
                renderPresenca(document.getElementById('app-content')); 
                Swal.fire({
                    title: 'Ata Registrada com Sucesso!', 
                    text: 'O treinamento foi arquivado e as fichas de eficácia pendente foram geradas para a liderança.', 
                    icon: 'success',
                    confirmButtonColor: '#2563eb'
                });
            };

            if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                
                const processFile = () => {
                    if (file.type.startsWith('image/')) {
                        Swal.fire({
                            title: 'Otimizando Fotografia...', 
                            html: 'As máquinas virtuais estão espremendo os pixels para salvar espaço na nuvem...',
                            allowOutsideClick: false, 
                            didOpen: () => Swal.showLoading()
                        });
                        
                        const reader = new FileReader(); 
                        reader.readAsDataURL(file);
                        
                        reader.onload = (e) => {
                            const img = new Image(); 
                            img.src = e.target.result;
                            img.onload = () => {
                                const canvas = document.createElement('canvas'); 
                                let w = img.width; 
                                let h = img.height; 
                                
                                const maxW = 1200, maxH = 1200;
                                if(w > maxW) { h = Math.round((h * maxW) / w); w = maxW; } 
                                if(h > maxH) { w = Math.round((w * maxH) / h); h = maxH; }
                                
                                canvas.width = w; 
                                canvas.height = h; 
                                canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                                
                                let quality = 0.8;
                                let dataUrl = canvas.toDataURL('image/jpeg', quality);
                                
                                while (dataUrl.length > 750 * 1024 && quality > 0.2) { 
                                    quality -= 0.1; 
                                    dataUrl = canvas.toDataURL('image/jpeg', quality); 
                                }
                                
                                if (dataUrl.length <= 950 * 1024) {
                                    performSave({ name: file.name, data: dataUrl }); 
                                } else {
                                    uploadToStorage(file);
                                }
                            };
                        };
                    } else {
                        if (file.size <= 750 * 1024) {
                            Swal.fire({title: 'Processando Documento...', allowOutsideClick: false, didOpen: () => Swal.showLoading()});
                            const reader = new FileReader(); 
                            reader.onload = (e) => performSave({ name: file.name, data: e.target.result }); 
                            reader.readAsDataURL(file);
                        } else {
                            uploadToStorage(file);
                        }
                    }
                };
                
                const uploadToStorage = (rawFile) => {
                    if (rawFile.size > 5 * 1024 * 1024) {
                        return Swal.fire('Erro de Arquivo Gigante', 'O sistema bloqueou por segurança. O arquivo ultrapassa a cota máxima de 5 Megabytes por documento.', 'error');
                    }
                    
                    Swal.fire({ 
                        title: 'A contactar servidor seguro na Nuvem...', 
                        html: 'Transferência Iniciada...<br><br><b class="text-blue-600 text-3xl">0%</b>', 
                        allowOutsideClick: false, 
                        showConfirmButton: false, 
                        didOpen: () => Swal.showLoading() 
                    });
                    
                    let timeoutFired = false;
                    
                    const fallbackTimer = setTimeout(() => { 
                        timeoutFired = true; 
                        if(Swal.isVisible()) {
                            Swal.fire({ 
                                icon: 'error', 
                                title: 'Comunicação Bloqueada', 
                                text: 'As permissões do Firebase Storage estão desatualizadas. Volte ao Firebase, clique em Storage -> Regras, e garanta que está escrito: allow read, write: if request.auth != null;' 
                            }); 
                        }
                    }, 15000);
                    
                    const storageRef = storage.ref(`treinamentos/evidencias/${Date.now()}_${rawFile.name.replace(/[^a-zA-Z0-9.]/g, '_')}`);
                    const uploadTask = storageRef.put(rawFile);
                    
                    uploadTask.on('state_changed', 
                        (snapshot) => { 
                            if (snapshot.bytesTransferred > 0) clearTimeout(fallbackTimer); 
                            if (timeoutFired) { uploadTask.cancel(); return; } 
                            
                            const pct = Math.round((snapshot.bytesTransferred / snapshot.totalBytes) * 100);
                            const mB = (snapshot.bytesTransferred / (1024*1024)).toFixed(2);
                            const totalMB = (snapshot.totalBytes / (1024*1024)).toFixed(2);
                            
                            if (Swal.isVisible()) {
                                Swal.update({ 
                                    html: `Enviando pacote de dados... (${mB}MB de ${totalMB}MB)<br><br><b class="text-blue-600 text-3xl">${pct}%</b>` 
                                }); 
                            }
                        }, 
                        (error) => { 
                            clearTimeout(fallbackTimer); 
                            Swal.fire('Falha Catastrófica no Upload', 'Ocorreu um erro no tráfego. Sua internet pode ter caído no meio do caminho.', 'error'); 
                            console.error(error);
                        }, 
                        () => { 
                            clearTimeout(fallbackTimer); 
                            if (timeoutFired) return; 
                            Swal.update({ html: 'Envio completo! Gerando carimbo digital seguro...' });
                            uploadTask.snapshot.ref.getDownloadURL().then((url) => {
                                performSave({ name: rawFile.name, url: url }); 
                            });
                        }
                    );
                };
                
                processFile();
            } else {
                performSave(null); 
            }
        }

        function confirmDeleteAttendance(id) {
            requirePasswordForAction(() => {
                dbDelete('attendanceLists', id);
                const linkedEvals = state.effectivenessEvaluations.filter(e => e.recordId === id);
                linkedEvals.forEach(e => dbDelete('effectivenessEvaluations', `${e.recordId}_${e.empId}`));
                renderPresenca(document.getElementById('app-content')); 
                Swal.fire('Eliminado', 'O registro inteiro da lista e pendências foram obliterados.', 'success');
            });
        }

        function viewAttachment(listId) {
            const list = state.attendanceLists.find(l => l.id === listId); 
            if (!list || !list.attachment) return;
            if (list.attachment.url) {
                window.open(list.attachment.url, '_blank');
            } else if (list.attachment.data) { 
                const link = document.createElement('a'); 
                link.href = list.attachment.data; 
                link.download = list.attachment.name; 
                document.body.appendChild(link); 
                link.click(); 
                document.body.removeChild(link); 
            }
        }

            }
            const emp = state.employees.find(e => e.id === empId); 
            const role = state.roles.find(r => r.name === emp.role);
            if(!role || !role.skillIds || role.skillIds.length === 0) { 
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-8 text-amber-600 no-print">
                        <i data-lucide="alert-triangle" class="w-10 h-10 mb-3 opacity-80"></i>
                        <p class="text-base font-black">Cargo Oco!</p>

                    </div>`; 
                if(window.lucide) window.lucide.createIcons(); return; 
            }
            
            let html = `
                <div class="flex justify-between items-center mb-4 px-2 no-print">
                    <p class="text-[11px] font-black text-blue-800 uppercase tracking-wider">Regras Técnicas Base para: ${role.name}</p>
                    <span class="text-[10px] text-gray-500 italic">Deixe vazio se não for avaliar agora</span>
                </div>
                <div class="space-y-3 px-1 no-print">
            `;
            
            role.skillIds.forEach(sId => {
                const skill = state.skills.find(s => s.id === sId);
                if(skill) {
                    const es = state.employeeSkills.find(x => x.empId === empId && x.skillId === sId) || { req: 0, actual: 0 };
                    const previousScoreText = es.actual > 0 ? `Nota na última avaliação: <span class="text-blue-600 font-black">${es.actual}</span>` : 'Primeira vez sendo avaliado.';
                    html += `
                        <div class="flex items-center justify-between bg-white p-3 border border-gray-200 rounded-lg shadow-sm hover:border-blue-300 transition-colors group">
                            <div class="flex flex-col w-2/3 pr-4">
                                <span class="text-sm font-bold text-gray-800">${skill.name}</span>
                                <div class="flex items-center mt-1 space-x-3">
                                    <span class="text-[10px] text-gray-500 bg-gray-50 px-2 py-0.5 rounded border border-gray-100">Exigência Matriz: <strong class="text-gray-800">${es.req > 0 ? es.req : 'Livre'}</strong></span>
                                    <span class="text-[10px] text-gray-500">${previousScoreText}</span>
                                </div>
                            </div>
                            <div class="flex flex-col items-end w-1/3 justify-center pl-4 border-l border-gray-100">
                                <label class="text-[9px] font-bold text-gray-400 uppercase tracking-widest mb-1 group-hover:text-blue-500 transition-colors">Nova Nota</label>
                                <input type="number" min="1" max="5" step="0.5" class="w-20 border-2 border-gray-200 p-2.5 rounded-lg text-center text-base font-black text-blue-700 outline-none focus:ring-2 focus:border-blue-500 focus:ring-blue-500 transition-all shadow-inner pf-skill-score" data-id="${skill.id}" data-name="${skill.name}" placeholder="0.0">
                            </div>
                        </div>
                    `;
                }
            });
            container.innerHTML = html + '</div>';
        }

        function savePerformance() {
            const empSelect = document.getElementById('pfEmp');
            const empId = parseInt(empSelect.value); 
            if(!empId) return Swal.fire('Aviso', 'A pontaria falhou. Selecione o colaborador que está a ser avaliado.', 'warning');
            
            const feedback = document.getElementById('pfFeedback').value; 
            const minScore = parseFloat(document.getElementById('pfMinScore').value) || 0;
            
            let skillsData = []; let totalScore = 0; let count = 0;
            document.querySelectorAll('.pf-skill-score').forEach(input => {
                const sId = parseInt(input.getAttribute('data-id')); const sScore = parseFloat(input.value) || 0;
                if (sScore > 0) {
                    skillsData.push({ skillId: sId, skillName: input.getAttribute('data-name'), score: sScore });
                    totalScore += sScore; count++;
                    const esObj = state.employeeSkills.find(x => x.empId === empId && x.skillId === sId) || { req: 0 };
                    dbSave('employeeSkills', `${empId}_${sId}`, { empId, skillId: sId, req: esObj.req, actual: sScore });
                } else if (input.value !== '') {
                     skillsData.push({ skillId: sId, skillName: input.getAttribute('data-name'), score: 0 });
                }
            });
            
            if (count === 0 && skillsData.length === 0 && feedback.length < 5) return Swal.fire('Aviso ISO 9001', 'Uma avaliação vazia não serve de nada. Atribua nota a pelo menos uma competência OU escreva um feedback robusto.', 'warning');
            
            const finalMathScore = count > 0 ? (totalScore / count) : 0;
            const obj = { id: generateId(state.performanceReviews), empId, score: parseFloat(finalMathScore.toFixed(1)), minScore, skills: skillsData, date: new Date().toISOString().split('T')[0], evaluator: currentUser ? (currentUser.email || 'Admin Logado') : 'Gestor RH', feedback };
            dbSave('performanceReviews', obj.id, obj);
            
            const empToUpdate = state.employees.find(e => e.id === empId);
            if (empToUpdate && empToUpdate.nextEvalDate) { empToUpdate.nextEvalDate = null; dbSave('employees', empToUpdate.id, empToUpdate); }
            closeModal(); navigate('desempenho'); 
            Swal.fire({ title: 'O Veredito foi Salvo!', text: 'A Matriz técnica geral de habilidades já foi sobreposta com os novos valores.', icon: 'success', confirmButtonColor: '#2563eb' });
        }

        function confirmDeletePerformance(id) { 
            requirePasswordForAction(() => { dbDelete('performanceReviews', id); renderDesempenho(document.getElementById('app-content')); Swal.fire('Excluído do Dossiê!', 'Esta nota/parecer jamais constará do histórico do funcionário novamente.', 'success'); }); 
        }
